<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>our nyc adventure log</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:         #F2E8DB;
      --surface:    #FAF4EC;
      --card:       #FFFDF9;
      --text:       #2A1A0E;
      --text-mid:   #7A5E46;
      --text-light: #B09880;
      --border:     #E0CEBC;
      --shadow-sm:  0 2px 10px rgba(42,26,14,0.07);
      --shadow:     0 4px 18px rgba(42,26,14,0.10);
      --shadow-lg:  0 10px 36px rgba(42,26,14,0.15);
      --accent:     #C4623E;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ── APP LAYOUT ──────────────────────────────── */
    .app {
      display: flex;
      min-height: 100vh;
    }

    /* ── LEFT PANEL ──────────────────────────────── */
    .left-panel {
      width: 400px;
      min-width: 340px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1.5rem 1.5rem;
      border-right: 1px solid var(--border);
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
      background: var(--surface);
    }

    .left-panel header {
      text-align: center;
      margin-bottom: 1rem;
      width: 100%;
    }

    .left-panel h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.4rem, 2.5vw, 1.85rem);
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text);
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.75rem;
      color: var(--text-light);
      letter-spacing: 0.03em;
    }

    .stats-row {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 0.65rem;
      font-size: 0.75rem;
      color: var(--text-mid);
    }

    .stats-row b {
      font-family: 'Playfair Display', serif;
      font-size: 0.95rem;
      color: var(--text);
    }

    /* ── WHEEL ───────────────────────────────────── */
    #wheelWrap {
      position: relative;
      flex-shrink: 0;
      margin: 0.5rem 0;
    }

    #wheelSvg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    #wheelCenter {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: var(--card);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      border: 1px solid var(--border);
      z-index: 3;
    }

    #centerNum {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      color: var(--accent);
      line-height: 1;
    }

    #centerLabel {
      font-size: 0.6rem;
      color: var(--text-light);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 0.15rem;
    }

    .wheel-node {
      position: absolute;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: var(--card);
      border: 1.5px solid var(--border);
      box-shadow: var(--shadow-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
      text-align: center;
      z-index: 2;
      border-top-width: 3px;
    }

    .wheel-node:hover {
      transform: translate(-50%, -50%) scale(1.12);
      box-shadow: var(--shadow);
    }

    .wheel-node.active {
      transform: translate(-50%, -50%) scale(1.08);
      box-shadow: var(--shadow-lg);
    }

    .node-name {
      font-weight: 600;
      color: var(--text-mid);
      line-height: 1.25;
      text-align: center;
      padding: 0 4px;
    }

    /* ── LEFT FOOTER ─────────────────────────────── */
    .left-footer {
      display: flex;
      gap: 0.6rem;
      width: 100%;
      margin-top: auto;
      padding-top: 0.75rem;
    }

    /* ── BUTTONS ─────────────────────────────────── */
    .ghost-btn {
      background: transparent;
      border: 1.5px solid var(--border);
      padding: 0.48rem 1.1rem;
      border-radius: 50px;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem; font-weight: 500;
      color: var(--text-mid);
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
    }

    .ghost-btn:hover {
      background: var(--card);
      border-color: var(--text-mid);
      color: var(--text);
    }

    .solid-btn {
      background: var(--accent);
      border: none;
      padding: 0.48rem 1.1rem;
      border-radius: 50px;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem; font-weight: 600;
      color: white;
      cursor: pointer;
      transition: opacity 0.18s, transform 0.18s;
      white-space: nowrap;
    }

    .solid-btn:hover { opacity: 0.88; transform: translateY(-1px); }

    /* ── RIGHT PANEL ─────────────────────────────── */
    .right-panel {
      flex: 1;
      min-width: 0;
      overflow-y: auto;
      height: 100vh;
      padding: 2.5rem 2.5rem 4rem;
    }

    /* ── PLACEHOLDER ─────────────────────────────── */
    #placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 60vh;
      text-align: center;
      color: var(--text-light);
    }

    .placeholder-deco {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: var(--border);
      margin-bottom: 1rem;
      display: flex; align-items: center; justify-content: center;
      opacity: 0.5;
    }

    #placeholder p {
      font-size: 0.9rem;
      font-style: italic;
      max-width: 220px;
      line-height: 1.6;
    }

    /* ── CATEGORY VIEW ───────────────────────────── */
    #catView { display: none; }
    #catView.visible { display: block; }

    #catHeader {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    #catTitle {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.1;
    }

    #catSubtitle {
      font-size: 0.78rem;
      color: var(--text-light);
      margin-top: 0.2rem;
    }

    /* ── FILTERS ─────────────────────────────────── */
    #catFilters {
      display: flex;
      gap: 0.4rem;
      margin-bottom: 0.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    .cf-pill {
      padding: 0.28rem 0.8rem;
      border-radius: 50px;
      border: 1.5px solid transparent;
      font-family: 'Inter', sans-serif;
      font-size: 0.76rem; font-weight: 500;
      cursor: pointer;
      background: transparent;
      color: var(--text-light);
      transition: all 0.15s;
    }

    .cf-pill:hover { color: var(--text); }

    .cf-pill.active {
      border-color: var(--node-color, var(--accent));
      color: var(--node-color, var(--accent));
    }

    /* ── ACTIVITY LIST ───────────────────────────── */
    .activity-row {
      display: flex;
      align-items: flex-start;
      gap: 0.85rem;
      padding: 0.9rem 0;
      border-bottom: 1px solid var(--border);
      animation: rowIn 0.2s ease backwards;
    }

    @keyframes rowIn {
      from { opacity: 0; transform: translateX(-6px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .activity-row:last-child { border-bottom: none; }

    .status-dot {
      width: 13px; height: 13px;
      border-radius: 50%;
      border: 1.5px solid var(--node-color, var(--border));
      flex-shrink: 0;
      margin-top: 3px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .activity-row.done .status-dot {
      background: var(--node-color);
      border-color: var(--node-color);
    }

    .status-dot:hover { transform: scale(1.2); }

    .activity-body { flex: 1; min-width: 0; }

    .activity-title {
      font-size: 0.9rem; font-weight: 500;
      color: var(--text);
      cursor: pointer; transition: color 0.15s;
      line-height: 1.45;
    }

    .activity-row.done .activity-title {
      text-decoration: line-through;
      color: var(--text-light);
    }

    .activity-title:hover { color: var(--node-color, var(--accent)); }

    .activity-notes {
      font-size: 0.77rem;
      color: var(--text-light);
      margin-top: 0.18rem;
      line-height: 1.6;
    }

    .activity-link {
      font-size: 0.72rem;
      color: var(--text-mid);
      text-decoration: none;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 0.15rem;
      margin-top: 0.2rem;
    }

    .activity-link:hover { text-decoration: underline; }

    .activity-meta {
      display: flex; align-items: center;
      gap: 0.55rem; margin-top: 0.3rem;
    }

    .activity-date { font-size: 0.7rem; color: var(--text-light); }

    .stars-row { display: flex; gap: 1px; }

    .star { font-size: 0.82rem; color: #D8C4AE; cursor: pointer; transition: all 0.1s; }
    .star.lit { color: #D4943A; }
    .star:hover { transform: scale(1.2); color: #D4943A; }

    .activity-actions {
      display: flex; gap: 0.2rem;
      opacity: 0; transition: opacity 0.15s;
      flex-shrink: 0; padding-top: 1px;
    }

    .activity-row:hover .activity-actions { opacity: 1; }

    .row-btn {
      width: 26px; height: 26px;
      border-radius: 50%; border: none;
      background: none; cursor: pointer;
      font-size: 0.72rem;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-light); transition: all 0.15s;
    }

    .row-btn:hover { background: var(--border); color: var(--text); }
    .row-btn.del:hover { background: #F0DDD8; color: #A84A3A; }

    .empty-row {
      padding: 2.5rem 0;
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-light);
      font-style: italic;
    }

    /* ── MODALS ──────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(42,26,14,0.22);
      backdrop-filter: blur(6px);
      z-index: 300;
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem;
      animation: fadeIn 0.16s ease;
    }

    .overlay.hidden { display: none; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      background: var(--card);
      border-radius: 18px;
      padding: 1.75rem;
      width: 100%; max-width: 440px;
      max-height: 92vh; overflow-y: auto;
      animation: modalPop 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
    }

    @keyframes modalPop {
      from { opacity: 0; transform: scale(0.92) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem; font-weight: 600;
      margin-bottom: 1.3rem; color: var(--text);
    }

    .form-group { margin-bottom: 0.95rem; }

    .form-group label {
      display: block;
      font-size: 0.7rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--text-light); margin-bottom: 0.3rem;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 0.58rem 0.85rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem; color: var(--text);
      outline: none; transition: border-color 0.15s;
      background: var(--surface);
    }

    .form-group input:focus,
    .form-group textarea:focus { border-color: var(--accent); }

    .form-group textarea { resize: vertical; min-height: 70px; }

    .cat-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0.35rem;
    }

    .cat-opt {
      padding: 0.45rem 0.2rem;
      border-radius: 7px;
      border: 1.5px solid var(--border);
      cursor: pointer; transition: all 0.15s;
      text-align: center;
      font-size: 0.65rem; font-weight: 500;
      color: var(--text-mid); background: var(--surface);
    }

    .cat-opt:hover { border-color: var(--text-mid); }
    .cat-opt.sel { color: white; border-color: transparent; }

    .modal-btns { display: flex; gap: 0.6rem; margin-top: 1.3rem; }

    .btn-cancel {
      flex: 1; padding: 0.52rem 1rem;
      border-radius: 50px; border: 1.5px solid var(--border);
      font-family: 'Inter', sans-serif;
      font-weight: 500; font-size: 0.84rem;
      cursor: pointer; background: transparent; color: var(--text-mid);
      transition: all 0.15s;
    }

    .btn-cancel:hover { background: var(--border); }

    .btn-save {
      flex: 2; padding: 0.52rem 1.2rem;
      border-radius: 50px; border: none;
      font-family: 'Inter', sans-serif;
      font-weight: 600; font-size: 0.84rem;
      cursor: pointer; transition: opacity 0.15s;
      background: var(--accent); color: white;
    }

    .btn-save:hover { opacity: 0.86; }

    /* ── SURPRISE MODAL ──────────────────────────── */
    .surprise-overlay .modal { max-width: 340px; text-align: center; }

    .s-eyebrow {
      font-size: 0.68rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-light); margin-bottom: 0.5rem;
    }

    .s-cat {
      display: inline-block;
      font-size: 0.7rem; font-weight: 600;
      padding: 0.22rem 0.75rem; border-radius: 50px;
      color: white; margin-bottom: 0.65rem;
      text-transform: uppercase; letter-spacing: 0.06em;
    }

    .s-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem; font-weight: 600;
      margin-bottom: 0.5rem; line-height: 1.3;
      color: var(--text);
    }

    .s-notes {
      font-size: 0.82rem; color: var(--text-light);
      line-height: 1.6; margin-bottom: 1.2rem;
    }

    .surprise-overlay .modal-btns { flex-direction: column; }

    /* ── CONFETTI ────────────────────────────────── */
    #confetti-layer {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 9999;
    }

    .cf {
      position: absolute;
      animation: cfFall linear forwards;
    }

    @keyframes cfFall {
      0%   { transform: translateY(-10px) rotate(0deg); opacity: 1; }
      85%  { opacity: 0.8; }
      100% { transform: translateY(105vh) rotate(700deg); opacity: 0; }
    }

    /* ── SCROLLBAR ───────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── MOBILE ──────────────────────────────────── */
    @media (max-width: 768px) {
      .app { flex-direction: column; }

      .left-panel {
        width: 100%;
        min-width: unset;
        position: static;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding-bottom: 1.5rem;
      }

      .right-panel { height: auto; padding: 1.5rem 1.25rem 3rem; }
      #placeholder { min-height: 30vh; }
    }
  </style>
</head>
<body>
  <div id="confetti-layer"></div>

  <div class="app">

    <!-- ── LEFT PANEL ──────────────────────────────── -->
    <div class="left-panel">
      <header>
        <h1>our nyc adventure log</h1>
        <p class="subtitle">things we want to do &nbsp;·&nbsp; places to go</p>
        <div class="stats-row" id="statsRow"></div>
      </header>

      <div id="wheelWrap">
        <svg id="wheelSvg"></svg>
        <div id="wheelCenter">
          <div id="centerNum"></div>
          <div id="centerLabel">done</div>
        </div>
      </div>

      <div class="left-footer">
        <button class="ghost-btn" style="flex:1" onclick="surpriseMe()">pick one for us</button>
        <button class="solid-btn" style="flex:1" onclick="openAdd(null)">+ add</button>
      </div>
    </div>

    <!-- ── RIGHT PANEL ─────────────────────────────── -->
    <div class="right-panel">

      <!-- placeholder -->
      <div id="placeholder">
        <div class="placeholder-deco">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>
          </svg>
        </div>
        <p>Select a category from the wheel to explore your adventures</p>
      </div>

      <!-- category view -->
      <div id="catView">
        <div id="catHeader">
          <div>
            <div id="catTitle"></div>
            <div id="catSubtitle"></div>
          </div>
          <button class="ghost-btn" onclick="openAdd(currentCat)">+ add</button>
        </div>
        <div id="catFilters">
          <button class="cf-pill active" data-cf="all">All</button>
          <button class="cf-pill" data-cf="todo">To do</button>
          <button class="cf-pill" data-cf="done">Done</button>
        </div>
        <div id="activityList"></div>
      </div>

    </div>
  </div>

  <!-- ── FORM MODAL ──────────────────────────────── -->
  <div class="overlay hidden" id="formOverlay">
    <div class="modal">
      <div class="modal-title" id="formTitle">New Adventure</div>
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="fTitle" placeholder="e.g. Eat at Din Tai Fung" />
      </div>
      <div class="form-group">
        <label>Category</label>
        <div class="cat-grid" id="catPicker"></div>
      </div>
      <div class="form-group">
        <label>Notes</label>
        <textarea id="fNotes" placeholder="Tips, reminders, why you want to do this..."></textarea>
      </div>
      <div class="form-group">
        <label>Link (optional)</label>
        <input type="url" id="fLink" placeholder="https://..." />
      </div>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal('formOverlay')">Cancel</button>
        <button class="btn-save" onclick="saveItem()">Save</button>
      </div>
    </div>
  </div>

  <!-- ── SURPRISE MODAL ──────────────────────────── -->
  <div class="overlay hidden surprise-overlay" id="surpriseOverlay">
    <div class="modal">
      <div class="s-eyebrow">tonight, let's...</div>
      <div class="s-cat" id="sCat"></div>
      <div class="s-title" id="sTitle"></div>
      <div class="s-notes" id="sNotes"></div>
      <div class="modal-btns">
        <button class="solid-btn" onclick="surpriseMe()" style="border-radius:50px; padding:0.52rem; width:100%;">pick again</button>
        <button class="btn-cancel" onclick="closeModal('surpriseOverlay')">close</button>
      </div>
    </div>
  </div>

  <script>
  // ── CATEGORIES ──────────────────────────────────
  const CATS = {

    { id:42, title:'Catch a free outdoor event',                category:'free',     notes:'Bryant Park movies, Shakespeare in the Park, SummerStage, Celebrate Brooklyn!',          link:'' },

    { id:47, title:'Take a drawing class together',             category:'classes',  notes:'Look for a drop-in session — relaxed and fun, not too serious.',                         link:'' },

    { id:49, title:'Pottery or ceramics class',                 category:'classes',  notes:'Lots of studios in Brooklyn offer beginner classes. Ghost optional.',                    link:'' },
    { id:50, title:'Take a dance class',                        category:'classes',  notes:'Salsa, swing, or something totally random. Neither of us needs to be good at it.',        link:'' },
  ];

  // ── STATE ────────────────────────────────────────
  let items      = [];
  let currentCat = null;
  let catFilter  = 'all';
  let editingId  = null;
  let pickedCat  = 'food';
  const KEY = 'nyc-adv-v3';

  function load() {
    const raw = localStorage.getItem(KEY);
    items = raw ? JSON.parse(raw) : SEED.map(s => ({ ...s, status:'todo', dateCompleted:null, rating:null }));
    if (!raw) save();
  }

  function save() { localStorage.setItem(KEY, JSON.stringify(items)); }

  // ── WHEEL ────────────────────────────────────────
  function renderWheel() {
    const done  = items.filter(a => a.status === 'done').length;
    const todo  = items.filter(a => a.status === 'todo').length;
    const total = items.length;

    document.getElementById('centerNum').textContent = done;
    document.getElementById('statsRow').innerHTML =
      `<span><b>${total}</b> total</span>
       <span><b>${done}</b> done</span>
       <span><b>${todo}</b> to go</span>`;

    const leftPanel = document.querySelector('.left-panel');
    const pw = leftPanel.offsetWidth;
    const ph = leftPanel.offsetHeight;
    const size = Math.min(pw - 48, ph * 0.52, 340);

    const wrap = document.getElementById('wheelWrap');
    wrap.style.width  = size + 'px';
    wrap.style.height = size + 'px';

    wrap.querySelectorAll('.wheel-node').forEach(n => n.remove());

    const cx = size / 2, cy = size / 2;
    const r  = size * 0.375;
    const centerSize = size * 0.24;
    const nodeSize   = size * 0.17;

    const center = document.getElementById('wheelCenter');
    center.style.width  = centerSize + 'px';
    center.style.height = centerSize + 'px';
    document.getElementById('centerNum').style.fontSize   = (centerSize * 0.38) + 'px';
    document.getElementById('centerLabel').style.fontSize = (centerSize * 0.14) + 'px';

    const svg = document.getElementById('wheelSvg');
    svg.innerHTML = '';

    const keys = Object.keys(CATS);
    keys.forEach((key, i) => {
      const cat   = CATS[key];
      const angle = (i * (360 / keys.length) - 90) * Math.PI / 180;
      const nx    = cx + r * Math.cos(angle);
      const ny    = cy + r * Math.sin(angle);

      // Spoke
      const cr = centerSize / 2 + 2, nr = nodeSize / 2 + 2;
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', cx + cr * Math.cos(angle));
      line.setAttribute('y1', cy + cr * Math.sin(angle));
      line.setAttribute('x2', nx - nr * Math.cos(angle));
      line.setAttribute('y2', ny - nr * Math.sin(angle));
      line.setAttribute('stroke', '#D0BFAA');
      line.setAttribute('stroke-width', '1');
      line.setAttribute('stroke-dasharray', '2 4');
      svg.appendChild(line);

      // Node
      const node = document.createElement('div');
      node.className = 'wheel-node' + (currentCat === key ? ' active' : '');
      node.style.cssText = `
        left:${nx}px; top:${ny}px;
        width:${nodeSize}px; height:${nodeSize}px;
        --node-color:${cat.color};
        border-top-color:${cat.color};
      `;
      node.innerHTML = `<div class="node-name" style="font-size:${nodeSize * 0.17}px; color:${currentCat === key ? cat.color : ''}">${cat.label}</div>`;
      node.onclick = () => showCat(key);
      wrap.appendChild(node);
    });
  }

  // ── CATEGORY VIEW ────────────────────────────────
  function showCat(key) {
    currentCat = key;
    catFilter  = 'all';
    document.querySelectorAll('.cf-pill').forEach(p =>
      p.classList.toggle('active', p.dataset.cf === 'all')
    );
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('catView').classList.add('visible');
    renderCatView();
    renderWheel(); // re-render to highlight active node
  }

  function renderCatView() {
    const cat      = CATS[currentCat];
    const catItems = items.filter(a => a.category === currentCat);
    const todo     = catItems.filter(a => a.status === 'todo').length;
    const done     = catItems.filter(a => a.status === 'done').length;

    document.getElementById('catTitle').innerHTML =
      `<span style="font-family:'Playfair Display',serif; font-size:2rem; font-weight:600; color:${cat.color}">${cat.label}</span>`;
    document.getElementById('catSubtitle').textContent = `${todo} to do · ${done} done`;
    document.documentElement.style.setProperty('--node-color', cat.color);

    let visible = catItems.filter(a => catFilter === 'all' || a.status === catFilter);
    visible.sort((a, b) => a.status === b.status ? 0 : a.status === 'todo' ? -1 : 1);

    const list = document.getElementById('activityList');
    list.innerHTML = visible.length
      ? visible.map((a, i) => rowHTML(a, i * 25)).join('')
      : `<div class="empty-row">Nothing here yet — add one above.</div>`;
  }

  function rowHTML(a, delay) {
    const cat    = CATS[a.category] || CATS.food;
    const isDone = a.status === 'done';

    const stars = isDone ? `<div class="stars-row">${
      [1,2,3,4,5].map(n =>
        `<span class="star ${(a.rating||0)>=n?'lit':''}" onclick="rate(${a.id},${n})">&#9733;</span>`
      ).join('')
    }</div>` : '';

    const date = a.dateCompleted ? `<span class="activity-date">${a.dateCompleted}</span>` : '';

    return `
      <div class="activity-row ${isDone?'done':''}"
           style="--node-color:${cat.color}; animation-delay:${delay}ms">
        <div class="status-dot" onclick="toggleDone(${a.id})"></div>
        <div class="activity-body">
          <div class="activity-title" onclick="toggleDone(${a.id})">${esc(a.title)}</div>
          ${a.notes ? `<div class="activity-notes">${esc(a.notes)}</div>` : ''}
          ${a.link  ? `<a href="${esc(a.link)}" target="_blank" rel="noopener" class="activity-link">&#8599; ${linkHost(a.link)}</a>` : ''}
          ${isDone  ? `<div class="activity-meta">${stars}${date}</div>` : ''}
        </div>
        <div class="activity-actions">
          <button class="row-btn" onclick="openEdit(${a.id})" title="Edit">&#9998;</button>
          <button class="row-btn del" onclick="del(${a.id})" title="Delete">&#10005;</button>
        </div>
      </div>`;
  }

  function linkHost(url) {
    try { return new URL(url).hostname.replace('www.', ''); } catch { return 'link'; }
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── ACTIONS ──────────────────────────────────────
  function toggleDone(id) {
    const a = items.find(x => x.id === id);
    if (!a) return;
    if (a.status === 'todo') {
      a.status = 'done';
      a.dateCompleted = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
      confetti();
    } else {
      a.status = 'todo';
      a.dateCompleted = null;
      a.rating = null;
    }
    save();
    renderWheel();
    if (currentCat) renderCatView();
  }

  function rate(id, n) {
    const a = items.find(x => x.id === id);
    if (!a) return;
    a.rating = n; save(); renderCatView();
  }

  function del(id) {
    if (!confirm('Remove this adventure?')) return;
    items = items.filter(x => x.id !== id);
    save(); renderWheel();
    if (currentCat) renderCatView();
  }

  // ── MODAL ────────────────────────────────────────
  function buildCatPicker() {
    document.getElementById('catPicker').innerHTML =
      Object.entries(CATS).map(([key, cat]) => {
        const sel = pickedCat === key;
        return `<div class="cat-opt${sel?' sel':''}"
                     style="${sel ? `background:${cat.color}; border-color:${cat.color};` : ''}"
                     onclick="pickCat('${key}')">${cat.label}</div>`;
      }).join('');
  }

  function pickCat(key) { pickedCat = key; buildCatPicker(); }

  function openAdd(cat) {
    editingId = null;
    pickedCat = cat || currentCat || 'food';
    document.getElementById('formTitle').textContent = 'New Adventure';
    document.getElementById('fTitle').value = '';
    document.getElementById('fNotes').value = '';
    document.getElementById('fLink').value  = '';
    buildCatPicker();
    document.getElementById('formOverlay').classList.remove('hidden');
    setTimeout(() => document.getElementById('fTitle').focus(), 120);
  }

  function openEdit(id) {
    const a = items.find(x => x.id === id);
    if (!a) return;
    editingId = id; pickedCat = a.category;
    document.getElementById('formTitle').textContent = 'Edit Adventure';
    document.getElementById('fTitle').value = a.title;
    document.getElementById('fNotes').value = a.notes || '';
    document.getElementById('fLink').value  = a.link  || '';
    buildCatPicker();
    document.getElementById('formOverlay').classList.remove('hidden');
  }

  function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

  function saveItem() {
    const title = document.getElementById('fTitle').value.trim();
    if (!title) { document.getElementById('fTitle').focus(); return; }
    if (editingId) {
      Object.assign(items.find(x => x.id === editingId), {
        title, category: pickedCat,
        notes: document.getElementById('fNotes').value.trim(),
        link:  document.getElementById('fLink').value.trim(),
      });
    } else {
      items.push({
        id: Date.now(), title, category: pickedCat,
        notes: document.getElementById('fNotes').value.trim(),
        link:  document.getElementById('fLink').value.trim(),
        status: 'todo', dateCompleted: null, rating: null,
      });
    }
    save(); closeModal('formOverlay');
    renderWheel();
    if (currentCat === pickedCat) renderCatView();
    else showCat(pickedCat);
  }

  // ── SURPRISE ME ──────────────────────────────────
  function surpriseMe() {
    const pool = items.filter(a => a.status === 'todo');
    if (!pool.length) { alert("You've done everything! Add more adventures."); return; }
    const pick = pool[Math.floor(Math.random() * pool.length)];
    const cat  = CATS[pick.category] || CATS.food;
    document.getElementById('sCat').textContent  = cat.label;
    document.getElementById('sCat').style.background = cat.color;
    document.getElementById('sTitle').textContent = pick.title;
    document.getElementById('sNotes').textContent = pick.notes || '';
    document.getElementById('surpriseOverlay').classList.remove('hidden');
  }

  // ── CONFETTI ─────────────────────────────────────
  function confetti() {
    const layer  = document.getElementById('confetti-layer');
    const colors = ['#D4703A','#C44A3A','#D4855A','#8B6AAE','#B55A8A','#4A9E6A','#D4A046','#4A8EAA'];
    for (let i = 0; i < 70; i++) {
      const el = document.createElement('div');
      el.className = 'cf';
      const s = Math.random() * 8 + 4;
      el.style.cssText = `
        left:${Math.random()*100}vw; top:-10px;
        width:${s}px; height:${s}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        border-radius:${Math.random()>.5?'50%':'2px'};
        animation-duration:${Math.random()*2+1.4}s;
        animation-delay:${Math.random()*0.5}s;
      `;
      layer.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }
  }

  // ── EVENTS ───────────────────────────────────────
  document.getElementById('catFilters').addEventListener('click', e => {
    const btn = e.target.closest('.cf-pill');
    if (!btn) return;
    catFilter = btn.dataset.cf;
    document.querySelectorAll('.cf-pill').forEach(p => p.classList.toggle('active', p === btn));
    renderCatView();
  });

  document.querySelectorAll('.overlay').forEach(o =>
    o.addEventListener('click', e => { if (e.target === o) o.classList.add('hidden'); })
  );

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape')
      document.querySelectorAll('.overlay').forEach(o => o.classList.add('hidden'));
  });

  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(renderWheel, 150);
  });

  // ── INIT ─────────────────────────────────────────
  load();
  requestAnimationFrame(renderWheel);
  </script>
