<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>our nyc adventure log</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --l-bg:       #17110C;
      --l-text:     #F2EAE0;
      --l-muted:    rgba(242,234,224,0.42);
      --l-border:   rgba(242,234,224,0.11);
      --r-bg:       #F7F3ED;
      --r-text:     #17110C;
      --r-muted:    rgba(23,17,12,0.42);
      --r-border:   rgba(23,17,12,0.10);
      --accent:     #C05A38;
      --node-bg:    #F2E8D8;
      --sh-sm:      0 1px 6px rgba(0,0,0,0.12);
      --sh:         0 3px 14px rgba(0,0,0,0.16);
      --sh-lg:      0 8px 28px rgba(0,0,0,0.22);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    .app { display: flex; min-height: 100vh; }

    /* ── LEFT PANEL ──────────────────────────────── */
    .left-panel {
      width: 50%; flex-shrink: 0;
      display: flex; flex-direction: column; align-items: center;
      padding: 2.5rem 2rem 1.75rem;
      border-right: 1px solid var(--l-border);
      position: sticky; top: 0;
      height: 100vh; overflow: hidden;
      background: var(--l-bg);
      color: var(--l-text);
    }

    .left-panel header {
      text-align: center; margin-bottom: 0.75rem; width: 100%;
    }

    .back-link {
      display: inline-block;
      font-size: 0.65rem; font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--l-muted); text-decoration: none;
      margin-bottom: 0.75rem;
      transition: color .15s;
    }
    .back-link:hover { color: var(--l-text); }

    .eyebrow {
      display: block;
      font-size: 0.68rem; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--l-muted); margin-bottom: 0.4rem;
    }

    .left-panel h1 {
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      font-weight: 600; letter-spacing: -0.03em;
      color: var(--l-text); line-height: 1.1;
    }

    .stats-row {
      display: flex; gap: 1.25rem; justify-content: center;
      margin-top: 0.75rem;
      font-size: 0.75rem; color: var(--l-muted);
    }

    .stats-row b { font-weight: 600; color: var(--l-text); }

    /* ── WHEEL ───────────────────────────────────── */
    #wheelWrap { position: relative; flex-shrink: 0; margin: 0.5rem 0; }

    #wheelSvg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 1;
    }

    #wheelCenter {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: #1F180F;
      border: 1px solid rgba(242,234,224,0.18);
      box-shadow: var(--sh);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; z-index: 3;
      cursor: pointer; transition: background 0.15s, border-color 0.15s;
    }

    #wheelCenter:hover {
      background: #2A1E14;
      border-color: rgba(242,234,224,0.32);
    }

    #wheelCenter.active-done {
      border-color: var(--accent);
    }

    .cat-group-header {
      font-size: 0.68rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.1em;
      padding: 1rem 0 0.4rem;
      border-bottom: 1px solid var(--r-border);
      margin-bottom: 0.25rem;
    }

    #centerNum {
      font-weight: 600; color: var(--accent); line-height: 1;
    }

    #centerLabel {
      font-size: 0.58rem; font-weight: 400;
      color: var(--l-muted); text-transform: uppercase;
      letter-spacing: 0.1em; margin-top: 0.15rem;
    }

    .wheel-node {
      position: absolute; transform: translate(-50%, -50%);
      border-radius: 50%;
      background: var(--node-bg);
      border: 1px solid rgba(242,234,224,0.15);
      box-shadow: var(--sh-sm);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 2;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      text-align: center;
    }

    .wheel-node:hover {
      transform: translate(-50%, -50%) scale(1.1);
      box-shadow: var(--sh);
    }

    .wheel-node.active {
      transform: translate(-50%, -50%) scale(1.06);
      box-shadow: var(--sh-lg);
    }

    .node-name {
      font-weight: 500; line-height: 1.2;
      text-align: center; padding: 0 4px;
      color: #17110C;
    }

    .wheel-node.active .node-name { color: white; }

    /* ── LEFT FOOTER ─────────────────────────────── */
    .left-footer {
      display: flex; gap: 0.6rem; width: 100%;
      margin-top: auto; padding-top: 0.75rem;
    }

    .surprise-btn {
      flex: 1; position: relative; overflow: hidden;
      background: var(--accent); border: none;
      padding: 0.52rem 1rem; border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem; font-weight: 600;
      color: white; cursor: pointer;
      transition: opacity 0.15s;
      box-shadow: 0 2px 10px rgba(192,90,56,0.3);
    }

    .surprise-btn:hover { opacity: 0.88; }

    .surprise-btn::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.18) 50%, transparent 100%);
      transform: translateX(-100%);
      animation: shimmer 2.8s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%   { transform: translateX(-100%); }
      45%  { transform: translateX(100%); }
      100% { transform: translateX(100%); }
    }

    .ghost-btn {
      background: transparent;
      border: 1px solid var(--l-border);
      padding: 0.52rem 1rem; border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem; font-weight: 500;
      color: var(--l-muted); cursor: pointer;
      transition: all 0.15s;
    }

    .ghost-btn:hover {
      border-color: rgba(242,234,224,0.4);
      color: var(--l-text);
    }

    .solid-btn {
      background: var(--accent); border: none;
      padding: 0.52rem 1rem; border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem; font-weight: 500;
      color: white; cursor: pointer;
      transition: opacity 0.15s;
    }

    .solid-btn:hover { opacity: 0.85; }

    /* ── RIGHT PANEL ─────────────────────────────── */
    .right-panel {
      width: 50%; flex-shrink: 0;
      overflow-y: auto; height: 100vh;
      padding: 2.5rem 3rem 4rem;
      background: var(--r-bg); color: var(--r-text);
    }

    /* ── PLACEHOLDER ─────────────────────────────── */
    #placeholder {
      display: flex; align-items: center;
      justify-content: center; min-height: 80vh;
    }

    .placeholder-hint {
      font-size: 0.85rem; font-weight: 400;
      color: var(--r-muted); letter-spacing: 0.02em;
    }

    /* ── CAT VIEW ────────────────────────────────── */
    #catView { display: none; }
    #catView.visible { display: block; }

    #catHeader {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 1rem;
      margin-bottom: 0.35rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--r-border);
    }

    #catTitle {
      font-size: 2rem; font-weight: 600;
      letter-spacing: -0.03em; color: var(--r-text);
      line-height: 1;
    }

    #catSubtitle {
      font-size: 0.72rem; font-weight: 400;
      color: var(--r-muted); margin-top: 0.3rem;
      text-transform: uppercase; letter-spacing: 0.07em;
    }

    /* ── FILTERS ─────────────────────────────────── */
    #catFilters {
      display: flex; gap: 0.75rem;
      margin: 0.9rem 0 0.25rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--r-border);
    }

    .cf-pill {
      padding: 0; border: none; background: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem; font-weight: 500;
      cursor: pointer; color: var(--r-muted);
      text-transform: uppercase; letter-spacing: 0.07em;
      transition: color 0.15s;
      border-bottom: 1.5px solid transparent; padding-bottom: 1px;
    }

    .cf-pill:hover { color: var(--r-muted); }
    .cf-pill.active { color: var(--r-text); border-bottom-color: var(--r-text); }

    /* ── ACTIVITY ROWS ───────────────────────────── */
    .activity-row {
      display: flex; align-items: flex-start; gap: 0.9rem;
      padding: 1rem 0; border-bottom: 1px solid var(--r-border);
      animation: rowIn 0.2s ease backwards;
    }

    @keyframes rowIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .activity-row:last-child { border-bottom: none; }

    .status-dot {
      width: 12px; height: 12px; border-radius: 50%;
      border: 1.5px solid var(--node-color, var(--r-border));
      flex-shrink: 0; margin-top: 4px;
      cursor: pointer; transition: all 0.15s;
    }

    .activity-row.done .status-dot {
      background: var(--node-color); border-color: var(--node-color);
    }

    .status-dot:hover { transform: scale(1.2); }

    .activity-body { flex: 1; min-width: 0; }

    .activity-top {
      display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
    }

    .activity-title {
      font-size: 0.92rem; font-weight: 500;
      color: var(--r-text); cursor: pointer;
      transition: color 0.15s; line-height: 1.4;
    }

    .activity-row.done .activity-title {
      text-decoration: line-through; color: var(--r-muted);
    }

    .activity-title:hover { color: var(--node-color, var(--accent)); }

    .season-tag {
      font-size: 0.58rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.07em;
      padding: 0.15rem 0.45rem; border-radius: 3px;
      color: white; flex-shrink: 0; opacity: 0.9;
    }

    .activity-notes {
      font-size: 0.78rem; font-weight: 300;
      color: var(--r-muted); margin-top: 0.2rem; line-height: 1.65;
    }

    .activity-link {
      font-size: 0.7rem; color: var(--r-muted);
      text-decoration: none; font-weight: 500;
      display: inline-flex; align-items: center; gap: 0.15rem; margin-top: 0.2rem;
    }

    .activity-link:hover { text-decoration: underline; }

    .activity-meta {
      display: flex; align-items: center; gap: 0.55rem; margin-top: 0.3rem;
    }

    .activity-date { font-size: 0.7rem; color: var(--r-muted); }

    .stars-row { display: flex; gap: 1px; }
    .star { font-size: 0.8rem; color: #CCC; cursor: pointer; transition: all 0.1s; }
    .star.lit { color: #C09030; }
    .star:hover { transform: scale(1.2); color: #C09030; }

    .activity-tip {
      font-size: 0.75rem; color: var(--r-muted);
      margin-top: 0.4rem;
      padding: 0.35rem 0.6rem;
      background: rgba(23,17,12,0.04);
      border-left: 2px solid var(--node-color, var(--accent));
      border-radius: 0 4px 4px 0;
      line-height: 1.55;
    }

    .repeat-badge {
      display: inline-flex; align-items: center; gap: 0.25rem;
      font-size: 0.6rem; font-weight: 500; letter-spacing: 0.05em;
      padding: 0.15rem 0.5rem; border-radius: 20px;
      background: rgba(23,17,12,0.07); color: var(--r-muted);
      vertical-align: middle;
    }

    .row-btn.repeat-on { color: var(--accent); }

    .activity-actions {
      display: flex; gap: 0.2rem; opacity: 0;
      transition: opacity 0.15s; flex-shrink: 0; padding-top: 2px;
    }

    .activity-row:hover .activity-actions { opacity: 1; }
    .activity-row.done .activity-actions { opacity: 1; }

    .row-btn {
      width: 24px; height: 24px; border-radius: 4px; border: none;
      background: none; cursor: pointer; font-size: 0.72rem;
      display: flex; align-items: center; justify-content: center;
      color: var(--r-muted); transition: all 0.15s;
    }

    .row-btn:hover { background: var(--r-border); color: var(--r-text); }
    .row-btn.del:hover { background: rgba(192,90,56,0.1); color: var(--accent); }

    .empty-row {
      padding: 2.5rem 0; text-align: center;
      font-size: 0.85rem; color: var(--r-muted); font-style: italic;
    }

    /* ── MODALS ──────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(23,17,12,0.55);
      backdrop-filter: blur(6px);
      z-index: 300;
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem; animation: fadeIn 0.16s ease;
    }

    .overlay.hidden { display: none; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      background: var(--r-bg); border-radius: 10px;
      padding: 1.75rem; width: 100%; max-width: 440px;
      max-height: 92vh; overflow-y: auto;
      animation: modalPop 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: var(--sh-lg); border: 1px solid var(--r-border);
    }

    @keyframes modalPop {
      from { opacity: 0; transform: scale(0.94) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-title {
      font-size: 1.2rem; font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 1.3rem; color: var(--r-text);
    }

    .form-group { margin-bottom: 0.95rem; }

    .form-group label {
      display: block; font-size: 0.68rem; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--r-muted); margin-bottom: 0.3rem;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%; padding: 0.55rem 0.8rem;
      border: 1px solid var(--r-border); border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem; color: var(--r-text);
      outline: none; transition: border-color 0.15s;
      background: white;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus { border-color: rgba(23,17,12,0.35); }

    .form-group textarea { resize: vertical; min-height: 70px; }

    .cat-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.35rem; }

    .cat-opt {
      padding: 0.45rem 0.2rem; border-radius: 6px;
      border: 1px solid var(--r-border); cursor: pointer;
      transition: all 0.15s; text-align: center;
      font-size: 0.72rem; font-weight: 500;
      color: var(--r-muted); background: white;
    }

    .cat-opt:hover { border-color: var(--r-muted); color: var(--r-text); }
    .cat-opt.sel { color: white; border-color: transparent; }

    .modal-btns { display: flex; gap: 0.6rem; margin-top: 1.3rem; }

    .btn-cancel {
      flex: 1; padding: 0.5rem 1rem; border-radius: 6px;
      border: 1px solid var(--r-border); font-family: 'DM Sans', sans-serif;
      font-weight: 500; font-size: 0.82rem;
      cursor: pointer; background: transparent; color: var(--r-muted);
      transition: all 0.15s;
    }

    .btn-cancel:hover { background: var(--r-border); }

    .btn-save {
      flex: 2; padding: 0.5rem 1.2rem; border-radius: 6px; border: none;
      font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 0.82rem;
      cursor: pointer; background: var(--accent); color: white;
      transition: opacity 0.15s;
    }

    .btn-save:hover { opacity: 0.85; }

    /* ── SURPRISE MODAL ──────────────────────────── */
    .surprise-overlay .modal {
      max-width: 400px; text-align: center;
      padding: 2.25rem 2rem 1.75rem;
    }

    .s-eyebrow {
      font-size: 0.68rem; font-weight: 500; text-transform: uppercase;
      letter-spacing: 0.14em; color: var(--r-muted); margin-bottom: 1rem; display: block;
    }

    .s-cat {
      display: inline-block; font-size: 0.7rem; font-weight: 600;
      padding: 0.3rem 1rem; border-radius: 20px; color: white;
      margin-bottom: 1.1rem; text-transform: uppercase; letter-spacing: 0.09em;
    }

    .s-title {
      font-size: 1.6rem; font-weight: 600; letter-spacing: -0.03em;
      margin-bottom: 0.75rem; line-height: 1.2; color: var(--r-text);
    }

    .s-title.reveal {
      animation: revealUp 0.38s cubic-bezier(0.22, 1, 0.36, 1);
    }

    @keyframes revealUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .s-notes {
      font-size: 0.83rem; font-weight: 300; color: var(--r-muted);
      line-height: 1.7; margin-bottom: 1.25rem;
    }

    .surprise-overlay .modal-btns { flex-direction: column; }

    /* ── CONFETTI ────────────────────────────────── */
    #confetti-layer { position: fixed; inset: 0; pointer-events: none; z-index: 9999; }
    .cf { position: absolute; animation: cfFall linear forwards; }

    @keyframes cfFall {
      0%   { transform: translateY(-10px) rotate(0deg); opacity: 1; }
      85%  { opacity: 0.8; }
      100% { transform: translateY(105vh) rotate(700deg); opacity: 0; }
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(23,17,12,0.15); border-radius: 2px; }

    /* ── MOBILE ──────────────────────────────────── */
    @media (max-width: 860px) {
      .app { flex-direction: column; }
      .left-panel { width: 100%; position: static; height: auto; border-right: none; border-bottom: 1px solid var(--l-border); padding-bottom: 1.75rem; }
      .right-panel { width: 100%; height: auto; padding: 1.75rem 1.5rem 3rem; }
      #placeholder { min-height: 20vh; }
    }
  </style>
</head>
<body>
  <div id="confetti-layer"></div>

  <div class="app">
    <!-- ── LEFT PANEL ──────────────────────────────── -->
    <div class="left-panel">
      <header>
        <a class="back-link" href="https://annalinhvu.github.io">← annalinhvu.github.io</a>
        <span class="eyebrow">a journal of things to do</span>
        <h1>our nyc adventure log</h1>
        <div class="stats-row" id="statsRow"></div>
      </header>
      <div id="wheelWrap">
        <svg id="wheelSvg"></svg>
        <div id="wheelCenter" onclick="showAllDone()">
          <div id="centerNum"></div>
          <div id="centerLabel">done</div>
        </div>
      </div>
      <div class="left-footer">
        <button class="surprise-btn" onclick="surpriseMe()">&#9829; pick one</button>
        <button class="ghost-btn" style="flex:1" onclick="openAdd(null)">+ add</button>
      </div>
    </div>

    <!-- ── RIGHT PANEL ─────────────────────────────── -->
    <div class="right-panel">
      <div id="placeholder">
        <span class="placeholder-hint">Select a category from the wheel to explore</span>
      </div>
      <div id="catView">
        <div id="catHeader">
          <div>
            <div id="catTitle"></div>
            <div id="catSubtitle"></div>
          </div>
          <button class="ghost-btn" style="border-color:var(--r-border); color:var(--r-muted);" onmouseover="this.style.borderColor='rgba(23,17,12,0.35)'; this.style.color='var(--r-text)'" onmouseout="this.style.borderColor='var(--r-border)'; this.style.color='var(--r-muted)'" onclick="openAdd(currentCat)">+ add</button>
        </div>
        <div id="catFilters">
          <button class="cf-pill active" data-cf="all">All</button>
          <button class="cf-pill" data-cf="todo">To do</button>
          <button class="cf-pill" data-cf="done">Done</button>
        </div>
        <div id="activityList"></div>
      </div>
    </div>
  </div>

  <!-- ── FORM MODAL ──────────────────────────────── -->
  <div class="overlay hidden" id="formOverlay">
    <div class="modal">
      <div class="modal-title" id="formTitle">New Adventure</div>
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="fTitle" placeholder="e.g. Eat at Din Tai Fung" />
      </div>
      <div class="form-group">
        <label>Category</label>
        <div class="cat-grid" id="catPicker"></div>
      </div>
      <div class="form-group">
        <label>Notes</label>
        <textarea id="fNotes" placeholder="Tips, details, why you want to do this..."></textarea>
      </div>
      <div class="form-group">
        <label>Link (optional)</label>
        <input type="url" id="fLink" placeholder="https://..." />
      </div>
      <div class="form-group">
        <label>Best season</label>
        <select id="fSeason">
          <option value="any">Any time</option>
          <option value="spring">Spring</option>
          <option value="summer">Summer</option>
          <option value="fall">Fall</option>
          <option value="winter">Winter</option>
        </select>
      </div>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal('formOverlay')">Cancel</button>
        <button class="btn-save" onclick="saveItem()">Save</button>
      </div>
    </div>
  </div>

  <!-- ── SURPRISE MODAL ──────────────────────────── -->
  <div class="overlay hidden surprise-overlay" id="surpriseOverlay">
    <div class="modal">
      <span class="s-eyebrow">tonight, let's...</span>
      <div class="s-cat" id="sCat"></div>
      <div class="s-title" id="sTitle"></div>
      <div class="s-notes" id="sNotes"></div>
      <div id="sTip" style="display:none;font-size:0.75rem;color:var(--r-muted);background:rgba(23,17,12,0.05);border-radius:6px;padding:0.5rem 0.8rem;margin-bottom:1.2rem;line-height:1.55;text-align:left;"></div>
      <div class="modal-btns">
        <button class="solid-btn" onclick="surpriseMe()" style="border-radius:6px; padding:0.52rem; width:100%;">pick again</button>
        <button class="btn-cancel" onclick="closeModal('surpriseOverlay')">close</button>
      </div>

  </div>

  <script>
  const CATS = {
    cinema:   { label: 'Cinema',   color: '#C4703A' },
    food:     { label: 'Food',     color: '#B84838' },
    bakery:   { label: 'Bakeries', color: '#C49048' },
    arts:     { label: 'Arts',     color: '#6860A8' },
    shows:    { label: 'Shows',    color: '#A05890' },
    explore:  { label: 'Explore',  color: '#3E9060' },
    wellness: { label: 'Wellness', color: '#A87838' },
    daytrip:  { label: 'Day Trip', color: '#3880B0' },
    free:     { label: 'Free',     color: '#508848' },
    classes:  { label: 'Classes',  color: '#3868A8' },
  };

  const SEASON_COLORS = { spring:'#5E8848', summer:'#B87828', fall:'#9A5828', winter:'#3A6888' };

  const SEED = [
    // ── cinema ──────────────────────────────────────────────────────
    { id:1,  title:'A Screenslate director deep dive',           category:'cinema',   season:'any',    notes:'Pick a director. Watch two of their films at different indie theaters in one day. Use it as an excuse to wander between neighborhoods.', tip:'Free to browse at screenslate.com, use their guides to find themed double bills or obscure retrospectives happening this week.', link:'https://www.screenslate.com' },
    { id:2,  title:'Dine-in film night at Nitehawk',             category:'cinema',   season:'any',    notes:'Order food at your seat before the film starts. Pick something neither of us has heard of, the weirder the better.', tip:'Two locations: Williamsburg (136 Metropolitan Ave) and Prospect Park (188 Prospect Park West). Book online, ~$20/ticket + food.' },
    { id:3,  title:'Late show and drinks at Metrograph',         category:'cinema',   season:'any',    notes:'See the late screening, then go downstairs to the bar and stay too long. The programming is always impeccable.', tip:'7 Ludlow St, Lower East Side. Tickets ~$18. The bar stays open after screenings. Cult and international films, check their calendar ahead of time.' },
    { id:4,  title:'IFC Center: pick a film blindly',            category:'cinema',   season:'any',    notes:'A foreign film neither of us has researched. No reading reviews first. No trailers. Just go.', tip:'323 Sixth Ave, West Village. Tickets ~$18. Rush tickets sometimes available. Multiple screens: foreign, indie, and revival programming daily.' },
    { id:5,  title:'A cult classic night at BAM',                category:'cinema',   season:'any',    notes:'Brooklyn Academy of Music runs themed retrospectives and special screenings all year. The building is worth the trip alone.', tip:'30 Lafayette Ave, Fort Greene. Tickets ~$17. Often features filmmaker Q&As. Check bam.org for the current series.' },
    { id:6,  title:'Avant-garde night at Anthology Film Archives', category:'cinema', season:'any',    notes:'The most genuinely weird, ambitious cinema programming in the city. Nothing is straightforward. That\'s the whole point.', tip:'32 Second Ave, East Village. Tickets ~$12. Their Essential Cinema series runs Sundays. Genuinely one-of-a-kind programming.' },
    { id:7,  title:'Rooftop Cinema Club',                        category:'cinema',   season:'summer', notes:'Outdoor screenings on rooftops around the city. Bring a blanket. Headphones are provided.', tip:'Multiple rooftop locations across the city. Reserve well in advance, these sell out weeks ahead. Check their website for the current lineup.' },
    { id:8,  title:'NYFF or repertory night at Film at Lincoln Center', category:'cinema', season:'any', notes:'The New York Film Festival runs every October. Year-round programming is equally good: international films, restorations, filmmaker conversations.', tip:'165 W 65th St, Upper West Side. Regular screenings ~$15. NYFF tickets sell out fast, check filmlinc.org in September. Filmmaker talks are often free.' },
    // ── food ────────────────────────────────────────────────────────
    { id:9,  title:'Xiao long bao afternoon in Flushing',        category:'food',     season:'any',    notes:'The crab & pork soup dumplings at Joe\'s Shanghai. Not the Manhattan location, the Flushing one. Make a whole afternoon of the neighborhood.', tip:'136-21 37th Ave, Flushing. Arrive before noon or after 2pm to avoid the worst of the wait. Cash-friendly. 7 train to Flushing-Main St.' },
    { id:10, title:'Olive Garden endless pasta bowl',            category:'food',     season:'any',    notes:'The point is the breadsticks. Also the soup. Also the pasta. Absolutely no shame whatsoever.', tip:'The Times Square location (2 Times Square) is huge and easier to walk into. The Endless Pasta Bowl runs seasonally, check their website before going.' },
    { id:11, title:'Mafaldini with pink peppercorns at Lilia',   category:'food',     season:'any',    notes:'One of the best pasta dishes in the city. The room is warm and loud and exactly right.', tip:'567 Union Ave, Williamsburg. Book on Resy 4–6 weeks out. ~$80–100/person with wine. Ask for a table in the main room, not the back.' },
    { id:12, title:'Lamb noodles at Xi\'an Famous Foods',        category:'food',     season:'any',    notes:'Spicy cumin lamb hand-ripped noodles, eaten standing at the counter. Order the spicy level you actually want.', tip:'Multiple locations. St. Marks Place (81 St. Marks) is the most atmospheric. ~$15–20/person. Get there before the lunch rush or after 2pm.' },
    { id:13, title:'BYO pizza night at Lucali',                  category:'food',     season:'any',    notes:'No reservations, BYO wine. Get there at 5pm and put your name in. The wait is genuinely part of the experience. The pizza is perfect.', tip:'575 Henry St, Carroll Gardens. Cash only. ~$30–40 for a pie. Bring a good bottle. The walk from Smith-9th Sts station takes about 10 min.' },
    { id:14, title:'Porterhouse for two at Peter Luger',         category:'food',     season:'any',    notes:'The steak sauce. The schlag. The bread. Cash only. An institution in the best and most stubborn sense.', tip:'178 Broadway, Williamsburg. Cash or their own debit card ONLY. Porterhouse for two ~$120+. Reserve by phone: (718) 387-7400. Lunch is easier to get than dinner.' },
    { id:15, title:'The Classic board at Russ & Daughters Cafe', category:'food',     season:'any',    notes:'Smoked fish, cream cheese, bagel. A Dr. Brown\'s cream soda. Read the walls. This appetizing shop has been here since 1914.', tip:'127 Orchard St, Lower East Side. Reservations on Resy recommended, walk-in waits can be long. ~$30–50/person. The original appetizing shop is at 179 E Houston.' },
    { id:16, title:'Genuinely spicy Thai at Ugly Baby',          category:'food',     season:'any',    notes:'Thai food that actually makes you sweat. Get the khao soi and the dry-fried catfish. They do not dumb down the heat.', tip:'407 Smith St, Carroll Gardens. Book on Resy, usually 1–2 weeks out. ~$50–70/person. Cash preferred. Not for people who ask for "mild."' },
    { id:17, title:'Dinner at Tatiana by Kwame Onwuachi',        category:'food',     season:'any',    notes:'Nigerian, Caribbean, Southern, all at once, all gorgeous. The best dining room view in the city. An actual event.', tip:'10 Lincoln Center Plaza, Upper West Side. Book on Resy 2–4 weeks out. ~$80–120/person. The bar does excellent cocktails if you can\'t get a dinner reservation.' },
    { id:18, title:'Veggie burger and sundae at Superiority Burger', category:'food', season:'any',    notes:'Tiny, cheap, and genuinely one of the most interesting menus in NYC. The veggie burger is not a compromise, it\'s better than most real ones.', tip:'119 St. Marks Place, East Village. ~$15–20/person. Cash and card. Small room, often a line. The butterscotch sundae is not optional.' },
    { id:19, title:'One Michelin-star splurge night',            category:'food',     season:'any',    notes:'Pick one we\'ve been putting off. No occasion needed, just decide to do it.', tip:'Don Angie (163 W 10th, book far ahead on Resy), Foxface (walk-in bar seats often available), Musket Room (265 Elizabeth, quieter, easier to get). ~$100–150/person.' },
    // ── bakeries ────────────────────────────────────────────────────
    { id:20, title:'Chocolate babka at Breads Bakery',           category:'bakery',   season:'any',    notes:'The best babka in New York, and that\'s saying something. Get there before noon, it sells out.', tip:'18 E 16th St, Union Square. Opens 7am. Also at Bryant Park. The pistachio roll and cheese bourekas are excellent too. ~$12 for the babka.' },
    { id:21, title:'Saturday pastry crawl through Cobble Hill',  category:'bakery',   season:'spring', notes:'Start at Bien Cuit, get a croissant, then just walk. Let the neighborhood decide what\'s next.', tip:'Bien Cuit is at 120 Smith St. Add Colonie Coffee (127 Atlantic Ave) for a cortado. Free, just budget ~$20–30 for pastries. B/Q/R to Bergen St.' },
    { id:22, title:'Whatever seasonal thing at Dominique Ansel', category:'bakery',   season:'any',    notes:'Whatever they\'re doing this month will be worth it. The seasonal specials are the whole reason to go.', tip:'189 Spring St, SoHo. Opens 8am. Check their Instagram for current specials. ~$6–12/item. The DKA (caramelized kouign-amann) is always on the menu.' },
    { id:23, title:'Baguette and croissant walk through SoHo',   category:'bakery',   season:'spring', notes:'Buy a baguette and an almond croissant at Balthazar. Eat them while wandering SoHo. This is the whole plan.', tip:'80 Spring St, SoHo. Opens 7:30am weekdays, 8am weekends. ~$4–10. Counter service only. The almond croissant is one of the best in the city.' },
    { id:24, title:'Tahini cookie and cortado at Mah Ze Dahr',   category:'bakery',   season:'any',    notes:'Small, warm, and very good. The tahini cookie is the thing, but everything here is worth trying.', tip:'28 Greenwich Ave, West Village. Opens 7am. ~$4–8/item. Very small space, get something to go and walk the neighborhood.' },
    { id:25, title:'Croissant at Pain D\'Avignon, then the High Line', category:'bakery', season:'any', notes:'Get a croissant at Pain D\'Avignon in Chelsea Market, then walk straight to the High Line entrance two blocks away.', tip:'75 9th Ave inside Chelsea Market. ~$5–12/item. High Line entrance is at W 16th St & 10th Ave. One of the best croissants in the city.' },
    { id:26, title:'Laminated pastries at Supermoon Bakehouse',  category:'bakery',   season:'any',    notes:'Inventive laminated pastries in the Lower East Side. Creative flavor combinations, never just a plain croissant.', tip:'120 Rivington St, LES. Opens 8am. Weekend lines move quickly. ~$6–9/item. Limited quantities, get there before 10am to guarantee the good stuff.' },
    // ── shows ────────────────────────────────────────────────────────
    { id:27, title:'Broadway day-of at TKTS',                    category:'shows',    season:'any',    notes:'Show up at noon. Pick whatever has the best deal. No overthinking, no researching, no agenda.', tip:'Times Square TKTS booth opens at noon for matinees, 3pm for evening shows. Discounts 20–50% off. Card accepted, no fee. The app also sells TKTS tickets.', link:'https://www.tdf.org/nyc/7/TKTS-ticket-booths' },
    { id:28, title:'New play at Playwrights Horizons',           category:'shows',    season:'any',    notes:'More interesting than most of what\'s on Broadway. New work, small stages, weirder ideas. Often the best theater in the city.', tip:'416 W 42nd St, Hell\'s Kitchen. Tickets ~$35–85. Rush tickets often available via TodayTix app on the day of the show.' },
    { id:29, title:'The Comedy Cellar on a Tuesday night',       category:'shows',    season:'any',    notes:'Smaller crowd, more unpredictable lineup. Famous for unannounced drop-ins. One of the city\'s great institutions.', tip:'117 MacDougal St, Greenwich Village. ~$30 + 2-drink minimum. Reserve online. Shows at 9pm and 11pm. Strict no-phone policy, they mean it.' },
    { id:30, title:'Village Vanguard on a Sunday',               category:'shows',    season:'any',    notes:'The most legendary jazz club in the world. Arrive early. Order one drink. Stay for both sets.', tip:'178 7th Ave S, West Village. Sets at 8pm and 10pm, ~$30 + one-drink minimum. Cash preferred. Arrive 30 min early for a good seat. Sunday residencies are special.' },
    { id:31, title:'Lincoln Center outdoor concert series',      category:'shows',    season:'summer', notes:'Free and ticketed outdoor events all summer long: Midsummer Night Swing, concerts, screenings. The plaza on a summer night is magic.', tip:'Damrosch Park, W 62nd St. Check lincolncenter.org for the summer calendar. Midsummer Night Swing (dancing!) runs July–Aug. Most events free.' },
    { id:32, title:'A night at the Met Opera',                   category:'shows',    season:'winter', notes:'You don\'t need to know opera. Pick something dramatic. Dress up a little. It\'s one of the great rooms in the city.', tip:'30 Lincoln Center Plaza. Standing room tickets $25 available day-of at 10am, they go fast. Regular seats $80–300. Book on metopera.org.' },
    // ── arts ─────────────────────────────────────────────────────────
    { id:33, title:'Live music at Baby\'s All Right',            category:'arts',     season:'any',    notes:'The perfect medium-sized venue. Not too big, not too small. Always something interesting on the calendar.', tip:'146 Broadway, Williamsburg. Tickets ~$15–30. Check Resident Advisor or their Instagram. Bar opens before the show, get there early for a spot.', link:'https://ra.co/events/us/newyork' },
    { id:34, title:'MoMA PS1 on a Saturday afternoon',          category:'arts',     season:'any',    notes:'No plan. Just wander. The building is a converted school. The art is always stranger and better than expected.', tip:'22-25 Jackson Ave, Long Island City. 7 train from Times Square, 7 min. ~$10 suggested. Free with MoMA membership. Warm Up parties run July–Sept.' },
    { id:35, title:'The Met: one wing, two hours',               category:'arts',     season:'any',    notes:'Don\'t try to see all of it. Pick one period you\'re curious about and really stay with it. This is the only way.', tip:'1000 5th Ave. Pay what you wish (NYC residents). Suggested $30. The Islamic Art galleries and the Arms & Armor rooms are often uncrowded. Open until 9pm on Fri/Sat.' },
    { id:36, title:'Afternoon at the Whitney',                   category:'arts',     season:'any',    notes:'American art, including the Biennial and major contemporary exhibitions. The Hudson River views from the upper floors alone are worth the trip.', tip:'99 Gansevoort St, Meatpacking. ~$25. Free Fridays 5–10pm. The top-floor terrace has some of the best views in the city. Take the stairs.' },
    { id:37, title:'Nuyorican Poets Cafe Friday slam',           category:'arts',     season:'any',    notes:'East Village. Very alive, very New York. Nothing like it anywhere else in the city.', tip:'236 E 3rd St, East Village. ~$15, buy in advance, it sells out. Doors at 9pm, slam starts around 10pm. Get there early for a good seat.' },
    { id:38, title:'Dia: Chelsea on a slow weekday',             category:'arts',     season:'any',    notes:'Massive minimalist works in West Chelsea warehouse spaces. Go slow. Take your time with each room. It changes the way you see.', tip:'537 W 22nd St, Chelsea. ~$8. Best visited on a weekday when it\'s quiet. The Richard Serra sculptures need space and silence to work on you.' },
    { id:39, title:'Brooklyn Museum First Saturday',             category:'arts',     season:'any',    notes:'Free 5–11pm on the first Saturday of every month. Live music, dancing, art, and actual community. One of the best nights out in Brooklyn.', tip:'200 Eastern Pkwy, Crown Heights. Free after 5pm on first Saturdays. 2/3 to Eastern Pkwy-Brooklyn Museum. Check their calendar for the monthly theme.' },
    // ── explore ──────────────────────────────────────────────────────
    { id:40, title:'Get off at a random subway stop',            category:'explore',  season:'any',    notes:'Pick a neighborhood we\'ve never really walked. Get off. Walk for two hours with no destination. This is reliably a great day.', tip:'Good targets: Kingsbridge (A), Rockaway Beach (A/S summer), Tottenville (Staten Island Railway), Mott Haven (6), or just close your eyes and pick.' },
    { id:41, title:'Governors Island by bike',                   category:'explore',  season:'summer', notes:'Free ferry from Lower Manhattan. Rent bikes once you\'re there. Bring snacks. Come back on the last ferry of the day.', tip:'Ferry from Battery Maritime Building, next to Whitehall station. Free. Open May–Oct, weekends only early in the season. Bikes rent ~$15/hr on the island.' },
    { id:42, title:'Walk the High Line end to end',              category:'explore',  season:'spring', notes:'Start at 34th St and walk all the way south. Stop for tacos at Los Tacos No. 1. End at the Whitney for a view.', tip:'Free. Entrance at 34th St (north) or Gansevoort St (south). Los Tacos No. 1 is at the 10th Ave Square section. The full walk is about 1.5 miles, 45 min.' },
    { id:43, title:'A full day in Flushing',                     category:'explore',  season:'any',    notes:'Korean spa in the morning. Dim sum somewhere off the main drag. Bubble tea. Night market if you stay late.', tip:'7 train to Flushing-Main St. Spa Castle (~$50, bring flip flops). Golden Shopping Mall basement for cheap hand-pulled noodles. Night market on weekends in summer.' },
    { id:44, title:'The Cloisters on a quiet morning',           category:'explore',  season:'fall',   notes:'A train to the end of Washington Heights. Medieval art and gardens suspended above the Hudson. Slow all the way down.', tip:'99 Margaret Corbin Drive, Fort Tryon Park. A train to 190th St. Pay what you wish. Go before noon for empty galleries. Give yourself 2–3 hours minimum.' },
    { id:45, title:'Red Hook waterfront afternoon',              category:'explore',  season:'summer', notes:'Bakery, then walk to the waterfront, then Hometown Bar-B-Que. The skyline view from the water is one of the best in the city.', tip:'B61 bus from Jay St-MetroTech, or walk from Smith-9th Sts (F/G). Hometown BBQ opens at noon. Baked in Red Hook for pie. Pier 44 is free.' },
    { id:46, title:'Boardwalk day at Coney Island',              category:'explore',  season:'summer', notes:'All the way to the end of the D train. Walk the boardwalk. Get a Nathan\'s hot dog. Ride something that makes you scream.', tip:'D, F, N, or Q to Coney Island-Stillwell Ave. Nathan\'s is right on the boardwalk. Luna Park rides from ~$10 each. Best June–August. Brighton Beach is a 10-min walk for Russian food.' },
    // ── wellness ─────────────────────────────────────────────────────
    { id:47, title:'Full platza treatment at the Russian Baths', category:'wellness', season:'winter', notes:'Go back and forth between the rooms for at least 3 hours. The oak leaf scrub is not optional. Cash only.', tip:'268 E 10th St, East Village. ~$40–60 for full access. Cash preferred. Men-only and mixed-gender hours vary, check banyas.com before going.' },
    { id:48, title:'Aire Ancient Baths in Tribeca',              category:'wellness', season:'any',    notes:'The aromatherapy bath. Book ahead. Leave your phone in the locker and actually mean it.', tip:'88 Franklin St, Tribeca. ~$80–130/person for 90 min. Book 2–3 weeks in advance at beaire.com. Add the wine pairing. Strict phone-free environment.' },
    { id:49, title:'Sound bath at MNDFL',                        category:'wellness', season:'winter', notes:'Try to actually stay awake. Some people can\'t. You\'ll feel strange and calm after, for the rest of the day.', tip:'Multiple locations, book at mndfl.com. ~$35–50/session. 45–60 min. Wear comfortable layers, the room gets cool. Arrive 10 min early.' },
    { id:50, title:'Float therapy: one hour in the dark',       category:'wellness', season:'any',    notes:'One hour alone in a dark saltwater tank. Sounds strange. Is strange. Then it\'s genuinely amazing.', tip:'Lift/Next Level Float Studio (multiple locations), ~$80–100/session. First-time discounts often available. 60 or 90-min options. No experience or equipment needed.' },
    { id:51, title:'Infrared sauna at HigherDOSE',               category:'wellness', season:'winter', notes:'45 minutes. Bring something to listen to and a lot of water. Genuinely restorative in a way that surprises you.', tip:'HigherDOSE has locations in Flatiron and NoMad. ~$65 for 45 min. Book at higherdose.com, 1–2 weeks ahead is usually enough. Towels provided.' },
    { id:52, title:'Community acupuncture together',             category:'wellness', season:'any',    notes:'Find a community acupuncture spot with sliding scale pricing, side by side in recliners. Just try it once.', tip:'New York Community Acupuncture (multiple locations) offers sliding scale $30–50. Book online at nycommunityacupuncture.com. No referral needed.' },
    // ── day trips ────────────────────────────────────────────────────
    { id:53, title:'A gallery day in Hudson, NY',                category:'daytrip',  season:'fall',   notes:'Walk Warren St gallery by gallery. Eat somewhere good for dinner. Take the last Amtrak back before dark.', tip:'Amtrak Empire Service from Penn Station, ~2 hrs, ~$30–60 RT. The train station is a 10-min walk from Warren St. October foliage is spectacular.' },
    { id:54, title:'Dia:Beacon and a walk through town',         category:'daytrip',  season:'any',    notes:'Metro-North from Grand Central. Spend the afternoon at Dia. Walk back through Beacon. One of the best day trips possible from the city.', tip:'Metro-North Hudson Line from Grand Central, ~1.5 hrs, ~$30 RT. Dia open Thu–Mon, ~$20 admission. Buy train tickets in advance on weekends, it fills up.' },
    { id:55, title:'Catskills hike and a diner on the way back', category:'daytrip',  season:'fall',   notes:'Zipcar or rental. Kaaterskill Falls or Slide Mountain. Stop at any roadside diner on the way home. Go in October for foliage.', tip:'Kaaterskill Falls parking lot fills by 9am on weekends, leave the city by 7am. Slide Mountain is a 4-hr round trip hike. Stewart\'s for snacks on the way.' },
    { id:56, title:'Boardwalk weekend in Asbury Park, NJ',       category:'daytrip',  season:'summer', notes:'Walk the boardwalk, swim if it\'s warm, find live music in the evening. A very easy, very good day.', tip:'NJ Transit North Jersey Coast Line from Penn Station, ~1.5 hrs, ~$25 RT. The Wonder Bar and Asbury Lanes are local staples. Check for weekend shows.' },
    { id:57, title:'Campus walk and bookshop in Princeton, NJ',  category:'daytrip',  season:'spring', notes:'NJ Transit to Princeton. Walk the campus in the spring. Browse Labyrinth Books. Eat somewhere good.', tip:'NJ Transit Northeast Corridor from Penn Station to Princeton Junction, ~1 hr, ~$25 RT, then shuttle to campus. Labyrinth Books on Nassau St. Small World Coffee.' },
    { id:58, title:'Fire Island for a day',                      category:'daytrip',  season:'summer', notes:'Ferry from Bay Shore. Bring everything you need, there are no cars. A completely different pace for one whole day.', tip:'LIRR from Penn to Bay Shore (~1 hr, ~$15), then ferry (~$12 each way). Rent bikes or walk. Bring sunscreen, food, and cash. Open May–Oct.' },
    // ── free ─────────────────────────────────────────────────────────
    { id:59, title:'MoMA free Friday evening',                   category:'free',     season:'any',    notes:'Free admission 5–9pm on Fridays. Get there at 4:30 before the line forms outside.', tip:'11 W 53rd St, Midtown. Free 5–9pm every Friday. The sculpture garden is often uncrowded even when the galleries are busy. Stay for dinner in the neighborhood after.' },
    { id:60, title:'Shakespeare in the Park at Delacorte',       category:'free',     season:'summer', notes:'Free tickets, get in line early or enter the digital lottery. The experience of watching Shakespeare outside in Central Park on a summer night is irreplaceable.', tip:'Delacorte Theater, Central Park. Same-day free tickets: line at 7am at the theater OR enter the digital lottery via the Shakespeare in the Park app. Mid-June through August.' },
    { id:61, title:'SummerStage concert in Central Park',        category:'free',     season:'summer', notes:'Free concerts all summer at Rumsey Playfield. Bring a blanket and arrive early for a good spot on the grass.', tip:'Rumsey Playfield, Central Park (E 72nd St entrance). Check cityparksfoundation.org for the calendar. Most events free; some benefit concerts are ticketed. June–Sept.' },
    { id:62, title:'Hotel rooftop bar crash in summer',          category:'free',     season:'summer', notes:'Walk in with confidence. One drink each. Enjoy the view. This is a perfectly acceptable thing to do.', tip:'Williamsburg Hotel (96 Wythe Ave) and 1 Hotels Brooklyn Bridge (60 Furman St) both have rooftops accessible from the lobby. Dress up a little, it helps.' },
    { id:63, title:'A full Sunday in Prospect Park',             category:'free',     season:'spring', notes:'Morning walk. Afternoon nap in the Long Meadow. Nowhere to be, nothing to do. This is always a better day than you expect.', tip:'Any B/Q train to Prospect Park. Smorgasburg runs at Breeze Hill every Sunday May–Oct (~$10 per dish). The Boathouse Café for coffee on the way in.' },
    { id:64, title:'Brooklyn Botanic Garden in cherry blossom season', category:'free', season:'spring', notes:'Go during the cherry blossom peak, ideally on a weekday. It\'s genuinely one of the most beautiful things in the city.', tip:'150 Eastern Pkwy, Crown Heights. Free Tuesdays and some other days, check bbg.org. The Cherry Blossom Festival draws huge weekend crowds; go mid-week if possible.' },
    { id:65, title:'Staten Island Ferry at golden hour',         category:'free',     season:'any',    notes:'Completely free. Some of the best views of Lower Manhattan and the Statue of Liberty in the city.', tip:'Whitehall Terminal, Lower Manhattan. Free, runs 24/7. Trip takes 25 min each way. Step off in St. George, walk around briefly, get back on the next one.' },
    { id:66, title:'Hotel rooftop bar in winter',                category:'free',     season:'winter', notes:'Less crowded than summer. Heated outdoor bars, dark city views, a hot drink. Genuinely great.', tip:'The Gansevoort (18 9th Ave) and The Standard High Line (848 Washington St) have heated outdoor bars. Dress up slightly, it helps at the door.' },
    // ── classes ──────────────────────────────────────────────────────
    { id:67, title:'Drop-in life drawing class',                 category:'classes',  season:'any',    notes:'A drop-in studio session, no experience needed. Surprisingly meditative and humbling. A good reset.', tip:'Art Students League (215 W 57th St) offers drop-in sessions ~$25–35. No registration needed. Check artstudentsleague.org for open life drawing schedule.' },
    { id:68, title:'Beginner ASL intro workshop',                category:'classes',  season:'any',    notes:'A 2-hour intro class. A genuinely useful skill that\'s also just really interesting to try together.', tip:'Check Eventbrite for weekend intro sessions, typically ~$30–50. ASL classes also run at the Center for Deaf and Hard of Hearing in White Plains, accessible by Metro-North.' },
    { id:69, title:'Wheel throwing pottery class at Choplet',    category:'classes',  season:'any',    notes:'Beginner wheel throwing in Williamsburg. You will make something lopsided. You will love it.', tip:'108 N 7th St, Williamsburg. ~$70–85 for a 2-hr session. Book at choplet.com. They fire your piece after and you pick it up a few weeks later, plan accordingly.' },
    { id:70, title:'Beginner salsa or swing dance class',        category:'classes',  season:'any',    notes:'Neither of us needs to be good. That\'s the whole point. One lesson leads to social dancing the same night.', tip:'Swing 46 (349 W 46th St): beginner lesson at 8pm before the social dancing, ~$20. For salsa: Sandra Cameron Dance Center (10 E 17th St) or Stepping Out Studios.' },
    // ── more free ────────────────────────────────────────────────────
    { id:71, title:'Walk the Brooklyn Bridge into DUMBO',        category:'free',     season:'any',    notes:'One of the most satisfying walks in the city. Finish in DUMBO and get a slice at Grimaldi\'s or poke around the waterfront.', tip:'Start at City Hall station (4/5/6) on the Manhattan side. Walk takes about 30 min. Go early on weekend mornings before the tourist crowds arrive. The DUMBO waterfront park is right at the far end.' },
    { id:72, title:'Smorgasburg on a weekend morning',           category:'free',     season:'summer', notes:'Free to walk in, you just pay for what you eat. The best food market in the city. Every vendor is worth trying.', tip:'Saturdays in Williamsburg (East River State Park) and Sundays in Prospect Park (Breeze Hill). Open May through October. Get there before noon for the best selection. Budget ~$10–15 per dish.' },
    { id:73, title:'The Rose Main Reading Room at NYPL',         category:'free',     season:'any',    notes:'One of the most beautiful rooms in New York. Bring a book or nothing at all. Just sit in it for an hour.', tip:'New York Public Library, 5th Ave and 42nd St. Free, open Mon–Sat. The grand staircase entrance faces 5th Ave. Quiet is expected. Bryant Park is right behind it.' },
    { id:74, title:'Bushwick Collective street art walk',        category:'free',     season:'any',    notes:'Several blocks of rotating murals in East Bushwick, some of the best street art in the country. Worth at least two hours of wandering.', tip:'J/M/Z to Myrtle-Broadway or L to Jefferson St. Concentrate on Jefferson St and St. Nicholas Ave. Best on a weekend afternoon when artists are sometimes still at work.' },
    { id:75, title:'Free outdoor yoga in the park',              category:'free',     season:'summer', notes:'Free yoga classes run all summer in parks across the city. No mat required, no experience expected.', tip:'Bryant Park hosts free yoga on Tuesday and Thursday evenings. Lululemon runs free classes on the Central Park Great Lawn. Check each park\'s summer calendar. June through August.' },
    { id:76, title:'Wave Hill in the Bronx',                     category:'free',     season:'spring', notes:'A public garden overlooking the Hudson and the Palisades in Riverdale. Genuinely peaceful, genuinely beautiful.', tip:'Free on weekday mornings and Saturday mornings before noon. Metro-North to Riverdale (~30 min from Grand Central) or the BX10 bus. Gardens are best in late April and May.' },
    // ── more classes ─────────────────────────────────────────────────
    { id:77, title:'Beginner improv class at Magnet Theater',    category:'classes',  season:'any',    notes:'A two-hour intro class where you learn the basics and do scenes with strangers. More fun than it sounds. Less terrifying than it sounds.', tip:'Magnet Theater, 254 W 29th St. Intro workshops run regularly, ~$30–40. Book at magnettheater.com. UCB also runs drop-in improv classes, check their schedule.' },
    { id:78, title:'Fresh pasta making class',                   category:'classes',  season:'any',    notes:'Make pasta from scratch and eat everything at the end. A hands-on, satisfying afternoon that feels like an actual accomplishment.', tip:'Eataly (200 5th Ave) and ICE (225 Liberty St) both run pasta classes. Airbnb Experiences has smaller, more intimate options. ~$75–120/person. Book 1–2 weeks ahead.' },
    { id:79, title:'Cocktail making workshop',                   category:'classes',  season:'any',    notes:'Two hours mixing and drinking three cocktails you made yourself. A genuinely fun date format.', tip:'Cocktail Kingdom (23 W 39th St) and The Eddy (96 Ave C) both run workshops. Airbnb Experiences also has good options. ~$60–90/person. Small groups, book in advance.' },
    { id:80, title:'Flower arranging workshop',                  category:'classes',  season:'spring', notes:'A 2-hour hands-on class. You leave with an arrangement you made yourself. Surprisingly meditative.', tip:'Saipua (100 Ferris St, Red Hook) and Le Fanfare run regular workshops. Airbnb Experiences has pop-up options too. ~$65–100/person. Spring is the best season for interesting blooms.' },
    // ── more cinema ──────────────────────────────────────────────────
    { id:81,  title:'Dine-in film at Alamo Drafthouse Brooklyn',  category:'cinema',   season:'any',    notes:'Full food and cocktail service during the movie, strict no-talking policy, and genuinely thoughtful programming. The most serious about film of any dine-in theater.', tip:'445 Albee Square W, Downtown Brooklyn. ~$22–28/ticket. Book online. No latecomers seated, ever. The pre-show programming is part of the experience.' },
    { id:82,  title:'Museum of the Moving Image in Astoria',      category:'cinema',   season:'any',    notes:'A museum about how films and television get made, then a screening in the main theater. An underrated afternoon in a great neighborhood.', tip:'36-01 35th Ave, Astoria. ~$20. R/M to Steinway St or N/W to 36th Ave. Closed Tuesdays. Screenings often include filmmaker Q&As. Combine with Greek food nearby after.' },
    { id:83,  title:'Bryant Park outdoor movie Monday night',      category:'cinema',   season:'summer', notes:'Free movies on the lawn every Monday evening in summer. Get there two hours early with wine, snacks, and a blanket. The whole lawn fills up.', tip:'Bryant Park, 42nd St and 6th Ave. Free. Lawn opens 5pm, screenings start around dusk. Check bryantpark.org for the summer schedule. Bring your own food and drink.' },
    { id:84,  title:'A film at Syndicated in Bushwick',            category:'cinema',   season:'any',    notes:'A bar with a full-size screen in a converted warehouse in Bushwick. Good food, great vibe, cult and indie programming.', tip:'40 Bogart St, Bushwick. L to Morgan Ave. Check their website for the screening schedule. Full bar and food menu. ~$15–20 plus food. No reservations needed for bar seating.' },
    { id:85,  title:'The Paris Theatre on 58th Street',            category:'cinema',   season:'any',    notes:'The last single-screen theater in Manhattan, right across from the Plaza Hotel. A real piece of the city that keeps almost disappearing.', tip:'4 W 58th St, Midtown. ~$20/ticket. Small, elegant, and worth the price. They show prestige and specialty releases. Check their schedule before going.' },
    { id:86,  title:'A Film Forum double bill',                    category:'cinema',   season:'any',    notes:'The best repertory programming in the city, in a basement on West Houston. Pick a double feature of something you\'ve both been meaning to see.', tip:'209 W Houston St, West Village. ~$17/ticket. Check filmforum.org. The revival programming is exceptional. The popcorn is better than it should be.' },
    // ── more food ────────────────────────────────────────────────────
    { id:87,  title:'Pastrami on rye at Katz\'s Delicatessen',    category:'food',     season:'any',    notes:'The most famous deli in New York. Order the pastrami on rye with mustard at the counter. It costs too much and is worth every cent.', tip:'205 E Houston St, Lower East Side. ~$30 for a sandwich, enormous and shareable. Hold onto your ticket or they charge you extra. Open until 10:45pm most nights.' },
    { id:88,  title:'Korean BBQ on 32nd Street',                   category:'food',     season:'any',    notes:'K-Town runs 24 hours. Grill your own meat at the table. Order more than you think you need. Soju is not optional.', tip:'32nd St between 5th and 6th Ave, Koreatown. Jongro BBQ and Kang Ho Dong Baekjeong are both solid. ~$40–60/person. Most places stay open very late.' },
    { id:89,  title:'The Halal Guys original cart',                category:'food',     season:'any',    notes:'The original cart. Chicken and rice with white sauce and hot sauce. There are now restaurants everywhere but this corner is the one that matters.', tip:'SW corner of 53rd St and 6th Ave, Midtown. Cash only, ~$10. Open until very late. The line moves fast. Get both sauces. The restaurant locations are fine but not the same.' },
    { id:90,  title:'Weekend dim sum in Sunset Park',              category:'food',     season:'any',    notes:'Brooklyn\'s Chinatown has some of the best dim sum in the city, without the Flushing crowds. Go when the carts are rolling.', tip:'8th Ave between 54th and 60th St, Sunset Park. Pacificana (813 55th St) is a classic. Go between 10am and 1pm for peak cart service. ~$25–35/person. Cash preferred.' },
    { id:91,  title:'Midnight burger at Corner Bistro',            category:'food',     season:'any',    notes:'A divey West Village bar that has been here forever. The Bistro Burger, a McSorley Ale, and nothing else. Best after midnight.', tip:'331 W 4th St, West Village. Cash only. ~$10–15. Open until 3:30am on weekends. The line at 1am moves quickly. Order at the bar.' },
    { id:92,  title:'A Chinatown food crawl',                      category:'food',     season:'any',    notes:'No itinerary. Just walk Mott Street eating. Soup dumplings, egg tarts, scallion pancakes, roast duck from a window. Keep going until full.', tip:'Start at Prosperity Dumpling (46 Eldridge St) for cheap dumplings. Walk to Tai Pan Bakery (194 Canal St) for egg tarts. Wah Fung (79 Chrystie St) for roast pork. Budget ~$25.' },
    { id:93,  title:'Brunch at Clinton Street Baking Co.',         category:'food',     season:'any',    notes:'The pancakes with warm maple butter. The weekend waits are real and worth it. A New York brunch institution.', tip:'4 Clinton St, Lower East Side. Walk-in only. Weekend waits are 45–60 min. Arrive before 10am to beat the worst of it. ~$20–30/person. The blueberry pancakes are the move.' },
    { id:94,  title:'Dinner on Arthur Avenue in the Bronx',        category:'food',     season:'any',    notes:'The real Little Italy. Better food, more authentic, less touristy than Mulberry Street. Come very hungry.', tip:'Arthur Ave around 187th St, Belmont. D/B to Fordham Rd. Arthur Avenue Retail Market is the indoor market for snacks. Dominick\'s for old-school red sauce dinner. ~$30–50/person.' },
    { id:95,  title:'Late night ramen at Ichiran',                 category:'food',     season:'any',    notes:'Solo dining booths, broth you customize exactly to your taste, no small talk required. A deeply satisfying late-night ritual.', tip:'132 W 49th St (Midtown) or 374 Johnson Ave (Bushwick). Open late. ~$20–30/person. Order the extra noodle refill. The tonkotsu is the move.' },
    { id:96,  title:'Lobster roll at Luke\'s Lobster',             category:'food',     season:'summer', notes:'A Maine-style cold lobster roll. Simple, good, no argument. A perfect warm weather lunch.', tip:'Multiple locations. The Seaport location (26 S William St) has outdoor seating. ~$22–28 for a roll. The whole-belly clam roll is also excellent. Go at lunch to avoid lines.' },
    { id:97,  title:'A long Sunday brunch at Balthazar',           category:'food',     season:'any',    notes:'The most quintessentially New York restaurant in the city. Steak frites, a glass of something good, and nowhere to be.', tip:'80 Spring St, SoHo. Book on Resy, or arrive right at 11:30am for the best walk-in chances. ~$40–60/person. The raw bar is excellent. Order the croque madame.' },
    // ── more bakeries ────────────────────────────────────────────────
    { id:98,  title:'Arcade Bakery hidden in a Tribeca lobby',     category:'bakery',   season:'any',    notes:'A croissant counter tucked inside a lobby at 220 Church Street. Hard to find, worth finding. Excellent laminated pastries.', tip:'220 Church St lobby, Tribeca. Weekdays only, closes midday. Get there before 10am. The twice-baked croissants sell out fast. ~$5–8/item. This is a locals-only spot.' },
    { id:99,  title:'Salty chocolate chip cookie at Ovenly',       category:'bakery',   season:'any',    notes:'The salty chocolate chip cookie is famous for a reason. Everything else here is also excellent. A neighborhood bakery done very right.', tip:'31 Greenpoint Ave, Greenpoint. G to Greenpoint Ave. Opens 8am. ~$3–6/item. The olive oil coffee cake and cardamom knot are also worth trying.' },
    { id:100, title:'Levain cookies on the Upper West Side',        category:'bakery',   season:'any',    notes:'The most famous cookies in New York. Dense, thick, and completely not for anyone watching their diet.', tip:'Original location at 167 W 74th St, Upper West Side. Opens 8am. ~$5/cookie. The dark chocolate chocolate chip is the one. Also in NoMad and Williamsburg.' },
    { id:101, title:'Coffee and a pastry at Runner & Stone',        category:'bakery',   season:'any',    notes:'A serious neighborhood bakery in Gowanus with excellent bread, honest pastries, and very good coffee.', tip:'285 3rd Ave, Gowanus. F/G to Smith-9th Sts. Opens 7:30am. ~$4–10. The country loaf is good to take home. Small tables, quiet mornings.' },
    { id:102, title:'Hot Bread Kitchen at Essex Market',            category:'bakery',   season:'any',    notes:'A social enterprise bakery where everything reflects the diversity of New York. Mana\'eesh, m\'smen, challah, injera-style flatbreads.', tip:'Essex Market, 88 Essex St, Lower East Side. ~$4–10/item. Worth trying something unfamiliar. A genuinely New York place.' },
    // ── more shows ───────────────────────────────────────────────────
    { id:103, title:'Sleep No More at the McKittrick Hotel',        category:'shows',    season:'any',    notes:'An immersive theater experience in a six-story hotel. You wear a mask, you wander alone. You will not fully understand it. That is the point.', tip:'530 W 27th St, Chelsea. ~$140–165/ticket. Book well ahead at mckittrickhotel.com. Wear comfortable shoes. Split up from each other for the best experience. Arrive for the pre-show bar.' },
    { id:104, title:'A night at the Apollo Theater',                category:'shows',    season:'any',    notes:'The most storied stage in American music. Catch whatever is on. The room itself carries the history.', tip:'253 W 125th St, Harlem. Ticket prices vary widely. Check apollotheater.org. Amateur Night on Wednesdays is legendary and affordable. 2/3 train to 125th St.' },
    { id:105, title:'Blue Note Jazz Club late set',                 category:'shows',    season:'any',    notes:'One of the most famous jazz clubs in the world. Intimate room, serious musicians. A late set on a weekend is the way to do it.', tip:'131 W 3rd St, Greenwich Village. Sets at 8pm and 10:30pm. ~$30–50 plus drink minimum. Book online. Sunday brunch jazz is a more affordable option at ~$35 with food.' },
    { id:106, title:'Roots music at Jalopy Theatre, Red Hook',      category:'shows',    season:'any',    notes:'A tiny, wonderful venue in Red Hook for folk, bluegrass, country, and old-time music. No pretense, all heart.', tip:'315 Columbia St, Red Hook. Tickets ~$10–20, often at the door. Check jalopy.biz. The venue is also an instrument shop. Very small space, arrive early.' },
    { id:107, title:'A concert or event at Pioneer Works',          category:'shows',    season:'any',    notes:'An art and culture center in a huge converted warehouse in Red Hook. Concerts, talks, openings. The space is extraordinary.', tip:'159 Pioneer St, Red Hook. Ticket prices vary. Check pioneerworks.org. Second Sundays events are free and open to the public. Worth the trip to Red Hook alone.' },
    { id:108, title:'Joe\'s Pub at The Public Theater',             category:'shows',    season:'any',    notes:'The best small venue in the city. Theater, cabaret, jazz, folk, comedy. Always something surprising and very well done.', tip:'425 Lafayette St, East Village (inside The Public Theater). Tickets ~$15–35 plus 2-drink minimum. Book online at joespub.com. Arrive early for a good table.' },
    { id:109, title:'A show at Town Hall',                          category:'shows',    season:'any',    notes:'A gorgeous 1921 landmarked theater that hosts everything from spoken word to jazz to indie rock. Excellent acoustics, a real room.', tip:'123 W 43rd St, Midtown. Ticket prices vary by show. Check the-townhall-nyc.org. A/C/E or 1/2/3 to Times Square. Balcony seats have great views and lower prices.' },
    // ── more arts ────────────────────────────────────────────────────
    { id:110, title:'New Museum on the Bowery',                     category:'arts',     season:'any',    notes:'The most consistently challenging contemporary art museum in the city. Never comfortable, always interesting.', tip:'235 Bowery, Lower East Side. ~$18, free Thursday evenings. The building itself is a stack of misaligned boxes worth seeing from the street. Check newmuseum.org for exhibitions.' },
    { id:111, title:'The Noguchi Museum sculpture garden',          category:'arts',     season:'any',    notes:'The sculpture garden at the Noguchi Museum is one of the most serene spaces in the city. Go slow. Give it more time than you think you need.', tip:'9-01 33rd Rd, Long Island City. ~$10. W to Broadway or N to 36th Ave. Closed Tue/Wed. Free on the first Friday of every month. The garden alone is worth the trip.' },
    { id:112, title:'El Museo del Barrio in East Harlem',           category:'arts',     season:'any',    notes:'Latin American and Caribbean art at the top of Museum Mile. One of the most undervisited museums in New York.', tip:'1230 5th Ave at 104th St. Suggested admission $9. 6 to 103rd St. The permanent collection is excellent. Pair with a walk through East Harlem and lunch at Patsy\'s.' },
    { id:113, title:'Louis Armstrong House in Corona, Queens',      category:'arts',     season:'any',    notes:'Louis Armstrong\'s actual house, preserved exactly as he left it. A genuinely moving experience and a beautiful piece of the city\'s history.', tip:'34-56 107th St, Corona, Queens. ~$15. Tours hourly. 7 train to 103rd St-Corona Plaza. Book ahead at louisarmstronghouse.org. Combine with a Flushing afternoon.' },
    { id:114, title:'Thursday gallery opening night in Chelsea',    category:'arts',     season:'any',    notes:'Chelsea has more contemporary art galleries per block than anywhere in the world. Thursday openings are free, wine is often served, and the art is real.', tip:'Concentrate on W 22nd and W 25th St between 10th and 11th Aves. Openings typically run 6–8pm Thursdays. Check artforum.com/events for what\'s on. Just walk in.' },
    { id:115, title:'The Frick Collection on a quiet afternoon',    category:'arts',     season:'any',    notes:'One of the great house museums anywhere. A Gilded Age mansion filled with Vermeers, Rembrandts, and Turners. Sit in the Garden Court.', tip:'1 E 70th St at 5th Ave. ~$22. 6 to 68th St. Buy tickets ahead at frick.org. No photos inside. Give yourself at least two hours. The Garden Court is worth 20 minutes by itself.' },
    { id:116, title:'Drawing Center in SoHo',                       category:'arts',     season:'any',    notes:'A small, focused gallery dedicated entirely to drawing in all its forms. Always surprising, never crowded, never disappointing.', tip:'35 Wooster St, SoHo. Free admission. A/C/E to Canal St. Closed Mondays. Small but worth 45 minutes. Combine with a walk through SoHo and a stop at a bakery.' },
    // ── more explore ─────────────────────────────────────────────────
    { id:117, title:'A full afternoon in Astoria',                  category:'explore',  season:'any',    notes:'Greek food, excellent bakeries, coffee everywhere, and a genuinely local feel. One of the best neighborhoods in the outer boroughs.', tip:'N/W to Astoria-Ditmars Blvd. Taverna Kyclades for fish, Astoria Bier & Cheese for snacks, Mombar for Egyptian dinner. Give it a whole lazy afternoon.' },
    { id:118, title:'Jackson Heights food and culture crawl',       category:'explore',  season:'any',    notes:'One of the most diverse neighborhoods on earth. Indian, Tibetan, Nepalese, Ecuadorian, Colombian, all within a few blocks.', tip:'7 train to 74th St-Jackson Heights. Walk Roosevelt Ave under the elevated tracks. Patel Brothers for snacks. Pio Pio for rotisserie chicken. Budget a full afternoon.' },
    { id:119, title:'Greenpoint on a Sunday morning',               category:'explore',  season:'spring', notes:'The northernmost tip of Brooklyn, still genuinely neighborhood-y. Great coffee, good brunch, Polish food, and a quiet waterfront.', tip:'G to Greenpoint Ave. Start at Cafe Grumpy (193 Meserole Ave). Walk to the Greenpoint waterfront for Manhattan views. Five Leaves for brunch, line up early.' },
    { id:120, title:'A day at Jacob Riis Beach, the Rockaways',     category:'explore',  season:'summer', notes:'A real New York beach, reachable by subway. Riis Beach is more relaxed, diverse, and less crowded than the Hamptons will ever be.', tip:'A train to Rockaway Park-Beach 116th St (summer shuttle service). Jacob Riis Park is free. Bring everything you need. The taco trucks near the lot are the right lunch.' },
    { id:121, title:'Roosevelt Island tram and a full walk',         category:'explore',  season:'any',    notes:'Take the aerial tram from 59th and 2nd, walk the entire island, and see Manhattan from water level the whole way. Almost nobody does this.', tip:'Tram departs 59th St and 2nd Ave (MetroCard/OMNY accepted). Walk south to the FDR Memorial at the island tip. The whole loop takes about an hour. F train also stops there.' },
    { id:122, title:'Inwood Hill Park and the old-growth forest',    category:'explore',  season:'fall',   notes:'The last old-growth forest in Manhattan. Ancient trees, the cave where Peter Minuit reportedly bought the island, and almost no tourists.', tip:'A train to Inwood-207th St. Free, open year-round. The Indian Caves trail is the main draw. Pair with Indian Road Cafe for lunch or Dyckman Farmhouse Museum nearby.' },
    { id:123, title:'Bike the Hudson River Greenway',               category:'explore',  season:'spring', notes:'The Greenway runs the entire length of Manhattan\'s west side. Pick up a Citi Bike and go north as far as you feel like going.', tip:'Citi Bike day pass ~$15. The greenway is mostly car-free. Ride north toward the Little Red Lighthouse under the George Washington Bridge for a good destination. About 5 miles one way.' },
    { id:124, title:'Sunset Park, Industry City, and the waterfront', category:'explore', season:'any',   notes:'A working-class Brooklyn neighborhood transforming around a huge converted factory complex. Great food vendors, artist studios, and water views.', tip:'D/N/R to 36th St, Sunset Park. Industry City is on 2nd Ave and 37th St. Walk the waterfront path toward the park. Combine with dim sum on 8th Ave for a full day.' },
    { id:125, title:'Mott Haven arts district in the South Bronx',  category:'explore',  season:'any',    notes:'A fast-changing neighborhood with galleries, studios, and some of the best street art in New York. An honest view of what the city is becoming.', tip:'6 train to 138th St-Grand Concourse. Walk along 138th St and Willis Ave. The Bronx Museum of the Arts (1040 Grand Concourse) is free. Combine with dinner in Hunts Point or Arthur Ave.' },
    // ── more wellness ────────────────────────────────────────────────
    { id:126, title:'Reflexology and massage in Chinatown',         category:'wellness', season:'any',    notes:'A no-frills Chinese foot reflexology and massage spot. The quality is better than the price suggests. Cash only.', tip:'Look around Mott St, Bayard St, and East Broadway in Chinatown. Most spots are walk-in, ~$40–60 for 60 min. Golden Spa at 9 Mott St. Cash only. Go in the afternoon.' },
    { id:127, title:'Hot yoga to hip hop at Y7',                    category:'wellness', season:'any',    notes:'A 60-minute hot yoga class in candlelight with a hip hop soundtrack. Sounds gimmicky, is actually a great workout.', tip:'Multiple locations. ~$30/class or use ClassPass. Book online, classes fill up. Bring a towel and arrive well-hydrated. The playlists are genuinely excellent.' },
    { id:128, title:'Juvenex Spa in Koreatown',                     category:'wellness', season:'winter', notes:'An all-hours Korean spa in K-Town. Jade heated floors, multiple sauna rooms, sleeping areas. The full treatment takes an entire afternoon.', tip:'25 W 32nd St, 5th floor. ~$45–70 entry. Open 24hrs for women, mixed-gender hours for couples. Bring a change of clothes. Add the Korean body scrub treatment.' },
    { id:129, title:'Morning swim at a public pool',                 category:'wellness', season:'summer', notes:'The city\'s free public pools open in late June. A morning swim before the crowds arrive is genuinely good for you.', tip:'McCarren Pool in Williamsburg is the most impressive. Hamilton Fish Pool on the LES is classic. Free with a NYC Parks Recreation card (also free). Open late June through Labor Day.' },
    { id:130, title:'Walk all three East River bridges in one day',  category:'wellness', season:'spring', notes:'Brooklyn Bridge, Manhattan Bridge, Williamsburg Bridge, all on foot. A half-day walk that shows you the city from above.', tip:'Start at City Hall (Brooklyn Bridge), walk to DUMBO, cross the Manhattan Bridge back to Canal St, walk to Delancey, cross the Williamsburg Bridge. About 4 miles total.' },
    { id:131, title:'Forest bathing in the Ramble, Central Park',   category:'wellness', season:'fall',   notes:'Slow walking through the wild woodland section of Central Park. No podcasts, no phone. Just trees and time.', tip:'Enter the Ramble at the 79th St transverse from the west side or from the Loeb Boathouse on the east. It\'s intentionally maze-like. Getting slightly lost is fine.' },
    { id:132, title:'A day at Sojo Spa Club in New Jersey',         category:'wellness', season:'any',    notes:'A large Korean spa complex just over the George Washington Bridge. Multiple pools, saunas, and outdoor hot tubs overlooking the Hudson. A full reset.', tip:'Edgewater, NJ. ~$50–70 entry. Bus from Port Authority (NJ Transit 158/159) or a short Uber from the GWB. Book online. Bring a bathing suit and plan to stay 4–5 hours.' },
    // ── more day trips ───────────────────────────────────────────────
    { id:133, title:'Cold Spring, NY for the day',                  category:'daytrip',  season:'fall',   notes:'A beautiful Hudson Valley village. Walk Main Street, hike Bull Hill, eat well. One of the best day trips from the city.', tip:'Metro-North Hudson Line from Grand Central, ~1.5 hrs, ~$30 RT. The waterfront park is a 5-min walk from the station. Riverview Restaurant for lunch. Go in October for the foliage.' },
    { id:134, title:'Montauk day trip',                             category:'daytrip',  season:'summer', notes:'The far end of Long Island. Raw, windy, real. Swimming at Ditch Plains, oysters somewhere, the lighthouse at the very tip.', tip:'LIRR from Penn Station, ~3 hrs, ~$40–50 RT. Book ahead on summer weekends. Ditch Plains for the beach. The Lobster Roll on Montauk Hwy for lunch. Last train back around 9pm.' },
    { id:135, title:'Rhinebeck and the Hudson Valley',              category:'daytrip',  season:'spring', notes:'A Dutchess County village with excellent restaurants, the oldest inn in America, and the whole Hudson Valley around it.', tip:'Amtrak from Penn to Rhinecliff, ~2 hrs, ~$35 RT. Taxi or rideshare to Rhinebeck village (10 min). Bread Alone for breakfast. Book dinner ahead. Beekman Arms inn for drinks.' },
    { id:136, title:'Long Beach, NY beach day',                     category:'daytrip',  season:'summer', notes:'A real beach town 45 minutes from Penn Station. Less scene than the Hamptons, genuinely swimmable, easy to do spontaneously.', tip:'LIRR Long Beach branch from Penn Station, ~45 min, ~$15 RT. Beach access is included in the fare during summer. The beach is a 10-min walk from the station. Bring sunscreen.' },
    { id:137, title:'Philadelphia for a day',                       category:'daytrip',  season:'any',    notes:'Amtrak to Philly and back in a day. Reading Terminal Market, a cheesesteak, the Barnes Foundation, and still home for dinner.', tip:'Amtrak from Penn Station, ~1.5 hrs, ~$30–80 RT depending on timing. Book a week ahead for better prices. Barnes Foundation needs advance tickets. Reading Terminal for lunch.' },
    { id:138, title:'Tarrytown and Sleepy Hollow',                  category:'daytrip',  season:'fall',   notes:'Sleepy Hollow in October is exactly as atmospheric as you\'d hope. The cemetery, the old Dutch church, and the Hudson River below.', tip:'Metro-North Hudson Line from Grand Central, ~45 min, ~$20 RT. Sleepy Hollow Cemetery is free and open year-round. Best in mid-October. The Horse Man pub for lunch after.' },
    { id:139, title:'New Haven for pizza at Frank Pepe\'s',         category:'daytrip',  season:'any',    notes:'The white clam pizza at Frank Pepe\'s is one of the great things you can eat. New Haven is worth the trip for this alone.', tip:'Metro-North New Haven Line from Grand Central, ~1.5–2 hrs, ~$30 RT. Frank Pepe\'s is at 157 Wooster St. Arrive early or expect a wait. Sally\'s Apizza next door is also legendary.' },
    // ── more free ────────────────────────────────────────────────────
    { id:140, title:'The High Bridge walk to the Bronx',            category:'free',     season:'spring', notes:'The oldest bridge in New York, connecting Washington Heights to the Bronx. Walk across and wander Highbridge Park on the other side.', tip:'Enter from the Manhattan side near 173rd St. Free. A train to 168th St. The bridge reopened after a long restoration in 2015. The pool in Highbridge Park is free to swim in summer.' },
    { id:141, title:'Noguchi Museum free first Fridays',            category:'free',     season:'any',    notes:'The sculpture garden is one of the most serene spaces in New York. Going when it\'s free makes it even better.', tip:'9-01 33rd Rd, Long Island City. Free the first Friday of every month, 5–8pm. W to Broadway station in Queens. Check noguchi.org. The garden is the main event.' },
