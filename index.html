    { id:143, title:'Wander Grand Central Terminal',                category:'free',     season:'any',    notes:'Walk every level. The whispering gallery. The famous ceiling. The Oyster Bar downstairs. Just wander it like a destination, not a commute.', tip:'Free. The whispering gallery is the curved arch outside the Oyster Bar, lower concourse. Stand facing the corner and talk quietly. The Campbell Bar for one drink after.' },
    { id:144, title:'Citi Bike the Central Park loop',              category:'free',     season:'spring', notes:'Rent a Citi Bike and ride the 6-mile car-free loop. One of the most enjoyable things you can do in the city for $15.', tip:'Citi Bike day pass ~$15. Bikes available at park entrances near 59th, 72nd, and 86th St. The loop road is car-free on weekends. Takes about 45 min to ride the full perimeter.' },
    { id:145, title:'Evening concert at the Cathedral of St. John the Divine', category:'free', season:'any', notes:'The cathedral hosts regular free and low-cost concerts. The acoustics are extraordinary, the space is vast and unlike anywhere else.', tip:'1047 Amsterdam Ave, Morningside Heights. 1 to Cathedral Pkwy/110th St. Check stjohndivine.org for the music calendar. The building itself is worth the visit.' },
    { id:146, title:'The 9/11 Memorial pools',                     category:'free',     season:'any',    notes:'The two reflecting pools are genuinely moving and worth visiting slowly, not as a check-the-box thing. Give it more time than you think.', tip:'180 Greenwich St, Lower Manhattan. Free. Open daily. Timed entry tickets are recommended (free, at 911memorial.org). The museum requires a separate ticket. The pools alone are enough.' },
    { id:147, title:'Socrates Sculpture Park in Long Island City',  category:'free',     season:'summer', notes:'A free outdoor sculpture park on the East River in LIC with Manhattan views and rotating large-scale installations.', tip:'32-01 Vernon Blvd, Long Island City. Free, open year-round. N/W to Broadway (Queens). The summer outdoor film series and music events are also free. A quick trip from Midtown.' },
    { id:148, title:'Little Island park at sunset',                 category:'free',     season:'summer', notes:'A floating park built on reclaimed pilings on the Hudson River. Strange, lovely, and worth it at golden hour.', tip:'Pier 55, Hudson River Park at W 13th St. Free. Timed entry passes recommended in summer at littleisland.org. The amphitheater hosts free events. Good coffee truck on site.' },
    { id:149, title:'A Sunday at the Queens Night Market',          category:'free',     season:'summer', notes:'The most diverse food market in New York. Dozens of vendors, every cuisine, $5 dishes. Free to enter, very much worth going for dinner.', tip:'New York Hall of Science, 47-01 111th St, Corona, Queens. 7 train to 111th St. Runs Saturday evenings May through October. ~$5–10 per dish. Get there before 8pm.' },
    // ── more classes ─────────────────────────────────────────────────
    { id:150, title:'Intro rock climbing session',                  category:'classes',  season:'any',    notes:'A two-hour intro session that covers the basics. A surprisingly fun and physical way to spend an afternoon together.', tip:'Brooklyn Boulders (multiple locations) and The Cliffs offer intro classes ~$40–60 including gear. Book online. No experience or strength required. Day passes let you keep climbing after.' },
    { id:151, title:'Stand-up comedy open mic night',               category:'classes',  season:'any',    notes:'Sign up and each do two minutes. This is terrifying and will be the funniest night you\'ve had in a long time.', tip:'Creek and The Cave (10-93 Jackson Ave, Long Island City) hosts open mics most nights. Sign-ups start 30 min before. Free to perform, one-drink minimum for the audience.' },
    { id:152, title:'A fermentation workshop',                      category:'classes',  season:'any',    notes:'Make kimchi, pickles, or hot sauce in a two-hour class. You leave with jars of something you actually made.', tip:'The Brooklyn Kitchen (100 Frost St, Williamsburg) runs food skills workshops. Airbnb Experiences has many options too. ~$50–80. Nothing perishable to worry about taking home.' },
    { id:153, title:'Intro screenprinting workshop',                category:'classes',  season:'any',    notes:'Design and print something on a tote or a shirt in a 3-hour session. A tangible thing to take home.', tip:'Pratt Institute runs community workshops. Printmaking studios in Gowanus and Bushwick also offer drop-in sessions. Check Eventbrite. ~$60–90. Results are always a little imperfect.' },
    { id:154, title:'Guided foraging walk in Central Park',         category:'classes',  season:'spring', notes:'A naturalist walks you through the park identifying edible plants, mushrooms, and herbs. Weirder and more interesting than it sounds.', tip:'Several guides offer seasonal walks. Check Airbnb Experiences or wildedible.com. ~$40–60. Spring and fall are best. You will look at the park differently for years after.' },
    { id:155, title:'Film photography class and darkroom session',  category:'classes',  season:'any',    notes:'Shoot a roll of film together and develop it yourselves in the darkroom. The waiting and the reveal is the whole point.', tip:'Bushwick Film Club and 4th Street Photo Gallery both offer darkroom sessions. ~$50–80. Check Eventbrite for workshops. Bring an analog camera or borrow one from the studio.' },
    { id:156, title:'Watercolor class for beginners',               category:'classes',  season:'any',    notes:'A two-hour beginner session where you actually make something. More forgiving than drawing, more satisfying than expected.', tip:'Art Students League (215 W 57th St) offers drop-in watercolor sessions. Airbnb Experiences has many one-off workshops. ~$30–60. Supplies usually provided.' },
    { id:157, title:'Bread baking at the Institute of Culinary Education', category:'classes', season:'any', notes:'Learn to make a proper loaf from scratch and take it home. A satisfying and practical afternoon.', tip:'ICE has a campus at 225 Liberty St, Financial District. Recreational bread baking classes ~$85–130. Book at ice.edu. Classes fill up, reserve 2–3 weeks ahead.' },
    { id:158, title:'A sushi rolling class',                        category:'classes',  season:'any',    notes:'Learn the basics of making rolls and nigiri, then eat everything you made. A fun dinner-that-you-cook format.', tip:'Multiple options on Airbnb Experiences and Eventbrite. The Sushi Room in Midtown runs regular classes. ~$80–120/person. Most classes include sake or beer.' },
    { id:159, title:'Natural wine tasting and education class',     category:'classes',  season:'any',    notes:'A structured tasting with a guide who explains what you\'re drinking and why. You will leave with actual opinions about wine.', tip:'Parcelle and Appellation Wine both run tasting events. Chambers Street Wines occasionally does education nights. ~$40–80. Check their websites for upcoming sessions.' },
    { id:160, title:'Calligraphy or hand lettering workshop',       category:'classes',  season:'any',    notes:'A two-hour intro class with a proper nib pen and ink. Surprisingly meditative and you leave with a real skill to practice.', tip:'Check Eventbrite for sessions at studios in Williamsburg and the LES. Kestrel Workshop in Red Hook sometimes hosts these. ~$50–75. All materials provided.' },
    // ── cinema 161-162 ───────────────────────────────────────────────
    { id:161, title:'Angelika Film Center in SoHo',                 category:'cinema',   season:'any',    notes:'The indie cinema where you can hear the subway rumbling under the screen during quiet scenes. A New York experience that cannot be replicated anywhere else.', tip:'18 W Houston St, SoHo. Tickets ~$18. Coffee bar downstairs worth lingering in. 1/C/E to Spring St. Multiple screens, foreign and documentary programming.' },
    { id:162, title:'A double feature at Quad Cinema',              category:'cinema',   season:'any',    notes:'The last four-screen repertory cinema in New York. The programming is adventurous, the audience is genuinely there for the films.', tip:'34 W 13th St, Greenwich Village. Tickets ~$14–17. Check quadcinema.com. A/C/E/L to 14th St. Double features are common. Membership pays for itself quickly.' },
    // ── food 163-166 ─────────────────────────────────────────────────
    { id:163, title:'Ethiopian dinner at Bunna Cafe',               category:'food',     season:'any',    notes:'A fully plant-based Ethiopian restaurant in Bushwick with incredible injera, rich stews, and some of the warmest hospitality in the city.', tip:'1084 Flushing Ave, Bushwick. J to Kosciuszko St. ~$25–40/person. Reservations on Resy. Order the combination platter. The honey wine is excellent.' },
    { id:164, title:'Arepas at Caracas Arepa Bar',                  category:'food',     season:'any',    notes:'A Venezuelan arepa spot in the East Village that has been quietly excellent for years. Order two, sit in the narrow room, feel lucky to be there.', tip:'93 E 7th St, East Village. ~$10–15/person. Small, often a short wait. The De Pabellón with black beans, shredded beef, and plantains is the one to get.' },
    { id:165, title:'Bar dinner at Estela',                         category:'food',     season:'any',    notes:'One of the best small plates restaurants in New York. Sit at the bar, order whatever the server suggests, drink something natural. A perfect evening.', tip:'47 E Houston St, SoHo. Book on Resy 2–3 weeks out, or try bar walk-in after 6pm. ~$60–90/person. The burrata with anchovy toast is non-negotiable.' },
    { id:166, title:'Szechuan hot pot in Flushing on a cold night', category:'food',     season:'winter', notes:'A boiling pot of numbing, spicy broth with everything you cook in it. Loud, communal, and completely excellent. An experience rather than just dinner.', tip:'Little Pepper (18-24 College Point Blvd) and Spicy Village are both good in Flushing. ~$30–50/person. 7 to Flushing-Main St. Go on a cold weeknight.' },
    // ── bakeries 167-168 ─────────────────────────────────────────────
    { id:167, title:'Orwasher\'s Bakery on the Upper East Side',    category:'bakery',   season:'any',    notes:'A Jewish bakery in operation since 1916. The raisin pumpernickel and the challah are extraordinary. A living piece of what New York used to be and still is.', tip:'308 E 78th St, Upper East Side. Opens 7am. ~$6–12 for a loaf. 6 to 77th St. Call ahead on Fridays for holiday breads. Very small, very beloved.' },
    { id:168, title:'Lafayette Grand Cafe pastry case',             category:'bakery',   season:'any',    notes:'An all-day Parisian grand cafe with one of the best pastry cases in New York. The croissant and the religieuse are both exceptional.', tip:'380 Lafayette St, NoHo. Opens 8am. ~$5–12/item. B/D/F/M to Broadway-Lafayette. The cafe is large and loud in a good way. Busy on weekends, calmer on weekdays.' },
    // ── shows 169-172 ────────────────────────────────────────────────
    { id:169, title:'A night at Caveat on the Lower East Side',     category:'shows',    season:'any',    notes:'Comedy, storytelling, game shows, and genuinely original performance in a small basement venue. Something you will not find anywhere else.', tip:'21A Clinton St, LES. Tickets ~$15–25. Check caveat.nyc. F/J/M/Z to Delancey-Essex. Small room, buy tickets ahead. Anything on the calendar tends to be excellent.' },
    { id:170, title:'Live music at City Winery',                    category:'shows',    season:'any',    notes:'Intimate live music in a converted warehouse with wine made on-site. A good level of artist, a great level of access. A real night out.', tip:'25 11th Ave, Hudson Yards. Tickets ~$20–60 depending on the show. Reserve a table for dinner plus the show. Check citywinery.com/new-york for the calendar.' },
    { id:171, title:'World music at Barbes in Park Slope',          category:'shows',    season:'any',    notes:'A tiny, beloved bar that hosts live world music, jazz, and folk every single night. One of the most genuinely New York music venues left in the city.', tip:'376 9th St at 6th Ave, Park Slope. F/G to 7th Ave. Cover ~$10–15, often pay-what-you-wish. No reservations. The back room is the stage. Arrive early.' },
    { id:172, title:'A show at The Bell House in Gowanus',          category:'shows',    season:'any',    notes:'A large, airy converted warehouse venue for comedy, indie rock, and themed events. Always something interesting, always a great room.', tip:'149 7th St, Gowanus. F/G to Smith-9th Sts. Tickets ~$15–30. Check thebellhouseny.com. The front bar is worth a drink before the show.' },
    // ── arts 173-176 ─────────────────────────────────────────────────
    { id:173, title:'International Center of Photography',          category:'arts',     season:'any',    notes:'The best photography museum in New York. Thoughtful exhibitions spanning documentary, fine art, and everything in between.', tip:'79 Essex St inside Essex Market, LES. ~$14. Closed Tuesdays. Check icp.org. The bookshop has one of the best photography book selections in the city.' },
    { id:174, title:'Fotografiska New York',                        category:'arts',     season:'any',    notes:'A Stockholm-based photography museum with major rotating exhibitions and a rooftop restaurant worth visiting on its own.', tip:'281 Park Ave S at 22nd St, Gramercy. ~$23. Open until 11pm on weekends. 6 to 23rd St. The rooftop bar is excellent for a drink after the exhibition.' },
    { id:175, title:'The Morgan Library & Museum',                  category:'arts',     season:'any',    notes:'J.P. Morgan\'s original private library, now a museum with manuscript treasures and one of the most beautiful rooms in New York. The East Room alone is worth it.', tip:'225 Madison Ave at 36th St. ~$22. 6 to 33rd St. Free on Friday evenings. Check themorgan.org. Allow at least 90 minutes. The original library is extraordinary.' },
    { id:176, title:'The Bronx Museum of the Arts',                 category:'arts',     season:'any',    notes:'Free admission, always. Art that reflects the Bronx and its communities with honesty. One of the most undervisited museums in New York.', tip:'1040 Grand Concourse at 165th St. Free. B/D to 167th St. Closed Mon/Tue. Walk the Grand Concourse after to see the Art Deco apartment buildings.' },
    // ── explore 177-181 ──────────────────────────────────────────────
    { id:177, title:'A walk along the Grand Concourse in the Bronx', category:'explore', season:'any',    notes:'The Champs-Elysees of the Bronx. Miles of Art Deco apartment buildings, wide boulevards, and real neighborhood life. Completely underrated.', tip:'B/D to 161st St-Yankee Stadium. Walk north. The Bronx Museum is at 165th St. The Loews Paradise Theater facade at 2403 Grand Concourse is a landmark. Free.' },
    { id:178, title:'Woodlawn Cemetery in the Bronx',               category:'explore',  season:'fall',   notes:'One of the great garden cemeteries in America. Duke Ellington, Miles Davis, and Herman Melville are buried here. The mausoleums are extraordinary.', tip:'4 to Woodlawn (last stop) or Metro-North Harlem Line to Woodlawn. Free. Maps at the gate. Best in fall for foliage. Plan 2 hours minimum.' },
    { id:179, title:'The Bronx Zoo for a full day',                 category:'explore',  season:'spring', notes:'The largest metropolitan zoo in the country. The Congo Gorilla Forest and Tiger Mountain are both extraordinary. Give it a full unhurried day.', tip:'~$34 online, or pay-what-you-wish on Wednesdays. B/D to Fordham Rd then BX12 bus, or 2/5 to Pelham Pkwy. Arrive at opening to beat crowds.' },
    { id:180, title:'Ridgewood, Queens on a weekend',               category:'explore',  season:'any',    notes:'A neighborhood on the Queens-Brooklyn border that feels like the city did fifteen years ago. Great bars, interesting restaurants, not yet overrun.', tip:'L to Halsey St or M to Fresh Pond Rd. Walk Seneca Ave and Myrtle Ave. Nowadays bar (54-07 Myrtle Ave) and Rolo\'s (56-12 Forest Ave) are both excellent.' },
    { id:181, title:'Astoria Park and the Hell Gate Bridge',        category:'explore',  season:'summer', notes:'The largest park in Queens, with the enormous Hell Gate railroad bridge dominating the view. Watch the river and feel the full scale of the city.', tip:'N/W to Astoria-Ditmars Blvd, then walk west to the park. Free. The park pool is free in summer. The bridge view from the main lawn is one of the best in any outer borough.' },
    // ── wellness 182-185 ─────────────────────────────────────────────
    { id:182, title:'Salt room halotherapy session',                category:'wellness', season:'winter', notes:'Sit in a room lined with Himalayan salt in a warm, cave-like environment. Deeply relaxing in a way that\'s hard to explain until you\'ve tried it.', tip:'The Salt Suite and Montauk Salt Cave both have NYC locations. ~$40–60 for 45 min. Book online. Multiple sessions are recommended but once is enough to understand it.' },
    { id:183, title:'A proper couples massage at a hotel spa',      category:'wellness', season:'any',    notes:'Book a real, proper couples massage. Not a bargain option. An afternoon that feels like leaving the city entirely.', tip:'The Spa at Mandarin Oriental (80 Columbus Circle) or The Well (7 W 23rd St). ~$150–250/person. Book weeks ahead. Make a whole slow afternoon of it.' },
    { id:184, title:'A drop-in meditation session',                 category:'wellness', season:'any',    notes:'A guided meditation in a real studio. Easier and more grounding than doing it alone at home with an app.', tip:'MNDFL (multiple locations) offers guided sessions ~$20–30. Interdependence Project also runs drop-ins. No experience needed. 45–60 min sessions.' },
    { id:185, title:'Sunrise walk through Central Park',            category:'wellness', season:'spring', notes:'The park before 7am is completely different. Almost no one there. Morning light through the trees in early spring is genuinely something.', tip:'Enter at any gate before sunrise. The Reservoir loop is 1.6 miles. The Ramble at dawn has extraordinary birding from April through June. Bring coffee.' },
    // ── day trips 186-189 ────────────────────────────────────────────
    { id:186, title:'Woodstock, NY for the day',                    category:'daytrip',  season:'fall',   notes:'The original artist colony in the Catskills. Good galleries, excellent record shops, great food. The town delivers on the mythology.', tip:'Trailways bus from Port Authority, ~2.5 hrs, ~$25 RT. Or Zipcar. Oriole 9 for brunch. Golden Notebook record shop on Tinker St is essential. Go in October.' },
    { id:187, title:'North Fork wine country, Long Island',         category:'daytrip',  season:'fall',   notes:'The right Long Island wine region. Less expensive, more interesting, more honest than the Hamptons. A whole afternoon of tastings.', tip:'LIRR to Greenport (~2.5 hrs, ~$25 RT). Rent bikes or arrange a shuttle between wineries. Shinn Estate and Bedell Cellars are both excellent. Go on a weekday.' },
    { id:188, title:'Saratoga Springs for the day',                 category:'daytrip',  season:'summer', notes:'A beautifully preserved Victorian spa town upstate. The racetrack in August, free mineral springs, Caffe Lena (the oldest folk venue in America), and great food.', tip:'Amtrak from Penn Station, ~3 hrs, ~$40–60 RT. Worth an overnight if possible. The Saratoga Race Course runs July through September. Congress Park mineral springs are free.' },
    { id:189, title:'Delaware Water Gap hike',                      category:'daytrip',  season:'fall',   notes:'A spectacular river gorge on the NJ-PA border. Waterfalls, ridge walks, swimming holes. One of the best hikes within two hours of the city.', tip:'Zipcar or rental, ~1.5 hrs. Dingmans Falls trail is easy and beautiful. Raymondskill Falls is the tallest waterfall in Pennsylvania. Spring and fall are best.' },
    // ── free 190-195 ─────────────────────────────────────────────────
    { id:190, title:'The Ford Foundation Building atrium',          category:'free',     season:'any',    notes:'A 12-story indoor tropical garden inside a Midtown office building. A lush, quiet, secret New York room almost nobody knows about.', tip:'320 E 43rd St, Midtown. Free, open weekdays during business hours. 42nd St-Grand Central on the 4/5/6/7. Just walk in through the lobby. The garden fills the entire interior court.' },
    { id:191, title:'The Museum at FIT',                            category:'free',     season:'any',    notes:'The fashion museum at the Fashion Institute of Technology. Free admission and often the most interesting design exhibitions in the city.', tip:'227 W 27th St, Chelsea. Free. 1 to 28th St. Closed Sun/Mon. Check fitnyc.edu/museum for the current show. Small but consistently excellent.' },
    { id:192, title:'Hunters Point South Park waterfront, LIC',    category:'free',     season:'summer', notes:'A long waterfront park in Long Island City with some of the best unobstructed Manhattan skyline views anywhere in New York. Almost no tourists.', tip:'7 to Hunters Point Ave or Vernon Blvd-Jackson Ave. Free, always open. Walk south along the waterfront. The views at golden hour are extraordinary.' },
    { id:193, title:'The Elevated Acre at 55 Water Street',         category:'free',     season:'any',    notes:'A secret elevated park above the street in the Financial District. Unexpected garden, wooden walkways, and harbor views from above. Almost nobody knows it exists.', tip:'55 Water St, Financial District. Free. Enter through the lobby or outdoor escalator on Old Slip. Open during business hours. A completely hidden piece of the city.' },
    { id:194, title:'Domino Park waterfront in Williamsburg',       category:'free',     season:'summer', notes:'A beautifully designed park on the old Domino Sugar factory site. Preserved industrial machinery, a waterfront promenade, and the best summer lawn in Brooklyn.', tip:'S 1st St and River St, Williamsburg. Free, always open. L to Bedford Ave, then walk west. The High Viaduct section gives elevated views of the East River.' },
    { id:195, title:'NYC Ferry ride for the ride itself',           category:'free',     season:'summer', notes:'Take the ferry to a neighborhood you\'d normally take the subway to. It completely changes how the city feels. Worth doing for the ride alone.', tip:'~$4 each way. Buy tickets on the NYC Ferry app. The East River route is the most scenic. South Brooklyn and Astoria routes show the city from angles you\'ve never seen.' },
    // ── classes 196-200 ──────────────────────────────────────────────
    { id:196, title:'Glass blowing at Urban Glass',                 category:'classes',  season:'any',    notes:'A two-hour beginner session where you shape something real from molten glass. Genuinely unlike any other class you have ever taken.', tip:'647 Fulton St, Fort Greene, Brooklyn. ~$100–150 for a beginner workshop. Book at urbanglass.org. Open studios also available. The results are imperfect and beautiful.' },
    { id:197, title:'Letterpress printing at Bowne & Co.',          category:'classes',  season:'any',    notes:'Learn to set type and print on a 19th-century letterpress machine. You leave with something you made by hand on a press that\'s been running for over 150 years.', tip:'211 Water St, South Street Seaport. ~$50–75. Book online. The shop itself is a museum of printing history. The neighborhood is worth exploring after.' },
    { id:198, title:'A hands-on cooking class in one cuisine',      category:'classes',  season:'any',    notes:'Pick a cuisine you both love and spend an afternoon learning to make it properly. Ethiopian, Japanese, Thai, or Italian, all available and all excellent.', tip:'The Brooklyn Kitchen (100 Frost St) and Haven\'s Kitchen (109 W 17th St) both run great hands-on classes. ~$80–130/person. Book 2–3 weeks ahead.' },
    { id:199, title:'Beginner weaving or macrame workshop',         category:'classes',  season:'any',    notes:'A 2-hour intro to hand weaving or macrame. More meditative than you expect. You leave with something that actually looks good.', tip:'Check Airbnb Experiences and Eventbrite for workshops in Williamsburg, Bushwick, and the LES. ~$55–85. Materials always provided. No experience needed.' },
    { id:200, title:'Natural perfume blending workshop',            category:'classes',  season:'any',    notes:'Blend your own fragrance from raw materials with a perfumer guiding the session. The whole olfactory experience is unlike anything else.', tip:'Several NYC perfumers offer workshops. Check Airbnb Experiences and Eventbrite. ~$60–100. Small groups, book ahead. You leave with a bottle of something entirely your own.' },
  ];

  // ── STATE ────────────────────────────────────────
  let items = [], currentCat = null, catFilter = 'all', editingId = null, pickedCat = 'food';
  const KEY = 'nyc-adv-v6';

  function load() {
    const raw = localStorage.getItem(KEY);
    if (!raw) {
      items = SEED.map(s => ({ ...s, status:'todo', dateCompleted:null, rating:null }));
    } else {
      const stored = JSON.parse(raw);
      const storedIds = new Set(stored.map(x => x.id));
      const newItems = SEED.filter(s => !storedIds.has(s.id))
        .map(s => ({ ...s, status:'todo', dateCompleted:null, rating:null }));
      items = [...stored, ...newItems];
    }
    save();
  }

  function save() { localStorage.setItem(KEY, JSON.stringify(items)); }

  // ── WHEEL ────────────────────────────────────────
  function renderWheel() {
    const done = items.filter(a => a.status==='done').length;
    const todo = items.filter(a => a.status==='todo').length;

    document.getElementById('centerNum').textContent = done;
    document.getElementById('statsRow').innerHTML =
      `<span><b>${items.length}</b> adventures</span><span><b>${done}</b> done</span><span><b>${todo}</b> to go</span>`;

    const lp   = document.querySelector('.left-panel');
    const size = Math.min(lp.offsetWidth - 80, lp.offsetHeight * 0.58, 480);
    const wrap = document.getElementById('wheelWrap');
    wrap.style.width = wrap.style.height = size + 'px';
    wrap.querySelectorAll('.wheel-node').forEach(n => n.remove());

    const cx = size/2, cy = size/2, r = size*0.375;
    const cs = size*0.22, ns = size*0.165;

    const c = document.getElementById('wheelCenter');
    c.style.width = c.style.height = cs + 'px';
    document.getElementById('centerNum').style.fontSize   = (cs*0.40) + 'px';
    document.getElementById('centerLabel').style.fontSize = (cs*0.13) + 'px';

    const svg = document.getElementById('wheelSvg');
    svg.innerHTML = '';

    Object.keys(CATS).forEach((key, i) => {
      const cat   = CATS[key];
      const angle = (i*36 - 90) * Math.PI/180;
      const nx    = cx + r*Math.cos(angle);
      const ny    = cy + r*Math.sin(angle);

      const line = document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1', cx + (cs/2+2)*Math.cos(angle));
      line.setAttribute('y1', cy + (cs/2+2)*Math.sin(angle));
      line.setAttribute('x2', nx - (ns/2+2)*Math.cos(angle));
      line.setAttribute('y2', ny - (ns/2+2)*Math.sin(angle));
      line.setAttribute('stroke','rgba(242,234,224,0.18)');
      line.setAttribute('stroke-width','1');
      svg.appendChild(line);

      const isActive = currentCat === key;
      const node = document.createElement('div');
      node.className = 'wheel-node' + (isActive ? ' active' : '');
      node.style.cssText = `left:${nx}px;top:${ny}px;width:${ns}px;height:${ns}px;` +
        (isActive ? `background:${cat.color};` : '');
      node.innerHTML = `<div class="node-name" style="font-size:${ns*0.185}px">${cat.label}</div>`;
      node.onclick = () => showCat(key);
      wrap.appendChild(node);
    });
  }

  // ── CAT VIEW ─────────────────────────────────────
  function showCat(key) {
    currentCat = key; catFilter = 'all';
    document.querySelectorAll('.cf-pill').forEach(p =>
      p.classList.toggle('active', p.dataset.cf==='all'));
    document.getElementById('catFilters').style.display = '';
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('catView').classList.add('visible');
    document.getElementById('wheelCenter').classList.remove('active-done');
    renderCatView(); renderWheel();
  }

  function showAllDone() {
    const done = items.filter(a => a.status === 'done');
    currentCat = null; catFilter = 'done';
    document.getElementById('catFilters').style.display = 'none';
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('catView').classList.add('visible');
    document.getElementById('wheelCenter').classList.add('active-done');
    document.documentElement.style.setProperty('--node-color', 'var(--accent)');
    renderWheel();

    document.getElementById('catTitle').textContent = 'Done';
    document.getElementById('catSubtitle').textContent =
      `${done.length} adventure${done.length !== 1 ? 's' : ''} completed`;

    if (!done.length) {
      document.getElementById('activityList').innerHTML =
        '<div class="empty-row">Nothing done yet. Go do something!</div>';
      return;
    }

    // Group by category, in CATS order
    const byCat = {};
    done.forEach(a => { (byCat[a.category] = byCat[a.category] || []).push(a); });
    // Sort within each group: most recently done first
    Object.values(byCat).forEach(arr =>
      arr.sort((a,b) => (b.dateCompleted||'').localeCompare(a.dateCompleted||'')));

    let html = '';
    Object.keys(CATS).forEach(key => {
      if (!byCat[key]?.length) return;
      const cat = CATS[key];
      html += `<div class="cat-group-header" style="color:${cat.color}">${cat.label}</div>`;
      byCat[key].forEach((a, i) => { html += rowHTML(a, i * 20); });
    });
    document.getElementById('activityList').innerHTML = html;
  }

  function renderCatView() {
    const cat      = CATS[currentCat];
    const catItems = items.filter(a => a.category===currentCat);
    const todo     = catItems.filter(a => a.status==='todo').length;
    const done     = catItems.filter(a => a.status==='done').length;

    document.getElementById('catTitle').textContent    = cat.label;
    document.getElementById('catSubtitle').textContent = `${todo} to do · ${done} done`;
    document.documentElement.style.setProperty('--node-color', cat.color);

    let visible = catItems.filter(a =>
      catFilter==='all' ||
      a.status===catFilter ||
      (catFilter==='todo' && a.status==='done' && a.repeat));
    const rank = x => x.status==='todo' ? 0 : (x.repeat ? 1 : 2);
    visible.sort((a,b) => rank(a) - rank(b));

    document.getElementById('activityList').innerHTML = visible.length
      ? visible.map((a,i) => rowHTML(a, i*25)).join('')
      : `<div class="empty-row">Nothing here yet. Add one above.</div>`;
  }

  function rowHTML(a, delay) {
    const cat         = CATS[a.category] || CATS.food;
    const isDone      = a.status==='done';
    const isRepeat    = isDone && a.repeat;
    const showAsTodo  = isRepeat && catFilter==='todo';

    const seasonBadge = (a.season && a.season!=='any')
      ? `<span class="season-tag" style="background:${SEASON_COLORS[a.season]}">${a.season}</span>` : '';
    const repeatBadge = showAsTodo
      ? `<span class="repeat-badge">done before</span>` : '';
    const stars = isDone ? `<div class="stars-row">${[1,2,3,4,5].map(n =>
      `<span class="star ${(a.rating||0)>=n?'lit':''}" onclick="rate(${a.id},${n})">&#9733;</span>`).join('')}</div>` : '';
    const date = a.dateCompleted ? `<span class="activity-date">${a.dateCompleted}</span>` : '';
    const repeatBtn = isDone
      ? `<button class="row-btn${a.repeat?' repeat-on':''}" style="font-size:0.65rem;width:auto;padding:0 6px;" onclick="toggleRepeat(${a.id})">${a.repeat ? 'added' : '+ again'}</button>`
      : '';

    return `<div class="activity-row ${isDone && !showAsTodo ? 'done' : ''}" style="--node-color:${cat.color};animation-delay:${delay}ms">
      <div class="status-dot" onclick="toggleDone(${a.id})"></div>
      <div class="activity-body">
        <div class="activity-top">
          <div class="activity-title" onclick="toggleDone(${a.id})">${esc(a.title)}</div>${seasonBadge}${repeatBadge}
        </div>
        ${(a.notes || a.tip) ? `<div class="activity-notes">${esc([a.notes, a.tip].filter(Boolean).join(' '))}</div>` : ''}
        ${a.link  ? `<a href="${esc(a.link)}" target="_blank" rel="noopener" class="activity-link">&#8599; ${linkHost(a.link)}</a>` : ''}
        ${isDone  ? `<div class="activity-meta">${stars}${date}</div>` : ''}
      </div>
      <div class="activity-actions">
        <button class="row-btn" onclick="openEdit(${a.id})">&#9998;</button>
        ${repeatBtn}
        <button class="row-btn del" onclick="del(${a.id})">&#10005;</button>
      </div>
    </div>`;
  }

  function linkHost(url) { try { return new URL(url).hostname.replace('www.',''); } catch { return 'link'; } }
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  // ── ACTIONS ──────────────────────────────────────
  function toggleDone(id) {
    const a = items.find(x => x.id===id); if (!a) return;
    if (a.status==='todo') {
      a.status='done';
      a.dateCompleted=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
      confetti();
    } else { a.status='todo'; a.dateCompleted=null; a.rating=null; }
    save(); renderWheel(); if (currentCat) renderCatView();
  }

  function toggleRepeat(id) {
    const a = items.find(x => x.id===id); if (!a) return;
    a.repeat = !a.repeat; save(); renderCatView();
  }

  function rate(id, n) {
    const a = items.find(x => x.id===id); if (!a) return;
    a.rating=n; save(); renderCatView();
  }

  function del(id) {
    if (!confirm('Remove this adventure?')) return;
    items=items.filter(x=>x.id!==id); save(); renderWheel(); if (currentCat) renderCatView();
  }

  // ── MODAL ────────────────────────────────────────
  function buildCatPicker() {
    document.getElementById('catPicker').innerHTML = Object.entries(CATS).map(([key,cat]) => {
      const sel = pickedCat===key;
      return `<div class="cat-opt${sel?' sel':''}" style="${sel?`background:${cat.color};`:''}" onclick="pickCat('${key}')">${cat.label}</div>`;
    }).join('');
  }

  function pickCat(key) { pickedCat=key; buildCatPicker(); }

  function openAdd(cat) {
    editingId=null; pickedCat=cat||currentCat||'food';
    document.getElementById('formTitle').textContent='New Adventure';
    ['fTitle','fNotes','fLink'].forEach(id => document.getElementById(id).value='');
    document.getElementById('fSeason').value='any';
    buildCatPicker();
    document.getElementById('formOverlay').classList.remove('hidden');
    setTimeout(()=>document.getElementById('fTitle').focus(),120);
  }

  function openEdit(id) {
    const a=items.find(x=>x.id===id); if (!a) return;
    editingId=id; pickedCat=a.category;
    document.getElementById('formTitle').textContent='Edit Adventure';
    document.getElementById('fTitle').value=a.title;
    document.getElementById('fNotes').value=a.notes||'';
    document.getElementById('fLink').value=a.link||'';
    document.getElementById('fSeason').value=a.season||'any';
    buildCatPicker();
    document.getElementById('formOverlay').classList.remove('hidden');
  }

  function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

  function saveItem() {
    const title=document.getElementById('fTitle').value.trim();
    if (!title) { document.getElementById('fTitle').focus(); return; }
    const p={title, category:pickedCat,
      notes:document.getElementById('fNotes').value.trim(),
      link:document.getElementById('fLink').value.trim(),
      season:document.getElementById('fSeason').value};
    if (editingId) Object.assign(items.find(x=>x.id===editingId),p);
    else items.push({id:Date.now(),...p,status:'todo',dateCompleted:null,rating:null});
    save(); closeModal('formOverlay'); renderWheel();
    if (currentCat===pickedCat) renderCatView(); else showCat(pickedCat);
  }

  // ── SURPRISE ─────────────────────────────────────
  function surpriseMe() {
    const pool=items.filter(a=>a.status==='todo'||a.repeat);
    if (!pool.length) { alert("You've done everything! Add more adventures."); return; }
    const pick=pool[Math.floor(Math.random()*pool.length)];
    const cat=CATS[pick.category]||CATS.food;
    document.getElementById('sCat').textContent=cat.label;
    document.getElementById('sCat').style.background=cat.color;
    document.getElementById('sNotes').textContent=pick.notes||'';
    const sTip=document.getElementById('sTip');
    if(sTip){ sTip.textContent=pick.tip||''; sTip.style.display=pick.tip?'block':'none'; }
    // animate title reveal on each pick
    const titleEl = document.getElementById('sTitle');
    titleEl.classList.remove('reveal');
    void titleEl.offsetWidth; // force reflow
    titleEl.textContent = pick.title;
    titleEl.classList.add('reveal');
    document.getElementById('surpriseOverlay').classList.remove('hidden');
  }

  // ── CONFETTI ─────────────────────────────────────
  function confetti() {
    const layer=document.getElementById('confetti-layer');
    const colors=Object.values(CATS).map(c=>c.color);
    for (let i=0;i<70;i++) {
      const el=document.createElement('div'); el.className='cf';
      const s=Math.random()*8+4;
      el.style.cssText=`left:${Math.random()*100}vw;top:-10px;width:${s}px;height:${s}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${Math.random()*2+1.4}s;animation-delay:${Math.random()*0.5}s;`;
      layer.appendChild(el);
      el.addEventListener('animationend',()=>el.remove());
    }
  }

  // ── EVENTS ───────────────────────────────────────
  document.getElementById('catFilters').addEventListener('click', e => {
    const btn=e.target.closest('.cf-pill'); if (!btn) return;
    catFilter=btn.dataset.cf;
    document.querySelectorAll('.cf-pill').forEach(p=>p.classList.toggle('active',p===btn));
    renderCatView();
  });

  document.querySelectorAll('.overlay').forEach(o=>
    o.addEventListener('click',e=>{ if(e.target===o) o.classList.add('hidden'); }));

  document.addEventListener('keydown',e=>{
    if(e.key==='Escape') document.querySelectorAll('.overlay').forEach(o=>o.classList.add('hidden'));
  });

  let rt;
  window.addEventListener('resize',()=>{ clearTimeout(rt); rt=setTimeout(renderWheel,150); });

  load();
  requestAnimationFrame(renderWheel);
  </script>
</body>
</html>
