    { id:318, title:'A float tank session in Brooklyn',                  category:'wellness', season:'any',    notes:'One hour floating in a sensory deprivation tank. A profoundly strange and meditative experience that\'s impossible to explain until you\'ve done it. The hour feels like ten minutes.', tip:'Lift / Next Therapy / Float Lab — multiple Brooklyn and Manhattan locations. ~$70–90/session. Book online. Go into it with no agenda. The first 20 minutes are always awkward; the second 40 are remarkable.' },
    { id:319, title:'Walk the full Central Park loop',                  category:'wellness', season:'spring', notes:'The full outer loop of Central Park is 6.1 miles. Start at any point and go all the way around. You\'ll pass things you\'ve never noticed even after years in the city.', tip:'Free, always open. The loop is paved and clearly marked. Add the Reservoir loop (1.6 miles) for an extra layer. Best on a weekday morning. The North Woods section feels genuinely wild.' },
    { id:320, title:'Horseback riding at Kensington Stables, Prospect Park', category:'wellness', season:'spring', notes:'Rent a horse for an hour and ride through Prospect Park. One of the stranger, more wonderful things you can do on a weekend morning in Brooklyn.', tip:'51 Caton Pl, Kensington, Brooklyn. ~$70–80/hour/person. kensingtonstables.com. F to Fort Hamilton Pkwy. Book in advance. Rides go through the wooded paths of Prospect Park. No experience required.' },
    { id:321, title:'A guided forest bathing walk in the Ramble',       category:'wellness', season:'fall',   notes:'The Ramble in Central Park is 36 acres of deliberately wild woodland in the middle of the city. In fall, the birding and the foliage both peak. A slow guided walk changes the experience entirely.', tip:'Enter the Ramble from the West 77th St or East 79th St gates. The NYC Audubon Society and Central Park Conservancy both lead walks. ~$10–20. Free to wander independently. Fall migration: September–October.' },
    { id:322, title:'A slow Sunday at the Korean spa, Juvenex',         category:'wellness', season:'any',    notes:'A women-only Korean spa in Midtown with multiple soaking pools, steam rooms, and body scrub services. A full afternoon that costs less than most spa days.', tip:'25 W 32nd St, 5th floor, Midtown (women only). ~$35–45 admission. B/D/F/M/N/Q/R to 34th St-Herald Square. The scrub treatments are additional (~$50). Open 24 hours — the morning hours before 10am are quietest.' },
    { id:323, title:'Swimming laps at the Asphalt Green pool',          category:'wellness', season:'any',    notes:'An Olympic-size indoor pool on the Upper East Side. Actual lane swimming, not a fitness spa. A rare chance to do real open-water laps in Manhattan.', tip:'555 E 90th St, UES. Day passes ~$25–35 for non-members. 4/5/6 to 86th St. Lap swim hours vary by day — check asphaltgreen.org before going. The morning lap swim session is serious and excellent.' },
    { id:324, title:'A long bike ride on the Hudson River Greenway',    category:'wellness', season:'summer', notes:'The Hudson River Greenway runs 13 miles up the west side of Manhattan from Battery Park to the George Washington Bridge. Rent a Citi Bike or bring your own and ride the whole thing.', tip:'Citi Bike stations throughout. ~$4 for a single trip. The path is entirely car-free. The Soldiers and Sailors Monument near 89th St and the Little Red Lighthouse under the GWB are the high points.' },
    { id:325, title:'A day of hot yoga, then a long dinner',             category:'wellness', season:'winter', notes:'Ninety minutes of hot yoga, then a slow dinner somewhere nearby. The physical contrast — drenched, then sitting with food and wine — is one of the better ways to spend a winter Saturday.', tip:'CorePower Yoga and Bikram Studios have multiple NYC locations. ~$20–30/class or ClassPass. Book a dinner nearby for after. The contrast between the heat and the meal makes both better.' },
    { id:326, title:'An aerial yoga or trapeze class',                  category:'wellness', season:'any',    notes:'The Trapeze School of New York runs beginner lessons on the roof of a pier on the Hudson River. Aerial yoga studios in Brooklyn offer hammock-based inversions. Both are genuinely fun.', tip:'Trapeze School: Pier 40, Hudson River Park (~$65 for a lesson). Aerial yoga: multiple Brooklyn studios on ClassPass or Airbnb Experiences. ~$25–45. Book in advance; classes fill quickly.' },
    { id:327, title:'A sunset paddle on the Hudson or Gowanus Canal',   category:'wellness', season:'summer', notes:'Kayak or stand-up paddleboard at sunset on the Hudson, or take a guided paddle on the Gowanus Canal (genuinely weird, completely worth it). The city from water level is unrecognizable.', tip:'Manhattan Kayak at Pier 84 (free community kayaking Tue–Sun in summer). Gowanus Dredgers Canoe Club offers free canoe launches from 2nd St. Both are free — no experience needed for flatwater paddling.' },

    // ── DAY TRIPS 328–344 ───────────────────────────
    { id:328, title:'A long weekend in the Catskills',                  category:'daytrip',  season:'fall',   notes:'Book a cabin or small inn in Woodstock, Phoenicia, or Catskill for two nights. Hike Slide Mountain or the Escarpment Trail. Eat at a farm-to-table spot. Drive home Sunday evening.', tip:'Zipcar or rental, ~2–2.5 hrs to Phoenicia. Cold Hollow cabins or The Graham (Tivoli) for stays. Black Bear Restaurant in Phoenicia for dinner. Peak foliage is mid-October.' },
    { id:329, title:'Greenport and Orient Point, Long Island',           category:'daytrip',  season:'summer', notes:'Greenport is a beautifully preserved whaling village at the end of the North Fork. Ferry to Shelter Island, oysters at a waterfront restaurant, then the beach.', tip:'LIRR to Greenport (~2.5 hrs, ~$25 RT). The South Street ferry runs to Shelter Island. Claudio\'s clam bar has been open since 1870. The Shelter Island ferry from Greenport is ~$3/person.' },
    { id:330, title:'Storm King Art Center',                             category:'daytrip',  season:'fall',   notes:'Vast outdoor sculpture spread over 500 acres of Hudson Valley landscape. Mark di Suvero\'s massive steel works look different every hour as the light changes. An all-day experience.', tip:'Metro-North to Beacon (~1.5 hrs) + shuttle, or Zipcar/rental directly (~1 hr). ~$20 admission. stormking.org. Open April–November. Bring comfortable shoes and a picnic. Budget 4–5 hours.' },
    { id:331, title:'Cold Spring and the Hudson Valley',                 category:'daytrip',  season:'spring', notes:'A small Victorian river town an hour north of the city, with hiking on Hudson Highlands trails and views straight down the river. The town itself has good food and antique shops.', tip:'Metro-North Hudson Line to Cold Spring (~1.25 hrs, ~$20 RT). Bull Hill via the Cornish Estate is the best hike. The Hudson Hil\'s Cookhouse does good lunch. The train back to the city at sunset is the whole point.' },
    { id:332, title:'The Delaware & Hudson Canal Heritage Corridor',     category:'daytrip',  season:'summer', notes:'The D&H Canal towpath in the Hudson Valley offers flat, shaded walking along a historic 19th-century waterway — completely quiet, deeply rural, and still very close to New York.', tip:'Zipcar to High Falls, NY (~2 hrs). The towpath runs for miles north and south of High Falls. Stone arch bridges still cross the canal. The DePuy Canal House in High Falls for lunch.' },
    { id:333, title:'A day in Asbury Park, New Jersey',                  category:'daytrip',  season:'summer', notes:'Asbury Park has been genuinely revived. The boardwalk, the beach, the Asbury Lanes bowling alley, and some excellent restaurants. A full day that doesn\'t feel like a compromise.', tip:'NJ Transit from Penn Station to Asbury Park (~1.5 hrs, ~$20 RT). The Wonder Bar, Porta pizza, and the Asbury Hotel rooftop bar are all essential. The beach itself is free and beautiful.' },
    { id:334, title:'The Sleepy Hollow area in fall',                    category:'daytrip',  season:'fall',   notes:'Sleepy Hollow Cemetery, Kykuit (the Rockefeller estate), and Tarrytown — all within an easy drive or Metro-North trip. The Halloween-season decorations are legitimately excellent.', tip:'Metro-North Hudson Line to Tarrytown (~40 min, ~$15 RT). Walk or bus to Sleepy Hollow Cemetery. Kykuit tours ($23–$35) run April–November. October weekends in Sleepy Hollow are atmospheric and crowded.' },
    { id:335, title:'A farm visit in the Hudson Valley',                 category:'daytrip',  season:'fall',   notes:'Apple picking at Fishkill Farms or Samascott Orchards, with a cider doughnut and a jug of cider pressed on the premises. A reliable fall ritual that never disappoints.', tip:'Fishkill Farms: 9 Fishkill Farm Rd, Fishkill. ~2 hrs by car. Pick-your-own apples ~$20–30/bag. The orchard cider is the reason. Go on a weekday to avoid the fall weekend crowds.' },
    { id:336, title:'A day at Fire Island',                              category:'daytrip',  season:'summer', notes:'A barrier island with no cars, no roads, just wooden boardwalks and ocean beach. The Fire Island Pines and Cherry Grove communities are genuinely beautiful and different from anything else.', tip:'LIRR to Bay Shore, then the Fire Island Ferry (~$12 RT) to the Pines or Cherry Grove. The ferry runs May–October. No cars on the island. Bring everything you need; limited stores.' },
    { id:337, title:'Mohonk Mountain House and the Shawangunk Ridge',    category:'daytrip',  season:'summer', notes:'The Shawangunks are one of the best rock climbing and hiking areas in the Northeast. The Mohonk Preserve offers miles of carriage roads and cliff-side trails with extraordinary views.', tip:'Zipcar, ~2 hrs. Mohonk Preserve day pass ~$20. mohonkpreserve.org. The Trapps carriage road is the classic route. The Sky Top Tower on the Mohonk Mountain House property is open to non-guests for a fee.' },
    { id:338, title:'Montauk for a day',                                 category:'daytrip',  season:'summer', notes:'The far end of Long Island — actual dunes, a real lighthouse, and the best fried fish shack in the Hamptons. Go in June before the crowds arrive.', tip:'LIRR to Montauk (~3.5 hrs, ~$30+ RT). Gurney\'s for drinks. Lunch at Duryea\'s lobster shack. The Montauk Lighthouse park is the eastern tip of New York. Go early June or after Labor Day.' },
    { id:339, title:'Princeton for an afternoon',                        category:'daytrip',  season:'any',    notes:'NJ Transit brings you to the most beautiful American university campus within reach of the city. The art museum, the architecture, and Nassau Street\'s bookshops make a perfect afternoon.', tip:'NJ Transit from Penn Station to Princeton Junction, then the Dinky to Princeton (~1.25 hrs, ~$20 RT). The Princeton University Art Museum is free. Labyrinth Books on Nassau St is essential.' },
    { id:340, title:'West Point, Hudson Valley',                         category:'daytrip',  season:'fall',   notes:'The military academy sits on one of the most strategically dramatic bends of the Hudson River. The grounds, the museum, and the river view at Trophy Point are genuinely impressive.', tip:'Metro-North to Garrison, then taxi (~$15), or guided tour. The West Point Museum is free. Trophy Point and the Constitution Island ferry are the best public access points. Fall football weekends are crowded.' },
    { id:341, title:'A day in New Haven for pizza',                      category:'daytrip',  season:'any',    notes:'The pilgrimage to Pepe\'s, Sally\'s, and Modern Apizza. Three of the most important pizza places in America, all within walking distance of each other in New Haven. A genuine food trip.', tip:'Metro-North New Haven Line from Grand Central (~2 hrs, ~$25 RT). Frank Pepe Pizzeria is at 157 Wooster St. Sally\'s is at 237 Wooster. Go on a weekday, waits are shorter. Lunch service starts at 11:30am.' },
    { id:342, title:'A day trip to Pennsylvania\'s Brandywine Valley',   category:'daytrip',  season:'fall',   notes:'The Brandywine River Museum of Art (Andrew Wyeth\'s paintings in his actual landscape) and Longwood Gardens. A legitimately beautiful corner of the mid-Atlantic countryside.', tip:'Zipcar, ~2 hrs to Chadds Ford, PA. Brandywine River Museum ~$18 (brandy wine.org). Longwood Gardens ~$25 (longwoodgardens.org). Go in October for the fall display. The Wyeth country is worth it alone.' },
    { id:343, title:'A train up to Hudson, NY',                          category:'daytrip',  season:'any',    notes:'The small city of Hudson, NY has one of the best antique strips in the Northeast, excellent restaurants, and a walkable downtown that feels like another era. A perfect half-day from the city.', tip:'Amtrak from Penn Station to Hudson (~2 hrs, ~$40 RT). Warren Street is the main strip. Hudson\'s Antiques Row runs along Warren and Columbia St. Swoon Kitchen Bar for dinner before the train back.' },
    { id:344, title:'Block Island by ferry',                             category:'daytrip',  season:'summer', notes:'A small car-free island off the coast of Rhode Island with Victorian hotels, clay bluffs, and empty beaches. One of the most beautiful day trips from New York — if you don\'t mind a full travel day.', tip:'Take Amtrak to New London, CT (~2.5 hrs), then the Block Island Express ferry (~1.5 hrs). Bicycle rentals on the island. The Southeast Light and the North Light are both worth the ride. Go on a weekday.' },

    // ── FREE 345–364 ────────────────────────────────
    { id:345, title:'The Panorama of the City of New York at QMA',      category:'free',     season:'any',    notes:'A 9,335-square-foot scale model of every building in New York City, built in 1964. Updated periodically. One of the most extraordinary objects in any museum anywhere.', tip:'Queens Museum, Flushing Meadows-Corona Park. ~$8 suggested. 7 to Mets-Willets Point. The Panorama is in a darkened room on the lower level. The simulated day-night light cycle runs every hour.' },
    { id:346, title:'Free concerts at Lincoln Center Out of Doors',      category:'free',     season:'summer', notes:'Lincoln Center\'s outdoor summer festival brings world-class classical, jazz, and global music to Damrosch Park. Free, every summer, spanning several weeks.', tip:'Damrosch Park, Lincoln Center Plaza. Free, no tickets required. July–August. lcoutofdoors.org for the schedule. Bring a blanket. The lawn fills fast for the most popular acts — arrive early.' },
    { id:347, title:'SummerStage in Central Park',                       category:'free',     season:'summer', notes:'The city\'s largest free outdoor music festival, running all summer long in Central Park. Jazz, global music, hip-hop, spoken word, dance — dozens of free performances across two months.', tip:'Rumsey Playfield, mid-park at 72nd St. Most shows free, some ticketed benefits. cityparksfoundation.org/summerstage for the schedule. Gates open 30 min before showtime. Blankets welcome.' },
    { id:348, title:'The New York Public Library reading rooms',          category:'free',     season:'any',    notes:'The Rose Main Reading Room on the third floor of the 42nd Street library is one of the great interior spaces in the world. Spend an afternoon doing nothing in particular in a room that makes it feel significant.', tip:'5th Ave and 42nd St, Midtown. Free, open to the public. 7/B/D/F/M to 42nd St-Bryant Park. The map room, the print collection, and the exhibition gallery on the ground floor are all also free and excellent.' },
    { id:349, title:'Bryant Park in the summer — outdoor films',          category:'free',     season:'summer', notes:'Every Monday evening in summer, Bryant Park screens classic films on the lawn for free. Arrive early to stake out a spot. The city skyline serves as the backdrop.', tip:'42nd St between 5th and 6th Ave. Films start at dusk, ~8pm. bryantpark.org for the schedule. Bring a blanket and a bottle. People arrive at 5pm to claim space. The films skew classic Hollywood.' },
    { id:350, title:'MoMA free Fridays (suggested donation)',             category:'free',     season:'any',    notes:'MoMA\'s suggested donation model means you can visit for whatever you choose to pay on any day. The collection alone — Monet, Matisse, Warhol, Picasso, Judd — justifies a regular visit.', tip:'11 W 53rd St, Midtown. Suggested $25 admission. E/M to 5th Ave-53rd St. The free floors are accessible to anyone. The second-floor contemporary gallery and the sculpture garden are always free.' },
    { id:351, title:'The Socrates Sculpture Park open installation',      category:'free',     season:'any',    notes:'Large-scale outdoor sculpture in a park on the East River in Long Island City. Always free, always changing, and the Manhattan skyline from this angle is extraordinary.', tip:'32-01 Vernon Blvd, Long Island City. Free, always open during daylight. N/W to Broadway (Astoria). The main installation changes seasonally. Bring a coffee and walk the perimeter. Views of Midtown from Queens.' },
    { id:352, title:'Free gallery night on the UES museum mile',          category:'free',     season:'summer', notes:'One Tuesday night in June, Museum Mile (5th Avenue from 82nd to 105th St) opens all nine museums for free. A street festival replaces the traffic. One of the best nights in the New York calendar.', tip:'Museum Mile Festival runs the second Tuesday of June, 6–9pm. Free entry to the Met, Jewish Museum, Cooper Hewitt, Neue Galerie, and more. The street between 82nd and 105th is closed to cars. Arrive early.' },
    { id:353, title:'Wave Hill in the Bronx',                             category:'free',     season:'spring', notes:'A 28-acre private garden and public cultural center in Riverdale, the Bronx, with views across the Hudson to the Palisades. Free on certain days and always beautiful.', tip:'Henry Hudson Pkwy at W 249th St, Riverdale. Free on Saturdays until noon and all day Tuesday. wavehill.org. 1 to 231st St + BX7 bus. The wild garden and the Pergola overlook are the high points.' },
    { id:354, title:'The African Burial Ground National Monument',        category:'free',     season:'any',    notes:'A small but deeply important national monument in Lower Manhattan marking the largest known African burial ground in North America, rediscovered during construction in 1991.', tip:'290 Broadway, Lower Manhattan. Free. 4/5/6/A/C/J/Z to Fulton St. The visitor center is inside the federal building lobby (check hours). The outdoor monument is always accessible. Plan to stay longer than you expect.' },
    { id:355, title:'St. Patrick\'s Cathedral interior, Midtown',         category:'free',     season:'any',    notes:'The Gothic Revival interior of St. Patrick\'s is one of the grandest rooms in New York, and it\'s always free to enter. The contrast with Fifth Avenue outside is dramatic.', tip:'5th Ave between 50th and 51st St, Midtown. Free, open daily 6:30am–8:45pm. B/D/F/M to 47-50th St-Rockefeller Center. The Rose Window and the Lady Chapel in the rear are both worth stopping for.' },
    { id:356, title:'The Harlem waterfront park and Swindler Cove',       category:'free',     season:'summer', notes:'A quietly beautiful park and small waterway on the Harlem River in Washington Heights — almost entirely unknown, genuinely peaceful, and a completely different view of the city.', tip:'Peter Jay Sharp Boathouse, 50 Sherman Creek Lane, Inwood. Free. 1 to Dyckman St. Swindler Cove Park has a kayak launch (free in summer), a small garden, and unobstructed views across the Harlem River.' },
    { id:357, title:'The High Bridge, the oldest standing bridge in NYC', category:'free',     season:'any',    notes:'The High Bridge, completed in 1848, is the oldest standing bridge connecting Manhattan to the mainland. It was restored in 2015 and now has a pedestrian walkway with remarkable views.', tip:'W 174th St and Amsterdam Ave, Washington Heights. Free. 1 to 181st St. Walk across to the Bronx side and back. The view north toward Yankee Stadium and south toward Midtown is excellent. Bring a camera.' },
    { id:358, title:'The Metropolitan Oval athletic grounds, Maspeth',    category:'free',     season:'summer', notes:'An extremely unusual private park in Queens — a 100-year-old sports and social club with immaculate grass fields, open to members but accessible to the public in certain circumstances. Worth investigating.', tip:'Free public parks are nearby: Flushing Meadows-Corona Park is the better choice for most outdoor activity in Queens. The Metropolitan Oval is worth knowing for the spectacle of an intact 1920s sports ground.' },
    { id:359, title:'Inwood Hill Park, the last old-growth forest in Manhattan', category:'free', season:'fall', notes:'The northernmost park in Manhattan contains the last remaining old-growth forest on the island — actual 200-year-old trees, a salt marsh, and the cave where Peter Minuit reportedly purchased Manhattan.', tip:'Enter at Payson Ave and Isham St, Inwood. A to Inwood-207th St. Free, always open. The ancient tulip trees in the northwestern section are the main draw. Fall foliage here is genuinely impressive.' },
    { id:360, title:'First Saturday at the Brooklyn Museum',              category:'free',     season:'any',    notes:'On the first Saturday of every month, the Brooklyn Museum is free from 5–11pm, with music, performances, art-making, and a young, energetic crowd. One of the best regular events in the city.', tip:'200 Eastern Pkwy, Crown Heights. Free 5–11pm on first Saturdays. 2/3 to Eastern Pkwy-Brooklyn Museum. The programming includes live DJ sets in the lobby, gallery talks, and the full collection. Arrive after 7pm.' },
    { id:361, title:'The Gowanus Lounge neighborhood walk',               category:'free',     season:'any',    notes:'The Gowanus Canal neighborhood is mid-transformation — Superfund cleanup, new parks, surviving industrial buildings, and a genuine community of studios and bars. A walk along the canal is always changing.', tip:'F/G to 4th Ave-9th St or Smith-9th St. Walk along 2nd Avenue between 2nd and 9th Streets. The canal is literally toxic but the walking path alongside it is safe and strange. Lavender Lake bar is the post-walk stop.' },
    { id:362, title:'Free yoga in the park (summer only)',                category:'free',     season:'summer', notes:'Both Central Park and Brooklyn Bridge Park run free yoga classes on summer mornings. Hundreds of people on the lawn, the city as the backdrop. Bring your own mat.', tip:'Central Park: SummerStage or the Naumburg Bandshell lawn. Brooklyn Bridge Park: Pier 2 or Pier 6. Classes run July–August, usually 9–10am on weekdays. cityparksfoundation.org for schedules.' },
    { id:363, title:'A walk through the Grand Central Terminal food hall', category:'free',     season:'any',    notes:'The Grand Central Dining Concourse is one of the great American food halls, deep underground in the most beautiful train station in the country. Walk the whole length, then eat whatever.', tip:'89 E 42nd St, Midtown. Free to wander, open daily. 4/5/6/7/S to Grand Central-42nd St. The Campbell Apartment cocktail bar is upstairs in what was a Gilded Age office. The Oyster Bar downstairs has been open since 1913.' },
    { id:364, title:'A night walk through the Financial District',         category:'free',     season:'any',    notes:'Lower Manhattan after 9pm is quietly surreal — empty streets, lit-up towers, the National September 11 Memorial pools, and the whole harbor visible from the Battery. A genuinely different version of the city.', tip:'4/5 to Wall St or 1 to Rector St. Walk from the Memorial through the old streets (Stone St, Exchange Pl) and down to Battery Park. Stone St has several good old bars. The Charging Bull is best without crowds.' },

    // ── CLASSES 365–380 ─────────────────────────────
    { id:365, title:'A knife skills class at a culinary school',          category:'classes',  season:'any',    notes:'A two-hour class on the fundamentals of knife technique. It\'s one of those things that immediately makes cooking at home better, and the class is usually more fun than you expect.', tip:'The Institute of Culinary Education (225 Liberty St) and the French Culinary Institute both run knife skills workshops. ~$75–120. Book online. You leave with better habits and usually a small recipe packet.' },
    { id:366, title:'A pottery class series in Gowanus or Greenpoint',    category:'classes',  season:'any',    notes:'A four-session beginner wheel-throwing class. The first session you produce lumps. By the fourth, you make something recognizable. One of the better activities to do as a pair.', tip:'Choplet (396 Van Brunt, Red Hook), Mud, Sweat & Tears (654 10th Ave), or the Brooklyn Pottery Hub offer beginner series. ~$200–280 for 4–6 sessions. Book several weeks ahead. Wear old clothes.' },
    { id:367, title:'A sushi-making class with a real sushi chef',         category:'classes',  season:'any',    notes:'Learn to make sushi rice, break down fish, and roll maki from an actual trained sushi chef. A genuinely technical skill that\'s surprisingly accessible in a single workshop.', tip:'Multiple options on Airbnb Experiences from Japanese chefs in Manhattan and Brooklyn. ~$80–120/person. Bring an apron. The fish prep section is usually the most instructive. You eat what you make.' },
    { id:368, title:'A screenprinting workshop at the Gowanus Print Lab',  category:'classes',  season:'any',    notes:'A two-hour intro to screenprinting. You design, expose, and print your own image on fabric or paper. A craft with a real history in New York protest and art culture.', tip:'Gowanus Print Lab and other Brooklyn workshops offer intro sessions. Check Eventbrite and Airbnb Experiences. ~$55–85. Materials and a shirt/tote bag usually included. No experience needed.' },
    { id:369, title:'A cyanotype workshop at a Brooklyn arts space',       category:'classes',  season:'any',    notes:'A historic photographic printing process using sunlight and iron compounds. You bring objects or negatives and produce beautiful blue prints. A completely different kind of photography class.', tip:'The Brooklyn Brainery and various arts spaces run cyanotype workshops. Check Eventbrite for upcoming sessions. ~$45–65. Materials provided. Results are immediately satisfying — you leave with actual prints.' },
    { id:370, title:'A bread baking workshop at Sullivan Street Bakery',   category:'classes',  season:'any',    notes:'Jim Lahey\'s Sullivan Street Bakery invented the no-knead bread technique. Their bread classes teach the technique directly, in the bakery, from the source.', tip:'533 W 47th St, Hell\'s Kitchen. Check the bakery\'s website and Eventbrite for scheduled workshops. ~$75–100. You leave with loaves you made yourself and a recipe you\'ll actually use. Book early, they fill fast.' },
    { id:371, title:'An Argentine tango class at a milonga',               category:'classes',  season:'any',    notes:'Tango lessons followed by an actual milonga (social dance) where you practice. The studio atmosphere is serious and warm, the technique is genuinely difficult, and the payoff is extraordinary.', tip:'La Nacional (239 W 14th St) and Dardo Galletto Studios run beginner classes before milongas. ~$20–30/class. Check their websites for schedules. The lesson is 1 hr, then the milonga runs 2–4 more hours.' },
    { id:372, title:'A cocktail science class at MOFAD',                   category:'classes',  season:'any',    notes:'The Museum of Food and Drink in Williamsburg runs events and tastings that approach food and drink with genuine rigor. A cocktail history or spirits tasting class is one of their best events.', tip:'62 Bayard St, Williamsburg. ~$30–60 depending on the event. mofad.org for upcoming events. L to Lorimer St. Their fermentation and food science programs are also excellent.' },
    { id:373, title:'A bookbinding workshop at the Center for Book Arts',  category:'classes',  season:'any',    notes:'Learn to bind your own book — the Coptic stitch, Japanese binding, or a case-bound journal. A meditative, precise craft that produces something you\'ll actually use.', tip:'28 W 27th St, Flatiron. ~$75–120. centerforbookarts.org. 1/N/R/W to 28th St. Classes run through the year. The gallery is also free and exhibitions are consistently excellent.' },
    { id:374, title:'A drawing from life class at the Art Students League',category:'classes',  season:'any',    notes:'The Art Students League has offered open drawing classes since 1875. A live model, charcoal paper, a quiet room, and instructors who have been teaching for decades. Open to all skill levels.', tip:'215 W 57th St, Midtown. ~$25–35/class. theartstudentsleague.org. Open enrollment in most classes. Single-session figure drawing classes are the easiest to try first. Materials available on-site for purchase.' },
    { id:375, title:'An improv comedy workshop at UCB or PIT',              category:'classes',  season:'any',    notes:'A single-session improv workshop — not a performance, just a 3-hour introduction to the skills and mindset. Useful beyond comedy. Genuinely one of the better ways to spend a Saturday morning.', tip:'UCB (555 W 42nd St) and the PIT (123 E 24th St) both offer intro workshops and audition prep classes. ~$30–50. Check ucbtheatre.com and thepit-nyc.com for upcoming workshops.' },
    { id:376, title:'A furniture upholstery class in Brooklyn',             category:'classes',  season:'any',    notes:'Find a chair at a flea market and take an intro upholstery class to restore it. A craft that requires patience but produces a genuinely useful, lasting result.', tip:'The Brooklyn Brainery and various makers\' spaces offer intro upholstery workshops. ~$75–150 for a multi-session course. Check Eventbrite and Skillshare. Bring a reference photo of what you want to end up with.' },
    { id:377, title:'A workshop in natural dyeing and indigo',              category:'classes',  season:'summer', notes:'An afternoon learning to dye fabric with natural plant dyes or traditional Japanese indigo. The results are beautiful and unpredictable. A growing craft community in Brooklyn.', tip:'Handweaving NYC and other Brooklyn studios offer natural dye workshops. ~$65–95. Check Eventbrite. Materials provided. Summer is the best season because many dye plants are in season. Wear old clothes.' },
    { id:378, title:'A circuit bending or electronics workshop at NYC Resistor', category:'classes', season:'any', notes:'NYC Resistor in Gowanus is a hacker collective that runs regular craft nights and intro workshops in electronics, 3D printing, and laser cutting. Genuinely fun for non-engineers.', tip:'87 3rd Ave, Gowanus, Brooklyn. Check nycresistor.com for upcoming classes and open hack nights. ~$10–30. No experience needed for most workshops. F/G/R to 4th Ave-9th St.' },
    { id:379, title:'A botanical illustration class at NYBG',               category:'classes',  season:'spring', notes:'The New York Botanical Garden\'s School of Professional Horticulture offers botanical drawing and illustration classes in the gardens themselves. Exceptional setting for a studio art class.', tip:'2900 Southern Blvd, Bronx. ~$75–150 per session. nybg.org/gardens-and-plants/school-of-professional-horticulture. B/D/4 to Bedford Park Blvd-Lehman College, then BX26 bus. Spring sessions are best.' },
    { id:380, title:'A cheese and wine pairing class',                      category:'classes',  season:'any',    notes:'A guided tasting of six to eight cheeses with paired wines, led by a cheesemonger or sommelier. An accessible, sociable class that always produces good conversation.', tip:'Murray\'s Cheese (254 Bleecker St) runs excellent pairing classes. ~$65–95/person. murrayscheese.com for upcoming events. The staff are knowledgeable and not snobby. Friday evening classes are the most relaxed.' },

    // ── FINAL 20: 381–400 ───────────────────────────
    { id:381, title:'Negronis at the Dante bar, West Village',            category:'food',     season:'any',    notes:'Dante has the best Negroni program in the city — twenty-plus variations, a Roman aperitivo hour menu, and a room that feels like an Italian bar from another decade.', tip:'79-81 MacDougal St, West Village. No reservations, walk-in only. Aperitivo hour (4–7pm Mon–Fri) is the best value. ~$18–22/cocktail. Go on a weekday evening before the weekend crowds.' },
    { id:382, title:'A meditation retreat day at the Interdependence Project', category:'wellness', season:'any', notes:'A single-day urban meditation retreat — extended sitting practice, dharma talks, and walking meditation in the middle of the city. A genuinely different kind of Saturday.', tip:'The Interdependence Project holds periodic day retreats. ~$50–80, sliding scale often available. Check their website. No prior meditation experience required. The sessions are secular and non-dogmatic.' },
    { id:383, title:'The vintage market at Artists & Fleas, Chelsea Market', category:'explore', season:'any',  notes:'One of the best curated vintage and independent designer markets in the city, now inside Chelsea Market year-round. Better than most flea markets for quality-to-price ratio.', tip:'75 9th Ave (Chelsea Market), Chelsea. Free entry. Open Sat–Sun 10am–9pm. A/C/E/L to 14th St-8th Ave. The independent jewelry and clothing vendors are the strongest part. Easy to spend two hours.' },
    { id:384, title:'A morning at the Grand Bazaar NYC flea market',       category:'explore',  season:'any',    notes:'The best nonprofit flea market in Manhattan, running on the Upper West Side every Sunday. Proceeds support the school whose parking lot it uses. Genuinely good vintage finds.', tip:'100 W 77th St, Upper West Side. Sundays 10am–5:30pm, year-round. Suggested $1 donation. 1 to 79th St. The art prints, pottery, and vintage clothing sections are the strongest. Arrive before noon.' },
    { id:385, title:'A picnic in Fort Tryon Park with the Heather Garden',  category:'free',     season:'spring', notes:'The largest public garden in the NYC parks system above 59th Street. In spring, the perennial borders and the Hudson River views combine to make one of the most beautiful afternoons in the city.', tip:'Fort Tryon Park, Washington Heights. Free. A to 190th St. The Heather Garden is the main formal section. The New Leaf Restaurant and Bar serves food inside the park year-round. Peak bloom: May–June.' },
    { id:386, title:'The Eldridge Street Synagogue on the LES',             category:'arts',     season:'any',    notes:'A restored 1887 synagogue on the Lower East Side, now a museum, with one of the most extraordinary stained glass windows in any New York building. A genuine architectural and historical landmark.', tip:'12 Eldridge St, Chinatown/LES. ~$15. eldridgestreet.org. F to East Broadway. Guided tours on the hour. The Kiki Smith rose window in the restored sanctuary is the singular thing. Allow 1.5 hrs.' },
    { id:387, title:'A film at the Angelika with a post-film walk to NoLita', category:'cinema', season:'any',  notes:'The Angelika\'s basement theaters — and the Mercer Street subway noise that occasionally punctuates screenings — are a New York film institution. Walk to NoLita after for dinner.', tip:'18 W Houston St, SoHo. Tickets ~$19. The Angelika Café is a good place to talk through the film before heading out. The 6 blocks to NoLita (Prince and Mott) have excellent options for dinner.' },
    { id:388, title:'Chocolate and bread tasting at Raaka Chocolate, Red Hook', category:'bakery', season:'any', notes:'A bean-to-bar chocolate maker in Red Hook that makes unroasted dark chocolate with unusual flavor profiles. Tour the factory on weekends and sample everything.', tip:'64 Seabring St, Red Hook, Brooklyn. ~$5–10 for a tasting flight. raakaChocolate.com. F/G to Smith-9th St, then walk or take the B61 bus. The tour runs weekend afternoons. Factory outlet prices are better than retail.' },
    { id:389, title:'An evening at Rough Trade Records, Williamsburg',      category:'shows',    season:'any',    notes:'One of the great independent record stores in the world, with a venue space in back that hosts intimate performances. Even without a show, browsing the stacks is its own form of Saturday.', tip:'64 N 9th St, Williamsburg. The record shop is free to browse. Shows in the venue ~$15–30 at ticketweb.com. L to Bedford Ave. They also host in-store performances and listening events, often free.' },
    { id:390, title:'A Sunday gospel service in Harlem',                    category:'shows',    season:'any',    notes:'Several Harlem churches welcome visitors to their Sunday gospel services. The music is extraordinary and the experience is entirely different from a performance. Go with genuine respect.', tip:'Abyssinian Baptist Church (132 Odell Clark Pl W) and Greater Refuge Temple both welcome respectful visitors. Free, no photography. Services typically 11am. Dress appropriately. Stay for the whole service.' },
    { id:391, title:'Smorgasburg on a Saturday morning',                    category:'food',     season:'summer', notes:'The open-air food market in Williamsburg or Prospect Park with 100+ vendors, all local. Eat aggressively across multiple cuisines. Start early before the lines build.', tip:'Williamsburg: East River State Park, 90 Kent Ave, Saturdays 11am–6pm. Prospect Park: April–October, Sundays. smorgasburg.com. Free entry. Bring cash. Arrive before noon. The ube soft serve is consistent.' },
    { id:392, title:'A walk through Little Italy and the Mulberry Street strip', category:'explore', season:'any', notes:'The actual remaining block of Little Italy is small, but the architecture and a few old-school restaurants are still there. Add a walk through NoLita and the SoHo cast-iron district.', tip:'6 to Spring St. The real Little Italy is just a few blocks on Mulberry between Broome and Canal. Di Palo\'s (200 Grand St) is the genuine Italian grocery to buy from. The rest is mostly tourist-facing.' },
    { id:393, title:'A ceramics open studio at 3rd Ward or Brooklyn Pottery', category:'classes', season:'any', notes:'An open studio session where you work independently on a project you\'ve started in a class or bring your own design. Glazing day is the most satisfying.', tip:'Brooklyn Pottery Hub (various locations) and Choplet offer open studio memberships and single-session access. ~$20–40/session. Book in advance. The community of regulars at ceramics studios is always good.' },
    { id:394, title:'Late-night ramen at Ichiran, alone-together',           category:'food',     season:'winter', notes:'Ichiran\'s individual booth dining — each person in their own stall, ordering by slip, the bamboo screen raised to deliver your bowl. Intensely focused, deeply meditative. Perfect after midnight.', tip:'374 Johnson Ave, Bushwick (or 132 W 31st, Midtown). ~$20–25/bowl. Open late. L to Morgan Ave. The customization slip is serious — fill it out carefully. Single-booth dining is the whole experience, don\'t sit side-by-side.' },
    { id:395, title:'The Basilica of St. Patrick\'s Old Cathedral, NoLita',  category:'free',     season:'any',    notes:'The original (1815) St. Patrick\'s Cathedral in NoLita, now overshadowed by the midtown version, is a quieter and more atmospheric space. The walled churchyard is one of the secret gardens of the city.', tip:'263 Mulberry St, NoLita. Free. 6 to Spring St. Open daily. The interior has been used in Godfather scenes. The cemetery wall runs the full block and is worth the walk-around alone.' },
    { id:396, title:'A sake tasting at Sakagura, under the east 40s',       category:'food',     season:'any',    notes:'A Japanese sake bar hidden in the basement of a Midtown office building. One of the most surprising rooms in the city — suddenly you are not in Midtown anymore.', tip:'211 E 43rd St, basement, Midtown. ~$15–25/glass for premium sakes. sakagura.com. 4/5/6/7 to Grand Central. The omakase sake pairing option is the best way to navigate the list. Reservations recommended.' },
    { id:397, title:'The Brooklyn Botanic Garden at cherry blossom time',    category:'free',     season:'spring', notes:'The Cherry Esplanade in late April is one of the most photographed places in New York for a reason. Worth the crowds once. The Japanese Hill-and-Pond Garden is worth every other visit.', tip:'990 Washington Ave, Crown Heights. ~$18. 2/3 to Eastern Pkwy-Brooklyn Museum. Late April for peak bloom — the BBG website has a blossom tracker. Go on a weekday morning. Membership ($75/yr) pays for itself in three visits.' },
    { id:398, title:'A summer evening at Canoe Hill or Harriman State Park', category:'daytrip',  season:'summer', notes:'Harriman State Park is 47,000 acres of trails an hour from the city, with swimming holes at Lake Tiorati and ridge-top views that look nothing like New York. Worth a full day.', tip:'Zipcar or rental, ~1 hr. The Pine Meadow Lake trail is the standard route (8 miles, moderate). The Long Path goes north through the whole park. Arrive early; parking fills on summer weekends by 9am.' },
    { id:399, title:'A night at the Jane Hotel rooftop or The Top of the Standard', category:'explore', season:'summer', notes:'Two of the best rooftop bar situations in the city — the Jane on the West Village waterfront and the Top of the Standard in the Meatpacking. Different vibes, both extraordinary at night.', tip:'The Jane: 113 Jane St (rooftop opens late spring). The Top of the Standard: 848 Washington St. Both require reservations or early arrival. ~$18–22/cocktail. The views justify the prices, once.' },
    { id:400, title:'One final adventure: somewhere neither of us has been', category:'explore',  season:'any',    notes:'Look at the map of New York. Find a neighborhood, a park, a street, or a spot that neither of us has ever visited. Go there without a plan. Report back.', tip:'New York has 302 neighborhoods, 578 miles of waterfront, and 30,000 acres of parkland. Whatever you haven\'t seen yet: that is the activity. No tips needed. Just go.' },
  ];

  // ── STATE ────────────────────────────────────────
  let items = [], currentCat = null, catFilter = 'all', editingId = null, pickedCat = 'food';
  const KEY = 'nyc-adv-v6';

  function load() {
    const raw = localStorage.getItem(KEY);
    if (!raw) {
      items = SEED.map(s => ({ ...s, status:'todo', dateCompleted:null, rating:null }));
    } else {
      const stored = JSON.parse(raw);
      const storedIds = new Set(stored.map(x => x.id));
      const newItems = SEED.filter(s => !storedIds.has(s.id))
        .map(s => ({ ...s, status:'todo', dateCompleted:null, rating:null }));
      items = [...stored, ...newItems];
    }
    save();
  }

  function save() { localStorage.setItem(KEY, JSON.stringify(items)); }

  // ── WHEEL ────────────────────────────────────────
  function renderWheel() {
    const done = items.filter(a => a.status==='done').length;
    const todo = items.filter(a => a.status==='todo').length;

    document.getElementById('centerNum').textContent = done;
    document.getElementById('statsRow').innerHTML =
      `<span><b>${items.length}</b> adventures</span><span><b>${done}</b> done</span><span><b>${todo}</b> to go</span>`;

    const lp   = document.querySelector('.left-panel');
    const size = Math.min(lp.offsetWidth - 80, lp.offsetHeight * 0.58, 480);
    const wrap = document.getElementById('wheelWrap');
    wrap.style.width = wrap.style.height = size + 'px';
    wrap.querySelectorAll('.wheel-node').forEach(n => n.remove());

    const cx = size/2, cy = size/2, r = size*0.375;
    const cs = size*0.22, ns = size*0.165;

    const c = document.getElementById('wheelCenter');
    c.style.width = c.style.height = cs + 'px';
    document.getElementById('centerNum').style.fontSize   = (cs*0.40) + 'px';
    document.getElementById('centerLabel').style.fontSize = (cs*0.13) + 'px';

    const svg = document.getElementById('wheelSvg');
    svg.innerHTML = '';

    Object.keys(CATS).forEach((key, i) => {
      const cat   = CATS[key];
      const angle = (i*36 - 90) * Math.PI/180;
      const nx    = cx + r*Math.cos(angle);
      const ny    = cy + r*Math.sin(angle);

      const line = document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1', cx + (cs/2+2)*Math.cos(angle));
      line.setAttribute('y1', cy + (cs/2+2)*Math.sin(angle));
      line.setAttribute('x2', nx - (ns/2+2)*Math.cos(angle));
      line.setAttribute('y2', ny - (ns/2+2)*Math.sin(angle));
      line.setAttribute('stroke','rgba(242,234,224,0.18)');
      line.setAttribute('stroke-width','1');
      svg.appendChild(line);

      const isActive = currentCat === key;
      const node = document.createElement('div');
      node.className = 'wheel-node' + (isActive ? ' active' : '');
      node.style.cssText = `left:${nx}px;top:${ny}px;width:${ns}px;height:${ns}px;` +
        (isActive ? `background:${cat.color};` : '');
      node.innerHTML = `<div class="node-name" style="font-size:${ns*0.185}px">${cat.label}</div>`;
      node.onclick = () => showCat(key);
      wrap.appendChild(node);
    });
  }

  // ── CAT VIEW ─────────────────────────────────────
  function showCat(key) {
    currentCat = key; catFilter = 'all';
    document.querySelectorAll('.cf-pill').forEach(p =>
      p.classList.toggle('active', p.dataset.cf==='all'));
    document.getElementById('catFilters').style.display = '';
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('catView').classList.add('visible');
    document.getElementById('wheelCenter').classList.remove('active-done');
    renderCatView(); renderWheel();
  }

  function showAllDone() {
    const done = items.filter(a => a.status === 'done');
    currentCat = null; catFilter = 'done';
    document.getElementById('catFilters').style.display = 'none';
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('catView').classList.add('visible');
    document.getElementById('wheelCenter').classList.add('active-done');
    document.documentElement.style.setProperty('--node-color', 'var(--accent)');
    renderWheel();

    document.getElementById('catTitle').textContent = 'Done';
    document.getElementById('catSubtitle').textContent =
      `${done.length} adventure${done.length !== 1 ? 's' : ''} completed`;

    if (!done.length) {
      document.getElementById('activityList').innerHTML =
        '<div class="empty-row">Nothing done yet. Go do something!</div>';
      return;
    }

    // Group by category, in CATS order
    const byCat = {};
    done.forEach(a => { (byCat[a.category] = byCat[a.category] || []).push(a); });
    // Sort within each group: most recently done first
    Object.values(byCat).forEach(arr =>
      arr.sort((a,b) => (b.dateCompleted||'').localeCompare(a.dateCompleted||'')));

    let html = '';
    Object.keys(CATS).forEach(key => {
      if (!byCat[key]?.length) return;
      const cat = CATS[key];
      html += `<div class="cat-group-header" style="color:${cat.color}">${cat.label}</div>`;
      byCat[key].forEach((a, i) => { html += rowHTML(a, i * 20); });
    });
    document.getElementById('activityList').innerHTML = html;
  }

  function renderCatView() {
    const cat      = CATS[currentCat];
    const catItems = items.filter(a => a.category===currentCat);
    const todo     = catItems.filter(a => a.status==='todo').length;
    const done     = catItems.filter(a => a.status==='done').length;

    document.getElementById('catTitle').textContent    = cat.label;
    document.getElementById('catSubtitle').textContent = `${todo} to do · ${done} done`;
    document.documentElement.style.setProperty('--node-color', cat.color);

    let visible = catItems.filter(a =>
      catFilter==='all' ||
      a.status===catFilter ||
      (catFilter==='todo' && a.status==='done' && a.repeat));
    const rank = x => x.status==='todo' ? 0 : (x.repeat ? 1 : 2);
    visible.sort((a,b) => rank(a) - rank(b));

    document.getElementById('activityList').innerHTML = visible.length
      ? visible.map((a,i) => rowHTML(a, i*25)).join('')
      : `<div class="empty-row">Nothing here yet. Add one above.</div>`;
  }

  function rowHTML(a, delay) {
    const cat         = CATS[a.category] || CATS.food;
    const isDone      = a.status==='done';
    const isRepeat    = isDone && a.repeat;
    const showAsTodo  = isRepeat && catFilter==='todo';

    const seasonBadge = (a.season && a.season!=='any')
      ? `<span class="season-tag" style="background:${SEASON_COLORS[a.season]}">${a.season}</span>` : '';
    const repeatBadge = showAsTodo
      ? `<span class="repeat-badge">done before</span>` : '';
    const stars = isDone ? `<div class="stars-row">${[1,2,3,4,5].map(n =>
      `<span class="star ${(a.rating||0)>=n?'lit':''}" onclick="rate(${a.id},${n})">&#9733;</span>`).join('')}</div>` : '';
    const date = a.dateCompleted ? `<span class="activity-date">${a.dateCompleted}</span>` : '';
    const repeatBtn = isDone
      ? `<button class="row-btn${a.repeat?' repeat-on':''}" style="font-size:0.65rem;width:auto;padding:0 6px;" onclick="toggleRepeat(${a.id})">${a.repeat ? 'added' : '+ again'}</button>`
      : '';

    return `<div class="activity-row ${isDone && !showAsTodo ? 'done' : ''}" style="--node-color:${cat.color};animation-delay:${delay}ms">
      <div class="status-dot" onclick="toggleDone(${a.id})"></div>
      <div class="activity-body">
        <div class="activity-top">
          <div class="activity-title" onclick="toggleDone(${a.id})">${esc(a.title)}</div>${seasonBadge}${repeatBadge}
        </div>
        ${(a.notes || a.tip) ? `<div class="activity-notes">${esc([a.notes, a.tip].filter(Boolean).join(' '))}</div>` : ''}
        ${a.link  ? `<a href="${esc(a.link)}" target="_blank" rel="noopener" class="activity-link">&#8599; ${linkHost(a.link)}</a>` : ''}
        ${isDone  ? `<div class="activity-meta">${stars}${date}</div>` : ''}
      </div>
      <div class="activity-actions">
        <button class="row-btn" onclick="openEdit(${a.id})">&#9998;</button>
        ${repeatBtn}
        <button class="row-btn del" onclick="del(${a.id})">&#10005;</button>
      </div>
    </div>`;
  }

  function linkHost(url) { try { return new URL(url).hostname.replace('www.',''); } catch { return 'link'; } }
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  // ── ACTIONS ──────────────────────────────────────
  function toggleDone(id) {
    const a = items.find(x => x.id===id); if (!a) return;
    if (a.status==='todo') {
      a.status='done';
      a.dateCompleted=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
      confetti();
    } else { a.status='todo'; a.dateCompleted=null; a.rating=null; }
    save(); renderWheel(); if (currentCat) renderCatView();
  }

  function toggleRepeat(id) {
    const a = items.find(x => x.id===id); if (!a) return;
    a.repeat = !a.repeat; save(); renderCatView();
  }

  function rate(id, n) {
    const a = items.find(x => x.id===id); if (!a) return;
    a.rating=n; save(); renderCatView();
  }

  function del(id) {
    if (!confirm('Remove this adventure?')) return;
    items=items.filter(x=>x.id!==id); save(); renderWheel(); if (currentCat) renderCatView();
  }

  // ── MODAL ────────────────────────────────────────
  function buildCatPicker() {
    document.getElementById('catPicker').innerHTML = Object.entries(CATS).map(([key,cat]) => {
      const sel = pickedCat===key;
      return `<div class="cat-opt${sel?' sel':''}" style="${sel?`background:${cat.color};`:''}" onclick="pickCat('${key}')">${cat.label}</div>`;
    }).join('');
  }

  function pickCat(key) { pickedCat=key; buildCatPicker(); }

  function openAdd(cat) {
    editingId=null; pickedCat=cat||currentCat||'food';
    document.getElementById('formTitle').textContent='New Adventure';
    ['fTitle','fNotes','fLink'].forEach(id => document.getElementById(id).value='');
    document.getElementById('fSeason').value='any';
    buildCatPicker();
    document.getElementById('formOverlay').classList.remove('hidden');
    setTimeout(()=>document.getElementById('fTitle').focus(),120);
  }

  function openEdit(id) {
    const a=items.find(x=>x.id===id); if (!a) return;
    editingId=id; pickedCat=a.category;
    document.getElementById('formTitle').textContent='Edit Adventure';
    document.getElementById('fTitle').value=a.title;
    document.getElementById('fNotes').value=a.notes||'';
    document.getElementById('fLink').value=a.link||'';
    document.getElementById('fSeason').value=a.season||'any';
    buildCatPicker();
    document.getElementById('formOverlay').classList.remove('hidden');
  }

  function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

  function saveItem() {
    const title=document.getElementById('fTitle').value.trim();
    if (!title) { document.getElementById('fTitle').focus(); return; }
    const p={title, category:pickedCat,
      notes:document.getElementById('fNotes').value.trim(),
      link:document.getElementById('fLink').value.trim(),
      season:document.getElementById('fSeason').value};
    if (editingId) Object.assign(items.find(x=>x.id===editingId),p);
    else items.push({id:Date.now(),...p,status:'todo',dateCompleted:null,rating:null});
    save(); closeModal('formOverlay'); renderWheel();
    if (currentCat===pickedCat) renderCatView(); else showCat(pickedCat);
  }

  // ── SURPRISE ─────────────────────────────────────
  function surpriseMe() {
    const pool=items.filter(a=>a.status==='todo'||a.repeat);
    if (!pool.length) { alert("You've done everything! Add more adventures."); return; }
    const pick=pool[Math.floor(Math.random()*pool.length)];
    const cat=CATS[pick.category]||CATS.food;
    document.getElementById('sCat').textContent=cat.label;
    document.getElementById('sCat').style.background=cat.color;
    document.getElementById('sNotes').textContent=pick.notes||'';
    const sTip=document.getElementById('sTip');
    if(sTip){ sTip.textContent=pick.tip||''; sTip.style.display=pick.tip?'block':'none'; }
    // animate title reveal on each pick
    const titleEl = document.getElementById('sTitle');
    titleEl.classList.remove('reveal');
    void titleEl.offsetWidth; // force reflow
    titleEl.textContent = pick.title;
    titleEl.classList.add('reveal');
    document.getElementById('surpriseOverlay').classList.remove('hidden');
  }

  // ── CONFETTI ─────────────────────────────────────
  function confetti() {
    const layer=document.getElementById('confetti-layer');
    const colors=Object.values(CATS).map(c=>c.color);
    for (let i=0;i<70;i++) {
      const el=document.createElement('div'); el.className='cf';
      const s=Math.random()*8+4;
      el.style.cssText=`left:${Math.random()*100}vw;top:-10px;width:${s}px;height:${s}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${Math.random()*2+1.4}s;animation-delay:${Math.random()*0.5}s;`;
      layer.appendChild(el);
      el.addEventListener('animationend',()=>el.remove());
    }
  }

  // ── EVENTS ───────────────────────────────────────
  document.getElementById('catFilters').addEventListener('click', e => {
    const btn=e.target.closest('.cf-pill'); if (!btn) return;
    catFilter=btn.dataset.cf;
    document.querySelectorAll('.cf-pill').forEach(p=>p.classList.toggle('active',p===btn));
    renderCatView();
  });

  document.querySelectorAll('.overlay').forEach(o=>
    o.addEventListener('click',e=>{ if(e.target===o) o.classList.add('hidden'); }));

  document.addEventListener('keydown',e=>{
    if(e.key==='Escape') document.querySelectorAll('.overlay').forEach(o=>o.classList.add('hidden'));
  });

  let rt;
  window.addEventListener('resize',()=>{ clearTimeout(rt); rt=setTimeout(renderWheel,150); });

  load();
  requestAnimationFrame(renderWheel);
  </script>
</body>
</html>
