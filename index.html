    { id:142, title:'Union Square Greenmarket on a Saturday',       category:'free',     season:'fall',   notes:'The best farmers market in the city. Go when something is in season and let it decide what you cook for dinner.', tip:'Union Square, 14th St and Broadway. Open year-round on Wed, Fri, and Sat mornings. Peak season is June through October. The cider donuts in fall are not optional.' },
    { id:143, title:'Wander Grand Central Terminal',                category:'free',     season:'any',    notes:'Walk every level. The whispering gallery. The famous ceiling. The Oyster Bar downstairs. Just wander it like a destination, not a commute.', tip:'Free. The whispering gallery is the curved arch outside the Oyster Bar, lower concourse. Stand facing the corner and talk quietly. The Campbell Bar for one drink after.' },
    { id:144, title:'Citi Bike the Central Park loop',              category:'free',     season:'spring', notes:'Rent a Citi Bike and ride the 6-mile car-free loop. One of the most enjoyable things you can do in the city for $15.', tip:'Citi Bike day pass ~$15. Bikes available at park entrances near 59th, 72nd, and 86th St. The loop road is car-free on weekends. Takes about 45 min to ride the full perimeter.' },
    { id:145, title:'Evening concert at the Cathedral of St. John the Divine', category:'free', season:'any', notes:'The cathedral hosts regular free and low-cost concerts. The acoustics are extraordinary, the space is vast and unlike anywhere else.', tip:'1047 Amsterdam Ave, Morningside Heights. 1 to Cathedral Pkwy/110th St. Check stjohndivine.org for the music calendar. The building itself is worth the visit.' },
    { id:146, title:'The 9/11 Memorial pools',                     category:'free',     season:'any',    notes:'The two reflecting pools are genuinely moving and worth visiting slowly, not as a check-the-box thing. Give it more time than you think.', tip:'180 Greenwich St, Lower Manhattan. Free. Open daily. Timed entry tickets are recommended (free, at 911memorial.org). The museum requires a separate ticket. The pools alone are enough.' },
    { id:147, title:'Socrates Sculpture Park in Long Island City',  category:'free',     season:'summer', notes:'A free outdoor sculpture park on the East River in LIC with Manhattan views and rotating large-scale installations.', tip:'32-01 Vernon Blvd, Long Island City. Free, open year-round. N/W to Broadway (Queens). The summer outdoor film series and music events are also free. A quick trip from Midtown.' },
    { id:148, title:'Little Island park at sunset',                 category:'free',     season:'summer', notes:'A floating park built on reclaimed pilings on the Hudson River. Strange, lovely, and worth it at golden hour.', tip:'Pier 55, Hudson River Park at W 13th St. Free. Timed entry passes recommended in summer at littleisland.org. The amphitheater hosts free events. Good coffee truck on site.' },
    { id:149, title:'A Sunday at the Queens Night Market',          category:'free',     season:'summer', notes:'The most diverse food market in New York. Dozens of vendors, every cuisine, $5 dishes. Free to enter, very much worth going for dinner.', tip:'New York Hall of Science, 47-01 111th St, Corona, Queens. 7 train to 111th St. Runs Saturday evenings May through October. ~$5–10 per dish. Get there before 8pm.' },
    // ── more classes ─────────────────────────────────────────────────
    { id:150, title:'Intro rock climbing session',                  category:'classes',  season:'any',    notes:'A two-hour intro session that covers the basics. A surprisingly fun and physical way to spend an afternoon together.', tip:'Brooklyn Boulders (multiple locations) and The Cliffs offer intro classes ~$40–60 including gear. Book online. No experience or strength required. Day passes let you keep climbing after.' },
    { id:151, title:'Stand-up comedy open mic night',               category:'classes',  season:'any',    notes:'Sign up and each do two minutes. This is terrifying and will be the funniest night you\'ve had in a long time.', tip:'Creek and The Cave (10-93 Jackson Ave, Long Island City) hosts open mics most nights. Sign-ups start 30 min before. Free to perform, one-drink minimum for the audience.' },
    { id:152, title:'A fermentation workshop',                      category:'classes',  season:'any',    notes:'Make kimchi, pickles, or hot sauce in a two-hour class. You leave with jars of something you actually made.', tip:'The Brooklyn Kitchen (100 Frost St, Williamsburg) runs food skills workshops. Airbnb Experiences has many options too. ~$50–80. Nothing perishable to worry about taking home.' },
    { id:153, title:'Intro screenprinting workshop',                category:'classes',  season:'any',    notes:'Design and print something on a tote or a shirt in a 3-hour session. A tangible thing to take home.', tip:'Pratt Institute runs community workshops. Printmaking studios in Gowanus and Bushwick also offer drop-in sessions. Check Eventbrite. ~$60–90. Results are always a little imperfect.' },
    { id:154, title:'Guided foraging walk in Central Park',         category:'classes',  season:'spring', notes:'A naturalist walks you through the park identifying edible plants, mushrooms, and herbs. Weirder and more interesting than it sounds.', tip:'Several guides offer seasonal walks. Check Airbnb Experiences or wildedible.com. ~$40–60. Spring and fall are best. You will look at the park differently for years after.' },
    { id:155, title:'Film photography class and darkroom session',  category:'classes',  season:'any',    notes:'Shoot a roll of film together and develop it yourselves in the darkroom. The waiting and the reveal is the whole point.', tip:'Bushwick Film Club and 4th Street Photo Gallery both offer darkroom sessions. ~$50–80. Check Eventbrite for workshops. Bring an analog camera or borrow one from the studio.' },
    { id:156, title:'Watercolor class for beginners',               category:'classes',  season:'any',    notes:'A two-hour beginner session where you actually make something. More forgiving than drawing, more satisfying than expected.', tip:'Art Students League (215 W 57th St) offers drop-in watercolor sessions. Airbnb Experiences has many one-off workshops. ~$30–60. Supplies usually provided.' },
    { id:157, title:'Bread baking at the Institute of Culinary Education', category:'classes', season:'any', notes:'Learn to make a proper loaf from scratch and take it home. A satisfying and practical afternoon.', tip:'ICE has a campus at 225 Liberty St, Financial District. Recreational bread baking classes ~$85–130. Book at ice.edu. Classes fill up, reserve 2–3 weeks ahead.' },
    { id:158, title:'A sushi rolling class',                        category:'classes',  season:'any',    notes:'Learn the basics of making rolls and nigiri, then eat everything you made. A fun dinner-that-you-cook format.', tip:'Multiple options on Airbnb Experiences and Eventbrite. The Sushi Room in Midtown runs regular classes. ~$80–120/person. Most classes include sake or beer.' },
    { id:159, title:'Natural wine tasting and education class',     category:'classes',  season:'any',    notes:'A structured tasting with a guide who explains what you\'re drinking and why. You will leave with actual opinions about wine.', tip:'Parcelle and Appellation Wine both run tasting events. Chambers Street Wines occasionally does education nights. ~$40–80. Check their websites for upcoming sessions.' },
    { id:160, title:'Calligraphy or hand lettering workshop',       category:'classes',  season:'any',    notes:'A two-hour intro class with a proper nib pen and ink. Surprisingly meditative and you leave with a real skill to practice.', tip:'Check Eventbrite for sessions at studios in Williamsburg and the LES. Kestrel Workshop in Red Hook sometimes hosts these. ~$50–75. All materials provided.' },
    // ── cinema 161-162 ───────────────────────────────────────────────
    { id:161, title:'Angelika Film Center in SoHo',                 category:'cinema',   season:'any',    notes:'The indie cinema where you can hear the subway rumbling under the screen during quiet scenes. A New York experience that cannot be replicated anywhere else.', tip:'18 W Houston St, SoHo. Tickets ~$18. Coffee bar downstairs worth lingering in. 1/C/E to Spring St. Multiple screens, foreign and documentary programming.' },
    { id:162, title:'A double feature at Quad Cinema',              category:'cinema',   season:'any',    notes:'The last four-screen repertory cinema in New York. The programming is adventurous, the audience is genuinely there for the films.', tip:'34 W 13th St, Greenwich Village. Tickets ~$14–17. Check quadcinema.com. A/C/E/L to 14th St. Double features are common. Membership pays for itself quickly.' },
    // ── food 163-166 ─────────────────────────────────────────────────
    { id:163, title:'Ethiopian dinner at Bunna Cafe',               category:'food',     season:'any',    notes:'A fully plant-based Ethiopian restaurant in Bushwick with incredible injera, rich stews, and some of the warmest hospitality in the city.', tip:'1084 Flushing Ave, Bushwick. J to Kosciuszko St. ~$25–40/person. Reservations on Resy. Order the combination platter. The honey wine is excellent.' },
    { id:164, title:'Arepas at Caracas Arepa Bar',                  category:'food',     season:'any',    notes:'A Venezuelan arepa spot in the East Village that has been quietly excellent for years. Order two, sit in the narrow room, feel lucky to be there.', tip:'93 E 7th St, East Village. ~$10–15/person. Small, often a short wait. The De Pabellón with black beans, shredded beef, and plantains is the one to get.' },
    { id:165, title:'Bar dinner at Estela',                         category:'food',     season:'any',    notes:'One of the best small plates restaurants in New York. Sit at the bar, order whatever the server suggests, drink something natural. A perfect evening.', tip:'47 E Houston St, SoHo. Book on Resy 2–3 weeks out, or try bar walk-in after 6pm. ~$60–90/person. The burrata with anchovy toast is non-negotiable.' },
    { id:166, title:'Szechuan hot pot in Flushing on a cold night', category:'food',     season:'winter', notes:'A boiling pot of numbing, spicy broth with everything you cook in it. Loud, communal, and completely excellent. An experience rather than just dinner.', tip:'Little Pepper (18-24 College Point Blvd) and Spicy Village are both good in Flushing. ~$30–50/person. 7 to Flushing-Main St. Go on a cold weeknight.' },
    // ── bakeries 167-168 ─────────────────────────────────────────────
    { id:167, title:'Orwasher\'s Bakery on the Upper East Side',    category:'bakery',   season:'any',    notes:'A Jewish bakery in operation since 1916. The raisin pumpernickel and the challah are extraordinary. A living piece of what New York used to be and still is.', tip:'308 E 78th St, Upper East Side. Opens 7am. ~$6–12 for a loaf. 6 to 77th St. Call ahead on Fridays for holiday breads. Very small, very beloved.' },
    { id:168, title:'Lafayette Grand Cafe pastry case',             category:'bakery',   season:'any',    notes:'An all-day Parisian grand cafe with one of the best pastry cases in New York. The croissant and the religieuse are both exceptional.', tip:'380 Lafayette St, NoHo. Opens 8am. ~$5–12/item. B/D/F/M to Broadway-Lafayette. The cafe is large and loud in a good way. Busy on weekends, calmer on weekdays.' },
    // ── shows 169-172 ────────────────────────────────────────────────
    { id:169, title:'A night at Caveat on the Lower East Side',     category:'shows',    season:'any',    notes:'Comedy, storytelling, game shows, and genuinely original performance in a small basement venue. Something you will not find anywhere else.', tip:'21A Clinton St, LES. Tickets ~$15–25. Check caveat.nyc. F/J/M/Z to Delancey-Essex. Small room, buy tickets ahead. Anything on the calendar tends to be excellent.' },
    { id:170, title:'Live music at City Winery',                    category:'shows',    season:'any',    notes:'Intimate live music in a converted warehouse with wine made on-site. A good level of artist, a great level of access. A real night out.', tip:'25 11th Ave, Hudson Yards. Tickets ~$20–60 depending on the show. Reserve a table for dinner plus the show. Check citywinery.com/new-york for the calendar.' },
    { id:171, title:'World music at Barbes in Park Slope',          category:'shows',    season:'any',    notes:'A tiny, beloved bar that hosts live world music, jazz, and folk every single night. One of the most genuinely New York music venues left in the city.', tip:'376 9th St at 6th Ave, Park Slope. F/G to 7th Ave. Cover ~$10–15, often pay-what-you-wish. No reservations. The back room is the stage. Arrive early.' },
    { id:172, title:'A show at The Bell House in Gowanus',          category:'shows',    season:'any',    notes:'A large, airy converted warehouse venue for comedy, indie rock, and themed events. Always something interesting, always a great room.', tip:'149 7th St, Gowanus. F/G to Smith-9th Sts. Tickets ~$15–30. Check thebellhouseny.com. The front bar is worth a drink before the show.' },
    // ── arts 173-176 ─────────────────────────────────────────────────
    { id:173, title:'International Center of Photography',          category:'arts',     season:'any',    notes:'The best photography museum in New York. Thoughtful exhibitions spanning documentary, fine art, and everything in between.', tip:'79 Essex St inside Essex Market, LES. ~$14. Closed Tuesdays. Check icp.org. The bookshop has one of the best photography book selections in the city.' },
    { id:174, title:'Fotografiska New York',                        category:'arts',     season:'any',    notes:'A Stockholm-based photography museum with major rotating exhibitions and a rooftop restaurant worth visiting on its own.', tip:'281 Park Ave S at 22nd St, Gramercy. ~$23. Open until 11pm on weekends. 6 to 23rd St. The rooftop bar is excellent for a drink after the exhibition.' },
    { id:175, title:'The Morgan Library & Museum',                  category:'arts',     season:'any',    notes:'J.P. Morgan\'s original private library, now a museum with manuscript treasures and one of the most beautiful rooms in New York. The East Room alone is worth it.', tip:'225 Madison Ave at 36th St. ~$22. 6 to 33rd St. Free on Friday evenings. Check themorgan.org. Allow at least 90 minutes. The original library is extraordinary.' },
    { id:176, title:'The Bronx Museum of the Arts',                 category:'arts',     season:'any',    notes:'Free admission, always. Art that reflects the Bronx and its communities with honesty. One of the most undervisited museums in New York.', tip:'1040 Grand Concourse at 165th St. Free. B/D to 167th St. Closed Mon/Tue. Walk the Grand Concourse after to see the Art Deco apartment buildings.' },
    // ── explore 177-181 ──────────────────────────────────────────────
    { id:177, title:'A walk along the Grand Concourse in the Bronx', category:'explore', season:'any',    notes:'The Champs-Elysees of the Bronx. Miles of Art Deco apartment buildings, wide boulevards, and real neighborhood life. Completely underrated.', tip:'B/D to 161st St-Yankee Stadium. Walk north. The Bronx Museum is at 165th St. The Loews Paradise Theater facade at 2403 Grand Concourse is a landmark. Free.' },
    { id:178, title:'Woodlawn Cemetery in the Bronx',               category:'explore',  season:'fall',   notes:'One of the great garden cemeteries in America. Duke Ellington, Miles Davis, and Herman Melville are buried here. The mausoleums are extraordinary.', tip:'4 to Woodlawn (last stop) or Metro-North Harlem Line to Woodlawn. Free. Maps at the gate. Best in fall for foliage. Plan 2 hours minimum.' },
    { id:179, title:'The Bronx Zoo for a full day',                 category:'explore',  season:'spring', notes:'The largest metropolitan zoo in the country. The Congo Gorilla Forest and Tiger Mountain are both extraordinary. Give it a full unhurried day.', tip:'~$34 online, or pay-what-you-wish on Wednesdays. B/D to Fordham Rd then BX12 bus, or 2/5 to Pelham Pkwy. Arrive at opening to beat crowds.' },
    { id:180, title:'Ridgewood, Queens on a weekend',               category:'explore',  season:'any',    notes:'A neighborhood on the Queens-Brooklyn border that feels like the city did fifteen years ago. Great bars, interesting restaurants, not yet overrun.', tip:'L to Halsey St or M to Fresh Pond Rd. Walk Seneca Ave and Myrtle Ave. Nowadays bar (54-07 Myrtle Ave) and Rolo\'s (56-12 Forest Ave) are both excellent.' },
    { id:181, title:'Astoria Park and the Hell Gate Bridge',        category:'explore',  season:'summer', notes:'The largest park in Queens, with the enormous Hell Gate railroad bridge dominating the view. Watch the river and feel the full scale of the city.', tip:'N/W to Astoria-Ditmars Blvd, then walk west to the park. Free. The park pool is free in summer. The bridge view from the main lawn is one of the best in any outer borough.' },
    // ── wellness 182-185 ─────────────────────────────────────────────
    { id:182, title:'Salt room halotherapy session',                category:'wellness', season:'winter', notes:'Sit in a room lined with Himalayan salt in a warm, cave-like environment. Deeply relaxing in a way that\'s hard to explain until you\'ve tried it.', tip:'The Salt Suite and Montauk Salt Cave both have NYC locations. ~$40–60 for 45 min. Book online. Multiple sessions are recommended but once is enough to understand it.' },
    { id:183, title:'A proper couples massage at a hotel spa',      category:'wellness', season:'any',    notes:'Book a real, proper couples massage. Not a bargain option. An afternoon that feels like leaving the city entirely.', tip:'The Spa at Mandarin Oriental (80 Columbus Circle) or The Well (7 W 23rd St). ~$150–250/person. Book weeks ahead. Make a whole slow afternoon of it.' },
    { id:184, title:'A drop-in meditation session',                 category:'wellness', season:'any',    notes:'A guided meditation in a real studio. Easier and more grounding than doing it alone at home with an app.', tip:'MNDFL (multiple locations) offers guided sessions ~$20–30. Interdependence Project also runs drop-ins. No experience needed. 45–60 min sessions.' },
    { id:185, title:'Sunrise walk through Central Park',            category:'wellness', season:'spring', notes:'The park before 7am is completely different. Almost no one there. Morning light through the trees in early spring is genuinely something.', tip:'Enter at any gate before sunrise. The Reservoir loop is 1.6 miles. The Ramble at dawn has extraordinary birding from April through June. Bring coffee.' },
    // ── day trips 186-189 ────────────────────────────────────────────
    { id:186, title:'Woodstock, NY for the day',                    category:'daytrip',  season:'fall',   notes:'The original artist colony in the Catskills. Good galleries, excellent record shops, great food. The town delivers on the mythology.', tip:'Trailways bus from Port Authority, ~2.5 hrs, ~$25 RT. Or Zipcar. Oriole 9 for brunch. Golden Notebook record shop on Tinker St is essential. Go in October.' },
    { id:187, title:'North Fork wine country, Long Island',         category:'daytrip',  season:'fall',   notes:'The right Long Island wine region. Less expensive, more interesting, more honest than the Hamptons. A whole afternoon of tastings.', tip:'LIRR to Greenport (~2.5 hrs, ~$25 RT). Rent bikes or arrange a shuttle between wineries. Shinn Estate and Bedell Cellars are both excellent. Go on a weekday.' },
    { id:188, title:'Saratoga Springs for the day',                 category:'daytrip',  season:'summer', notes:'A beautifully preserved Victorian spa town upstate. The racetrack in August, free mineral springs, Caffe Lena (the oldest folk venue in America), and great food.', tip:'Amtrak from Penn Station, ~3 hrs, ~$40–60 RT. Worth an overnight if possible. The Saratoga Race Course runs July through September. Congress Park mineral springs are free.' },
    { id:189, title:'Delaware Water Gap hike',                      category:'daytrip',  season:'fall',   notes:'A spectacular river gorge on the NJ-PA border. Waterfalls, ridge walks, swimming holes. One of the best hikes within two hours of the city.', tip:'Zipcar or rental, ~1.5 hrs. Dingmans Falls trail is easy and beautiful. Raymondskill Falls is the tallest waterfall in Pennsylvania. Spring and fall are best.' },
    // ── free 190-195 ─────────────────────────────────────────────────
    { id:190, title:'The Ford Foundation Building atrium',          category:'free',     season:'any',    notes:'A 12-story indoor tropical garden inside a Midtown office building. A lush, quiet, secret New York room almost nobody knows about.', tip:'320 E 43rd St, Midtown. Free, open weekdays during business hours. 42nd St-Grand Central on the 4/5/6/7. Just walk in through the lobby. The garden fills the entire interior court.' },
    { id:191, title:'The Museum at FIT',                            category:'free',     season:'any',    notes:'The fashion museum at the Fashion Institute of Technology. Free admission and often the most interesting design exhibitions in the city.', tip:'227 W 27th St, Chelsea. Free. 1 to 28th St. Closed Sun/Mon. Check fitnyc.edu/museum for the current show. Small but consistently excellent.' },
    { id:192, title:'Hunters Point South Park waterfront, LIC',    category:'free',     season:'summer', notes:'A long waterfront park in Long Island City with some of the best unobstructed Manhattan skyline views anywhere in New York. Almost no tourists.', tip:'7 to Hunters Point Ave or Vernon Blvd-Jackson Ave. Free, always open. Walk south along the waterfront. The views at golden hour are extraordinary.' },
    { id:193, title:'The Elevated Acre at 55 Water Street',         category:'free',     season:'any',    notes:'A secret elevated park above the street in the Financial District. Unexpected garden, wooden walkways, and harbor views from above. Almost nobody knows it exists.', tip:'55 Water St, Financial District. Free. Enter through the lobby or outdoor escalator on Old Slip. Open during business hours. A completely hidden piece of the city.' },
    { id:194, title:'Domino Park waterfront in Williamsburg',       category:'free',     season:'summer', notes:'A beautifully designed park on the old Domino Sugar factory site. Preserved industrial machinery, a waterfront promenade, and the best summer lawn in Brooklyn.', tip:'S 1st St and River St, Williamsburg. Free, always open. L to Bedford Ave, then walk west. The High Viaduct section gives elevated views of the East River.' },
    { id:195, title:'NYC Ferry ride for the ride itself',           category:'free',     season:'summer', notes:'Take the ferry to a neighborhood you\'d normally take the subway to. It completely changes how the city feels. Worth doing for the ride alone.', tip:'~$4 each way. Buy tickets on the NYC Ferry app. The East River route is the most scenic. South Brooklyn and Astoria routes show the city from angles you\'ve never seen.' },
    // ── classes 196-200 ──────────────────────────────────────────────
    { id:196, title:'Glass blowing at Urban Glass',                 category:'classes',  season:'any',    notes:'A two-hour beginner session where you shape something real from molten glass. Genuinely unlike any other class you have ever taken.', tip:'647 Fulton St, Fort Greene, Brooklyn. ~$100–150 for a beginner workshop. Book at urbanglass.org. Open studios also available. The results are imperfect and beautiful.' },
    { id:197, title:'Letterpress printing at Bowne & Co.',          category:'classes',  season:'any',    notes:'Learn to set type and print on a 19th-century letterpress machine. You leave with something you made by hand on a press that\'s been running for over 150 years.', tip:'211 Water St, South Street Seaport. ~$50–75. Book online. The shop itself is a museum of printing history. The neighborhood is worth exploring after.' },
    { id:198, title:'A hands-on cooking class in one cuisine',      category:'classes',  season:'any',    notes:'Pick a cuisine you both love and spend an afternoon learning to make it properly. Ethiopian, Japanese, Thai, or Italian, all available and all excellent.', tip:'The Brooklyn Kitchen (100 Frost St) and Haven\'s Kitchen (109 W 17th St) both run great hands-on classes. ~$80–130/person. Book 2–3 weeks ahead.' },
    { id:199, title:'Beginner weaving or macrame workshop',         category:'classes',  season:'any',    notes:'A 2-hour intro to hand weaving or macrame. More meditative than you expect. You leave with something that actually looks good.', tip:'Check Airbnb Experiences and Eventbrite for workshops in Williamsburg, Bushwick, and the LES. ~$55–85. Materials always provided. No experience needed.' },
    { id:200, title:'Natural perfume blending workshop',            category:'classes',  season:'any',    notes:'Blend your own fragrance from raw materials with a perfumer guiding the session. The whole olfactory experience is unlike anything else.', tip:'Several NYC perfumers offer workshops. Check Airbnb Experiences and Eventbrite. ~$60–100. Small groups, book ahead. You leave with a bottle of something entirely your own.' },

    // ── CINEMA 201–220 ──────────────────────────────
    { id:201, title:'A silent film with live piano at Anthology',    category:'cinema',   season:'winter', notes:'Anthology screens silent classics with live accompaniment several times a year. An entirely different way to watch a film — and the piano fills the room.', tip:'32 Second Ave, East Village. Check anthologyfilmarchives.org for upcoming silent film events. Tickets ~$12. Arrive a few minutes early to watch the pianist set up.' },
    { id:202, title:'Film Forum midnight movie',                     category:'cinema',   season:'any',    notes:'Their late-night cult film series is one of the city\'s great guilty pleasures. Packed room, great prints, the right crowd.', tip:'209 W Houston St, West Village. Tickets ~$16. Midnight screenings usually Friday and Saturday. The concession stand popcorn is genuinely above average.' },
    { id:203, title:'An Oscar-season Sunday at Lincoln Center',      category:'cinema',   season:'winter', notes:'The January before the Oscars, Film at Lincoln Center programs everything. Pick something foreign and critically acclaimed that we haven\'t seen.', tip:'165 W 65th St. Tickets ~$15. January is the best month for programming breadth. The Walter Reade lobby has great natural light for a pre-film coffee.' },
    { id:204, title:'BAFICI retrospective or World Cinema at BAM',   category:'cinema',   season:'fall',   notes:'BAM\'s international programming rivals anything in the city. Pick something from a country whose cinema we barely know.', tip:'30 Lafayette Ave, Fort Greene. Tickets ~$17. The BAMcinemaFest in June and the New Directors/New Films series in spring are both essential. Check bam.org for series calendars.' },
    { id:205, title:'A documentary double bill anywhere',            category:'cinema',   season:'any',    notes:'Two documentary films in one day — pick a theme. Music docs, nature films, political history, anything. Let the subject matter be the frame for the day.', tip:'IFC Center and Film at Lincoln Center both program strong documentary slates. Or pick two streaming docs and do it at home with proper snacks and zero interruptions.' },
    { id:206, title:'Opening night at a NYC film festival',          category:'cinema',   season:'fall',   notes:'The NewFest, New York Asian Film Festival, or DOC NYC opening night. The energy is different when a film is brand new and the audience came specifically for it.', tip:'NewFest runs every fall at IFC. Asian Film Festival runs at Lincoln Center in summer. DOC NYC runs in November. Check each site for opening night tickets — often sells out.' },
    { id:207, title:'A Kubrick or Hitchcock revival double feature',  category:'cinema',   season:'any',    notes:'Find a rep screening of two films by the same director on 35mm. Watch something we\'ve seen before but never in a theater. Completely different experience.', tip:'Film Forum, IFC, and Metrograph all run archival prints regularly. 35mm screenings are marked on the calendar. The quality of a clean archival print is shocking.' },
    { id:208, title:'NYC Short Film Festival screening',             category:'cinema',   season:'fall',   notes:'A program of short films, which is its own experience — nothing is padded, everything is concentrated. Five great shorts in a row is one of the better evenings in the city.', tip:'Omeleto and other short film festivals sometimes screen in the city. Also check Anthology and MoMA, which program short film nights throughout the year.' },
    { id:209, title:'A new release on opening weekend at Alamo Drafthouse', category:'cinema', season:'any', notes:'Alamo has the strictest no-talking, no-phone policy in the city and the best food service in a theater. A genuinely different moviegoing experience.', tip:'28 Liberty St, Financial District. Book online, choose your seats. Food ordered on paper slips. ~$22–26/ticket + food. No latecomers admitted. The whiskey program is excellent.' },
    { id:210, title:'Late night Hong Kong cinema at Metrograph',     category:'cinema',   season:'any',    notes:'Metrograph programs Hong Kong New Wave films more consistently than anyone in the city. Wong Kar-wai, John Woo, Tsui Hark — see any of them on the big screen.', tip:'7 Ludlow St, LES. Tickets ~$18. Check metrograph.com for upcoming HK cinema nights. The bar is the right place to decompress afterward.' },
    { id:211, title:'The Tribeca Film Festival on a weekday',        category:'cinema',   season:'spring', notes:'Less crowded on weekdays. A mix of documentaries, narrative films, and special events. Pick something that has no distribution deal yet and might never get one.', tip:'Runs every April–May at multiple downtown venues. Tickets ~$20–30. Check tribecafilm.com. The Bow Tie Cinemas screenings are often the most accessible.' },
    { id:212, title:'A double bill at the old-school Quad Cinema',   category:'cinema',   season:'any',    notes:'Four tiny screens, all showing something interesting. The Quad is genuinely idiosyncratic — they program things other theaters won\'t touch.', tip:'34 W 13th St, Greenwich Village. Tickets ~$17. Usually two films per screen each day, so you can often catch a double feature. The tiny lobby feels like the 1970s.' },
    { id:213, title:'A children\'s classic at a family matinee',     category:'cinema',   season:'any',    notes:'Pick a film we loved as kids and watch it on the big screen. Doesn\'t have to be sophisticated. The point is the ritual and the popcorn.', tip:'Check the BAM Rose Cinemas family matinees or the Museum of the Moving Image weekend screenings. Many theaters do one-off classic screenings on weekend mornings.' },
    { id:214, title:'Astoria beer and a film at Kaufman Studios',    category:'cinema',   season:'any',    notes:'Museum of the Moving Image in Astoria, then a beer at one of the neighborhood\'s excellent Greek bars. The museum\'s permanent film history collection alone is worth the trip.', tip:'36-01 35th Ave, Astoria. Museum tickets ~$15, films extra. N/W to 36th Ave. The Bohemian Hall beer garden is a ten-minute walk. Plan a full afternoon.' },
    { id:215, title:'A French New Wave film at Film Forum',          category:'cinema',   season:'any',    notes:'Godard, Truffaut, Varda, Rohmer — Film Forum programs them regularly. Pick something that feels like Paris and watch it in the West Village.', tip:'209 W Houston St. Tickets ~$16. The French New Wave retrospectives usually run in spring. Their calendar goes three weeks out, check filmforum.org regularly.' },
    { id:216, title:'Sundance or SXSW award-winner on release',      category:'cinema',   season:'spring', notes:'Chase a Sundance winner when it finally opens in New York. The discussion around it will still be fresh. Usually lands at IFC or Metrograph.', tip:'Sundance winners typically open in NYC 1–3 months after the festival. Watch the acquisitions news and put it on the list early. IFC and A24 releases are the most reliable.' },
    { id:217, title:'Horror double feature on Halloween weekend',     category:'cinema',   season:'fall',   notes:'Multiple theaters do horror marathons the weekend before Halloween. Pick two that genuinely scare us, not just gore.', tip:'IFC Center and Nitehawk both do Halloween programming. The Alamo Drafthouse sometimes hosts 6-hour horror blocks. Book early, these sell out in October.' },
    { id:218, title:'A film shot in New York, set in New York',       category:'cinema',   season:'any',    notes:'Pick a great film set in the actual city — Midnight Cowboy, Do the Right Thing, Taxi Driver, Desperately Seeking Susan — and walk the neighborhood afterward.', tip:'The Criterion Collection has many NYC classics. Metrograph and Film Forum program these regularly. Plan a walk through the film\'s neighborhood after the screening.' },
    { id:219, title:'MoMA film screening series',                    category:'cinema',   season:'any',    notes:'MoMA\'s film program is one of the best museum cinema programs anywhere. Not just retrospectives — contemporary and avant-garde work too.', tip:'11 W 53rd St, Midtown. Museum admission ($25) includes film screenings. Check moma.org for the film calendar. Some screenings are free with admission.' },
    { id:220, title:'Brooklyn Academy of Music opera simulcast',     category:'cinema',   season:'winter', notes:'BAM broadcasts live Met Opera performances in HD — same night as the stage show, on a big screen, at a fraction of the ticket price.', tip:'30 Lafayette Ave, Fort Greene. Tickets ~$25–30. The Met Opera Live in HD series runs October through May on Saturday afternoons. Check bam.org for dates.' },

    // ── FOOD 221–240 ────────────────────────────────
    { id:221, title:'A proper steak frites at Balthazar',            category:'food',     season:'any',    notes:'The steak frites. The oysters on ice. The room that never stops feeling like Paris. Balthazar is as reliable as anything in the city and better than it has any right to be.', tip:'80 Spring St, SoHo. Book on Resy 2–3 weeks out. ~$70–100/person with wine. Lunch service is slightly less expensive. The bread basket counts as a full course.' },
    { id:222, title:'Ethiopian feast at Ghenet',                     category:'food',     season:'any',    notes:'One big injera platter between two people. Everything arrives at once, you eat with your hands, and the stewed meats and lentils are as good as any in the city.', tip:'284 Mulberry St, NoLita. ~$50–60/person. No reservations, walk-in only. Go early on a weekday. The doro wat (chicken stew) and tibs are essential. Cash preferred.' },
    { id:223, title:'Breakfast at Clinton St. Baking Company',       category:'food',     season:'any',    notes:'Blueberry pancakes with warm maple butter and some of the best breakfast food in the city. The wait is worth it. Do not skip the biscuits.', tip:'4 Clinton St, LES. Opens 8am, waits can be 45 min on weekends. ~$25–35/person. Go on a weekday morning if possible. The wild blueberry compote is what you came for.' },
    { id:224, title:'A bowl of ramen at Totto or Mu Ramen',          category:'food',     season:'winter', notes:'Real chicken-paitan ramen at Totto, or the refined broths at Mu Ramen in Jackson Heights. Either way, a serious bowl of noodles on a cold afternoon.', tip:'Totto Ramen: 366 W 52nd St or 248 E 52nd St. Mu Ramen: 8501 Northern Blvd, Jackson Heights. Both ~$20–25. Mu Ramen requires a detour to Queens but earns it.' },
    { id:225, title:'Oysters and wine at Maison Premiere',           category:'food',     season:'any',    notes:'A New Orleans-style oyster bar in Williamsburg. Twenty kinds of oysters, absinthe cocktails, and a garden in the back. One of the most distinctive rooms in Brooklyn.', tip:'298 Bedford Ave, Williamsburg. Reservations on Resy recommended. Oysters ~$3–5 each. Go with a dozen of mixed varieties and the French 75. The garden is best in summer.' },
    { id:226, title:'Whole roast chicken at Zuni-style: Café Altro Paradiso', category:'food', season:'any', notes:'The short pasta and Italian-American warmth of Altro Paradiso. A neighborhood restaurant that feels like it was designed exactly for you.', tip:'234 Spring St, SoHo. Book on Resy 1–2 weeks out. ~$70–90/person. The bucatini and the polpette are essential. The room is quiet enough to actually talk.' },
    { id:227, title:'Sichuan mala hot pot at Little Pepper',          category:'food',     season:'winter', notes:'Real, unapologetic Sichuan mala hot pot in Flushing. The numbing heat builds slowly and then doesn\'t stop. Order the pork belly and the tofu skin.', tip:'133-43 Roosevelt Ave, Flushing. ~$30–40/person. 7 to Flushing-Main St. Weekend waits are long, go on a weekday. Order medium spice if you\'re not experienced with Sichuan heat.' },
    { id:228, title:'Lunch counter seats at the Nom Wah Tea Parlor', category:'food',     season:'any',    notes:'The oldest dim sum restaurant in the city, open since 1920. The har gow and egg tarts taste like they always have. An irreplaceable piece of Chinatown history.', tip:'13 Doyers St, Chinatown. ~$30–40/person. No reservations, arrive before noon to avoid a wait. Cash friendly. The shrimp and pork egg rolls are not on other dim sum menus.' },
    { id:229, title:'A Japanese omakase counter experience',          category:'food',     season:'any',    notes:'An omakase doesn\'t have to cost $400. Nishiki in Astoria, Tanoshi on the Upper East Side, or Sushi Katsuei in Park Slope all offer exceptional quality at a reasonable price.', tip:'Nishiki: 33-04 31st Ave, Astoria, ~$75–100. Tanoshi: 1372 York Ave, UES, ~$70. Sushi Katsuei: 210 7th Ave, Park Slope, ~$65. All require reservations well in advance.' },
    { id:230, title:'The Vietnamese sandwich at Banh Mi Saigon',      category:'food',     season:'any',    notes:'The best banh mi in New York. Crusty French baguette, the exact right ratio of pâté, pickled vegetables, and jalapeño. One of the best sandwiches in the city, full stop.', tip:'138 Centre St, Chinatown. ~$7–9/sandwich. Cash only. Usually a line at lunch, moves fast. Get the classic pork with pâté. They close when they sell out, usually by 3pm.' },
    { id:231, title:'A late dinner at Don Angie',                     category:'food',     season:'any',    notes:'Pinwheel lasagna. Silky pasta. Warm Italian-American cooking elevated without being pretentious. One of the most enjoyable restaurants in the city.', tip:'163 W 10th St, West Village. Book on Resy 4–6 weeks out. ~$90–120/person. Bar seating sometimes available same-day. The pinwheel lasagna is the reason to come.' },
    { id:232, title:'Grilled fish and mezze at Avra Estiatorio',      category:'food',     season:'summer', notes:'Whole grilled fish sold by the pound, displayed on ice when you walk in. A genuinely Athenian dining experience in Midtown that doesn\'t compromise.', tip:'141 E 48th St, Midtown. ~$80–120/person. Reservations via Resy. The grilled branzino and the taramosalata are essential. The private dining rooms feel like a different city.' },
    { id:233, title:'Dim sum brunch at Golden Unicorn',               category:'food',     season:'any',    notes:'A real old-school Hong Kong-style dim sum hall in Chinatown, with carts still rolling. The har gow, siu mai, and turnip cake arrive in waves. Arrive early and hungry.', tip:'18 E Broadway, Chinatown. ~$25–35/person. Go at 10:30am to beat the wait. Cash friendly. The egg custard tarts come out of the kitchen warm, ask a cart pusher.' },
    { id:234, title:'Pizza slice tour of a single neighborhood',      category:'food',     season:'any',    notes:'Pick one neighborhood and eat only pizza, by the slice, walking. Two or three stops over an afternoon. No sit-down, no table service, just slices and blocks.', tip:'Best for: the West Village (Joe\'s + John\'s), Bay Ridge (L\'Industrie + Spumoni), or Bed-Stuy (Corner Slice + Ops). ~$3–5/slice each stop. The point is the contrast.' },
    { id:235, title:'A burger and fries at Corner Bistro',            category:'food',     season:'any',    notes:'The Bistro Burger: a messy, no-frills, genuinely great burger with plastic cheese and crinkle-cut fries. The bar is dark and old and perfect.', tip:'331 W 4th St, West Village. Cash only. ~$9–12/burger. Open until 4am. Goes fast on Friday and Saturday nights, go before 7pm. The McSorley\'s dark ale on tap belongs.' },
    { id:236, title:'Tasting menu at a James Beard-nominated chef',   category:'food',     season:'any',    notes:'Pick a James Beard nominee we haven\'t tried yet. The list changes every year — look it up and book the one that feels most right this season.', tip:'James Beard nominees announced in March each year at jamesbeard.org. NYC restaurants appear every year. Many are on Resy. Book 3–6 weeks ahead for tasting menu seats.' },
    { id:237, title:'A Korean BBQ night in Koreatown',                category:'food',     season:'any',    notes:'Charcoal or gas grills at the table. Banchan arriving in waves. Brisket, short ribs, pork belly. Order the drinks. Make a full evening of it.', tip:'Ktown is 32nd St between 5th and 6th, Midtown. Jongro BBQ (22 W 32nd, open 24hrs) and WOORIJIP (12 W 32nd, also a buffet) are both excellent. ~$40–70/person with drinks.' },
    { id:238, title:'Happy hour oysters and Champagne at Coquette',   category:'food',     season:'any',    notes:'Certain West Village and SoHo restaurants do $1 oysters during a brief happy hour window. It\'s one of the better deals in the city if you catch it right.', tip:'Coquette (60 W 10th St), Bar Boulud, and Maison Premiere all run oyster specials. Check their websites for happy hour times, usually 5–7pm on weekdays. Go promptly.' },
    { id:239, title:'Brunch at Prune',                                category:'food',     season:'any',    notes:'Gabrielle Hamilton\'s Prune is small, personal, and one of the city\'s most influential restaurants. The brunch is a legend. The Dutch pancake is the whole reason to go.', tip:'54 E 1st St, East Village. No reservations for brunch, arrive at opening (10am on weekends). ~$30–50/person. The Bloody Mary is made with house pickled vegetables and is also the reason.' },
    { id:240, title:'A solo plate at the bar at Via Carota',          category:'food',     season:'any',    notes:'Insalata verde, cacio e pepe, a glass of something orange. Via Carota at the bar, eating slowly and watching the room. One of the most reliable pleasure experiences in the city.', tip:'51 Grove St, West Village. No reservations, walk-in only. The bar opens at 5pm, arrive then to get a seat. ~$50–70/person with wine. The insalata verde is actually what people talk about.' },

    // ── BAKERY 241–255 ──────────────────────────────
    { id:241, title:'Cardamom bun at Laila, Greenpoint',             category:'bakery',   season:'any',    notes:'A Scandinavian-influenced bakery in Greenpoint with one of the best cardamom buns in the city. The whole shop smells extraordinary from a block away.', tip:'151 India St, Greenpoint. Opens 7am. ~$5–8/item. G to Greenpoint Ave. The almond croissant and the seeded rye loaf are both exceptional. Usually sells out of buns by noon.' },
    { id:242, title:'A loaf of bread from She Wolf Bakery',           category:'bakery',   season:'any',    notes:'One of the best bakeries in New York for whole grain and naturally leavened breads. Buy a loaf and eat it slowly over two days with good butter.', tip:'6 Kent Ave, Williamsburg (or Essex Market, 88 Essex St, LES). ~$10–16/loaf. L to Lorimer St. The country sourdough and the einkorn loaf are both exceptional.' },
    { id:243, title:'Morning buns at Brooklyn Pigeon',                category:'bakery',   season:'spring', notes:'A tiny neighborhood bakery in Crown Heights that turns out exceptional morning buns, croissants, and seasonal tarts. Feels like a neighborhood secret.', tip:'Check their Instagram for hours and specials — hours vary by season. ~$4–8/item. 2/3 to Crown Heights-Utica Ave. They sell out fast, go right at opening.' },
    { id:244, title:'A Swedish fika at Fika in Midtown',              category:'bakery',   season:'winter', notes:'A proper Swedish-style coffee break: a dark coffee and a cinnamon bun, not rushed, in the middle of a workday or a wandering day. The ritual is the point.', tip:'66 Pearl St or 41 W 58th St. ~$5–9/item. The kanelbullar (Swedish cinnamon bun) is made fresh each morning. Bring something to read or just sit and watch the street.' },
    { id:245, title:'Mochi donuts at Mochinut',                       category:'bakery',   season:'any',    notes:'Chewy, stretchy, ring-shaped mochi donuts in rotating flavors. Lighter than a standard donut, more interesting. A genuinely different texture experience.', tip:'Multiple NYC locations including 40 W 32nd St and 95 3rd Ave. ~$3–4 each. The ube and matcha varieties are consistently the best. Go early, they sell out by mid-afternoon.' },
    { id:246, title:'Potato bread and pastries at Bien Cuit',         category:'bakery',   season:'any',    notes:'Zachary Golper\'s Bien Cuit is one of the technically finest bakeries in New York. The country loaves have a depth of flavor that\'s rare. Worth a trip to Cobble Hill.', tip:'120 Smith St, Cobble Hill, Brooklyn. Opens 7am. ~$5–15/item. F/G to Bergen St. The potato bread and the kouign-amann are the two essential items. Very limited on weekdays.' },
    { id:247, title:'A slice of cake at Four & Twenty Blackbirds',    category:'bakery',   season:'fall',   notes:'Brooklyn\'s best pie bakery. The salted caramel apple pie in fall is one of the most genuinely excellent pastries in the city. A small piece is never enough.', tip:'439 3rd Ave, Gowanus (also Dekalb Market). Opens 8am. ~$7–10/slice. F/G to 4th Ave-9th St. The chess pie and the salty honey pie are year-round staples. Check their seasonal specials.' },
    { id:248, title:'Brown butter tart at Maman',                     category:'bakery',   season:'any',    notes:'Maman\'s nutty brown butter tart is perfect. The whole aesthetic of the café is perfectly studied, but the pastry program is genuinely first-rate.', tip:'Multiple locations including 211 W Broadway (TriBeCa) and 22 W 25th St (Chelsea). ~$6–10/item. The nutty brown butter tart is the reason. Also excellent: the hazelnut financier.' },
    { id:249, title:'A cruffin or seasonal pastry at Arcade Bakery',  category:'bakery',   season:'any',    notes:'Hidden inside a lobby in TriBeCa, Arcade Bakery makes some of the best laminated pastries in the city. Their seasonal cruffins rotate and are always worth it.', tip:'220 Church St, TriBeCa (lobby). ~$5–9/item. Weekdays only, closes at 4pm. 1 to Franklin St. Limited quantities — the cruffins sell out by 11am. Arrive when it opens at 8am.' },
    { id:250, title:'Tahini chocolate halva at Seed + Mill',           category:'bakery',   season:'any',    notes:'An Israeli sesame shop in Chelsea Market with the best halva in New York. Rich, crumbly, not too sweet. Get a small piece of three different varieties.', tip:'75 9th Ave, Chelsea Market. ~$10–15 for a sampler. The vanilla sesame and the dark chocolate varieties are essential. They also make excellent tahini milkshakes in summer.' },
    { id:251, title:'Egg tart and pineapple bun at Golden Steamer',   category:'bakery',   season:'any',    notes:'A classic Hong Kong-style egg tart, warm from the oven, in Chinatown. One of the best things you can eat in New York for under $3.', tip:'143 1/2 Mott St, Chinatown. ~$1.50–3/item. Cash only. The egg tarts come out of the oven in batches — ask when the next one is ready if the case is empty. The pineapple bun is also essential.' },
    { id:252, title:'Focaccia sandwiches at Bread Alone',              category:'bakery',   season:'summer', notes:'Bread Alone\'s farmers market stands at the Union Square Greenmarket are some of the best focaccia sandwiches in the city. Eat it on a park bench.', tip:'Union Square Greenmarket runs Mon/Wed/Fri/Sat. Bread Alone booth arrives early. ~$10–14/sandwich. The roasted vegetable on focaccia is the standard. Get there before noon.' },
    { id:253, title:'Sourdough and cultured butter at Runner & Stone', category:'bakery',   season:'any',    notes:'A deeply serious bread bakery in Gowanus that also does an exceptional weekend brunch. The bread alone is worth the trip.', tip:'285 3rd Ave, Gowanus, Brooklyn. Opens 7am. ~$5–14/item. F/G to 4th Ave-9th St. The country loaf and the seeded rye are the standards. The cultured butter makes the difference.' },
    { id:254, title:'A cinnamon roll at Kitsby, Williamsburg',         category:'bakery',   season:'any',    notes:'One of the better cinnamon rolls in the borough — warm, gooey, the right size, not reformed into something else. Williamsburg\'s breakfast answer.', tip:'Check Instagram for hours and current menu, as small bakeries change often. ~$6–8. L to Lorimer St or Bedford Ave. Best eaten immediately, while still warm.' },
    { id:255, title:'A fruit danish at Patisserie Chanson',            category:'bakery',   season:'spring', notes:'A French pâtisserie in the Flatiron with some of the most technically beautiful pastry work in the city. The fruit danishes in spring use whatever is at peak season.', tip:'928 Broadway, Flatiron. Opens 7am. ~$6–12/item. N/R/W to 23rd St. The entremets and mirror glaze cakes are the showpieces, but the danish is the best daily item.' },

    // ── ARTS 256–273 ────────────────────────────────
    { id:256, title:'The Met\'s Egyptian Art wing at opening time',   category:'arts',     season:'any',    notes:'The Temple of Dendur before the crowds arrive. A 2,000-year-old Egyptian temple reassembled inside a glass-enclosed hall on the Upper East Side. Properly awe-inspiring.', tip:'1000 5th Ave, UES. Opens 10am. ~$30 suggested admission. 4/5/6 to 86th St. The Egyptian wing is through the Great Hall and to the right. Go on a Tuesday when it\'s quietest.' },
    { id:257, title:'A gallery opening in the Lower East Side',        category:'arts',     season:'any',    notes:'The LES has the most active small gallery scene in the city. Opening nights on Thursdays are free, social, and usually serve wine. Pick any Thursday and walk Orchard and Rivington.', tip:'Check Artsy and the gallery websites for opening dates. Orchard, Rivington, and Essex St have the highest gallery density. Free. Thursday openings run ~6–9pm.' },
    { id:258, title:'New Museum Triennial',                            category:'arts',     season:'spring', notes:'The New Museum Triennial every three years showcases emerging artists from around the world. The most forward-looking survey of contemporary art in the city.', tip:'235 Bowery, LES. ~$18. 6 to Spring St. The Triennial runs in spring. Non-Triennial years, the New Museum still has the most consistently interesting programming on the Bowery.' },
    { id:259, title:'The Cloisters on a gray winter morning',          category:'arts',     season:'winter', notes:'A medieval European monastery transplanted to the northern tip of Manhattan, overlooking the Hudson. Tapestries, illuminated manuscripts, stone chapels. An entirely different world.', tip:'99 Margaret Corbin Dr, Washington Heights/Fort Tryon Park. ~$30 suggested. A to 190th St. Open until 5pm. The unicorn tapestries are in Room 7. The view from the garden is best in fog.' },
    { id:260, title:'Artist talks at the Brooklyn Museum',             category:'arts',     season:'any',    notes:'The Brooklyn Museum runs excellent artist talks and curator-led tours throughout the year. More intimate and focused than the major Manhattan institutions.', tip:'200 Eastern Pkwy, Crown Heights. Suggested ~$16 admission. 2/3 to Eastern Pkwy-Brooklyn Museum. Check brooklynmuseum.org for First Saturdays (free 5–11pm) and upcoming talks.' },
    { id:261, title:'The Folk Art Museum on a weekday',                category:'arts',     season:'any',    notes:'The American Folk Art Museum is small, focused, and consistently overlooked. Self-taught and outsider art that stops you longer than you expect.', tip:'2 Lincoln Square (Columbus Ave & W 66th St). Free. 1 to 66th St-Lincoln Center. Closed Mon/Tue. The Henry Darger gallery and the historical quilt collection are the highlights.' },
    { id:262, title:'Dia:Beacon on a long weekend',                    category:'arts',     season:'summer', notes:'A former Nabisco printing factory on the Hudson River turned into one of the world\'s great modern art spaces. Richard Serra\'s steel plates. Dan Flavin\'s light. An all-day experience.', tip:'3 Beekman St, Beacon, NY. ~$18. Metro-North Poughkeepsie line from Grand Central to Beacon, ~1.5 hrs, ~$30 RT. Open Fri–Mon. Plan 3–4 hours minimum. The café is good.' },
    { id:263, title:'Japan Society gallery exhibition',                 category:'arts',     season:'any',    notes:'The Japan Society on the East Side runs some of the most scholarly and beautifully presented Japanese art exhibitions in the country. Never just tourist-facing.', tip:'333 E 47th St, Midtown East. ~$15. 6 to 51st St. Check japansociety.org for the current exhibition. Small, focused shows that reward slow looking.' },
    { id:264, title:'Studio Museum in Harlem free Sunday',             category:'arts',     season:'any',    notes:'The Studio Museum in Harlem is currently in the process of reopening in its new building. A landmark institution for contemporary Black art and artists. Free on Sundays.', tip:'144 W 125th St, Harlem. Free on Sundays. 2/3/A/B/C/D to 125th St. Check studiomuseum.org for the current opening status and exhibitions. Artist studio programs throughout the year.' },
    { id:265, title:'The Drawing Center in SoHo',                      category:'arts',     season:'any',    notes:'A single-medium gallery dedicated entirely to drawing, in all its forms — historical, contemporary, artist books. One of the most focused museum spaces in the city.', tip:'35 Wooster St, SoHo. ~$5 suggested. 1/C/E to Spring St. Closed Mon/Tue. The Drawing Center\'s shows often feature process work and studies that don\'t appear in larger museums.' },
    { id:266, title:'The Frick Collection re-opening',                 category:'arts',     season:'any',    notes:'After years of renovation, the Frick reopened with the full Gilded Age mansion and collection intact. Vermeer, Rembrandt, Holbein — a masterwork per room.', tip:'1 E 70th St, UES. ~$22. 6 to 68th St-Hunter College. Timed entry recommended. Smaller and quieter than the Met. The Fragonard Room alone is worth the trip.' },
    { id:267, title:'A sound installation at Socrates Sculpture Park', category:'arts',     season:'summer', notes:'A free outdoor sculpture park in Long Island City with rotating large-scale installations. On summer evenings, they sometimes host sound and light events along the waterfront.', tip:'32-01 Vernon Blvd, Long Island City. Free. N/W to Broadway (Astoria). Check socratessculpturepark.org for events. The park is always open during daylight hours, waterfront views included.' },
    { id:268, title:'Rubin Museum of Art on a Thursday night',         category:'arts',     season:'any',    notes:'The Rubin is devoted to Himalayan and South Asian art. Thursday nights they do "Spiral" events — a floor per theme, with music and programming. A completely unexpected New York evening.', tip:'150 W 17th St, Chelsea. ~$15 standard, Spiral events may vary. 1 to 18th St. Check rubinmuseum.org for Spiral program lineup. The mandalas and Tibetan deity sculptures are extraordinary.' },
    { id:269, title:'The galleries of 57th Street',                    category:'arts',     season:'any',    notes:'57th Street between 10th and 11th avenues has some of the most important private galleries in the world. All free to enter, all open to the public. Spend an afternoon looking at major work.', tip:'Hauser & Wirth, Pace Gallery, and David Zwirner all have major galleries in this stretch. Free. Check their websites for current shows. Opens 10am–6pm Tue–Sat.' },
    { id:270, title:'Poster House: graphic design museum',             category:'arts',     season:'any',    notes:'The only museum in the US dedicated entirely to the poster as an art form. Consistently excellent thematic exhibitions pulling from global poster history.', tip:'119 W 23rd St, Chelsea. ~$16. 1 to 23rd St. Check posterhouse.org for current shows. Small but expertly curated. The gift shop has exceptional reproductions.' },
    { id:271, title:'An afternoon at P.S.1 / MoMA PS1',                category:'arts',     season:'summer', notes:'In summer, PS1\'s courtyard becomes the site of the Warm Up series — outdoor DJ sets and an incredible rotating architectural installation. Even without the event, it\'s excellent.', tip:'22-25 Jackson Ave, Long Island City. ~$10 ($5 with MoMA membership). 7/E/M to Court Sq-23rd St. Warm Up runs July–September on Saturdays. Check momaps1.org for the schedule.' },
    { id:272, title:'ICP: International Center of Photography',        category:'arts',     season:'any',    notes:'The city\'s dedicated photography museum. Documentary, fine art, photojournalism — rotating exhibitions that take photography seriously as a discipline.', tip:'79 Essex St, LES. ~$14. F/M/J/Z to Delancey-Essex. Check icp.org for current shows. The public archive and library are also open by appointment.' },
    { id:273, title:'El Museo del Barrio on a Sunday',                  category:'arts',     season:'any',    notes:'The only major museum dedicated to Puerto Rican and Latin American art on Museum Mile. Frequently overlooked, consistently excellent programming.', tip:'1230 5th Ave at 104th St, East Harlem. ~$9 suggested, free on Sundays. 6 to 103rd St. Check elmuseo.org for current exhibitions. The permanent collection of pre-Columbian objects is extraordinary.' },

    // ── SHOWS 274–290 ───────────────────────────────
    { id:274, title:'A cabaret night at Birdland Jazz Club',           category:'shows',    season:'any',    notes:'Not just a jazz bar — Birdland books cabaret singers, big band nights, and Latin jazz regularly. A grown-up New York evening in an actual venue that takes music seriously.', tip:'315 W 44th St, Hell\'s Kitchen. ~$20–40 cover + 2-drink minimum. Reservations available. Two shows most nights, 8pm and 10pm. The Monday night big band is a city institution.' },
    { id:275, title:'A standup comedy show at The Bell House',          category:'shows',    season:'any',    notes:'The Bell House in Gowanus books excellent standup lineups — national acts, NYC favorites, and late-night taping audiences. A proper venue for comedy.', tip:'149 7th St, Gowanus, Brooklyn. Tickets ~$15–35. thebellhouseny.com for the calendar. F/G to 4th Ave-9th St. The bar is generous and the room has great sight lines.' },
    { id:276, title:'A night at the Metropolitan Opera',                category:'shows',    season:'fall',   notes:'Pick something neither of us knows. Bring binoculars for the upper ring. The house itself is the experience — the chandelier rising is genuinely theatrical.', tip:'Lincoln Center Plaza, UWS. Tickets range from $30 (upper ring) to $300+. metopera.org. Rush tickets available at the box office 2 hours before curtain. Season runs Sept–May.' },
    { id:277, title:'An improv show at UCB or Peoples Improv Theater',  category:'shows',    season:'any',    notes:'A well-formed improv group in a dedicated space is one of the funniest, most alive things in the city. Pick a team with good reviews and a late Friday slot.', tip:'UCB reopened in Hell\'s Kitchen. The PIT is at 123 E 24th St. ~$5–15. TodayTix and the theaters\' own sites list shows. Harold teams on Friday nights are the gold standard.' },
    { id:278, title:'New York Philharmonic at David Geffen Hall',       category:'shows',    season:'winter', notes:'The renovated David Geffen Hall at Lincoln Center now has genuinely excellent acoustics. Pick a program with something we recognize and something we don\'t.', tip:'10 Lincoln Center Plaza, UWS. Tickets ~$30–120. nyphil.org. Rush tickets sometimes available. The Friday afternoon series has great prices and an older, more knowledgeable audience.' },
    { id:279, title:'A drag show at C\'mon Everybody, Brooklyn',        category:'shows',    season:'any',    notes:'One of the best drag venues in Brooklyn — serious performers, a real stage, and a crowd that shows up for the art of it. A genuinely electric room.', tip:'325 Franklin Ave, Crown Heights. Tickets ~$10–20 online. Shows most Friday and Saturday nights. C to Franklin Ave. The bar program is excellent and the staff are warm.' },
    { id:280, title:'Sleep No More (if it runs again)',                 category:'shows',    season:'any',    notes:'The immersive theater piece by Punchdrunk that\'s run at the McKittrick Hotel for over a decade. Wander a five-floor dreamlike staging of Macbeth in a mask. Nothing else is quite like it.', tip:'530 W 27th St, Chelsea. ~$120–170. Check mckittrickhotel.com for the current run. Go alone or as a couple and deliberately split up — you see different things.' },
    { id:281, title:'A jazz concert at Village Vanguard',               category:'shows',    season:'any',    notes:'The most important jazz club in the world, still in operation. The room is small, the sight lines are good, and the music is serious. A Monday night set is often the best of the week.', tip:'178 7th Ave S, West Village. ~$35 cover + 1-drink minimum. villagevanguard.com. Most sets at 8pm and 10pm. Arrive 30 min early for a good seat. The Monday night big band has been running since 1966.' },
    { id:282, title:'A show at (Le) Poisson Rouge',                     category:'shows',    season:'any',    notes:'LPR books everything — classical music, jazz, indie rock, spoken word. The programming is genuinely eclectic and the room has a real club feel with good acoustics.', tip:'158 Bleecker St, Greenwich Village. Tickets ~$15–40. lprnyc.com. Standing room most shows, seating upstairs. A to W 4th St. The bar takes music seriously too.' },
    { id:283, title:'A Bargemusic chamber concert',                     category:'shows',    season:'any',    notes:'Chamber music performed on a converted coffee barge moored under the Brooklyn Bridge. An impossibly romantic venue for serious classical music. One of New York\'s best-kept secrets.', tip:'Fulton Ferry Landing, DUMBO. ~$35–40. bargemusic.org. F to York St, or walk from Brooklyn Bridge Park. Thursday and Sunday concerts year-round. The barge rocks slightly in rough weather — somehow perfect.' },
    { id:284, title:'Poetry reading at the 92nd Street Y',              category:'shows',    season:'any',    notes:'The 92Y books the best poets in the world — Nobel laureates, recent prize winners, and emerging voices. A reading there is a genuinely important literary event.', tip:'1395 Lexington Ave, UES. ~$25–40. 92y.org. 6 to 86th St. The Unterberg Poetry Center has been running since 1939. Check the calendar in September for the full-year program.' },
    { id:285, title:'An evening at Blue Note Jazz Club',                 category:'shows',    season:'any',    notes:'Blue Note books legends and serious working musicians. Not as historically significant as the Vanguard, but more accessible and equally good.', tip:'131 W 3rd St, Greenwich Village. ~$20–45 cover. bluenotejazz.com. Sets at 8pm and 10:30pm. Arrive early for table seats. The late-night sets (midnight on weekends) are sometimes the loosest and best.' },
    { id:286, title:'A revival musical at City Center Encores!',        category:'shows',    season:'winter', notes:'City Center\'s Encores! series does concert-form revivals of forgotten Broadway musicals, cast with major stars and the full orchestra. Tickets are reasonable, performances are extraordinary.', tip:'131 W 55th St, Midtown. Tickets ~$25–90. nycitycenter.org. The series runs January through April. N/R/W to 57th St. Concert staging means the focus is entirely on the score.' },
    { id:287, title:'A show at St. Ann\'s Warehouse',                   category:'shows',    season:'any',    notes:'The most adventurous theater producing in the city. International work, American premieres, and experimental performance that would struggle to find a home elsewhere.', tip:'45 Water St, DUMBO, Brooklyn. Tickets ~$50–90. stannswarehouse.org. A/C to High St, or F to York St. Check the calendar for anything by English-language international companies.' },
    { id:288, title:'A live taping of a late-night show',               category:'shows',    season:'any',    notes:'The Late Show, Tonight Show, Seth Meyers, and others all offer free standby or lottery tickets. The energy of a live taping is nothing like watching at home.', tip:'CBS Late Show: 1697 Broadway, free standby. NBC Tonight Show: 30 Rock, free lottery. SNL: NBC lottery (apply in August). Standby lines open early morning. Bring ID.' },
    { id:289, title:'A night at Smoke Jazz & Supper Club',              category:'shows',    season:'any',    notes:'Smoke is quieter and more intimate than the famous clubs, with consistently excellent booking and a real supper club atmosphere. A genuine Harlem jazz night.', tip:'2751 Broadway, Upper West Side. ~$25–40 cover. smokejazz.com. 1 to 103rd St. Sets at 7pm, 9pm, and 11pm. The kitchen is open until midnight. Reservations strongly recommended on weekends.' },
    { id:290, title:'A Shakespeare in the Park lottery',                category:'shows',    season:'summer', notes:'Free Shakespeare in Central Park\'s Delacorte Theater. The lottery is frustrating but worth attempting. The productions are Broadway-quality and the outdoor setting at dusk is extraordinary.', tip:'Delacorte Theater, Central Park, 81st St. Free, digital lottery via TodayTix app at noon on show day. Or wait in the in-person standby line starting at 12pm. Season runs June–August.' },

    // ── EXPLORE 291–310 ─────────────────────────────
    { id:291, title:'Walk the entire length of the High Line',         category:'explore',  season:'spring', notes:'All 1.45 miles, start to finish, from Gansevoort to Hudson Yards. Stop at every viewpoint. Have a coffee at one of the food stalls. End with the oculus view of the Hudson at 34th St.', tip:'Enter at Gansevoort St (14th St side). Walk north. Free, always open. The Little Island is just off the south end at Pier 55 — add that too. Best on a warm morning before 10am.' },
    { id:292, title:'Explore a neighborhood with no plan at all',       category:'explore',  season:'any',    notes:'Pick a subway stop we\'ve never gotten off at. Walk until something looks interesting. The only rule is no phones for directions. Stay at least two hours.', tip:'Good candidates: Mott Haven (6 to 3rd Ave-138th), East Williamsburg (L to Morgan Ave), Jackson Heights (7 to 74th St-Broadway), Soundview (6 to Whitlock Ave). Take the train.' },
    { id:293, title:'The Greenwood Cemetery tour',                      category:'explore',  season:'fall',   notes:'One of the great 19th-century rural cemeteries in America, full of extraordinary Victorian monuments, rolling hills, and some of the best views in Brooklyn.', tip:'500 25th St, Gowanus. Free entry at all gates during daylight hours. Guided tours from ~$10 at green-wood.com. D/N/R to 25th St. The main gothic entrance gate is the most atmospheric way in.' },
    { id:294, title:'A walk through Jackson Heights, Queens',           category:'explore',  season:'any',    notes:'The most ethnically diverse neighborhood in New York. South Asian groceries, Bangladeshi sweet shops, Colombian bakeries, Nepali restaurants, all within a few blocks.', tip:'7 to 74th St-Broadway, or E/F/M/R to Jackson Heights-Roosevelt Ave. Walk Roosevelt Ave and then the side streets north toward 37th Ave. Eat at Patel Brothers\' snack counter and then get lassi.' },
    { id:295, title:'The Brooklyn Naval Yard exploration',              category:'explore',  season:'any',    notes:'The BLDG 92 museum at the Naval Yard traces the history of this 300-acre industrial complex. Then wander the campus, which is now full of manufacturers, artists, and rooftop farms.', tip:'63 Flushing Ave, Navy Yard, Brooklyn. BLDG 92 museum is free. F to York St, or B57 bus. Some areas require tours. The rooftop farm at Brooklyn Grange is worth booking separately.' },
    { id:296, title:'A walk across the Manhattan Bridge',               category:'explore',  season:'spring', notes:'The Manhattan Bridge has a dedicated pedestrian path with one of the most dramatic views in the city: the Brooklyn Bridge to your right, lower Manhattan, and the whole harbor opening up.', tip:'Access from Canal St and Forsyth St in Manhattan, or Sands St and Jay St in DUMBO. ~1.2 miles. The view looking back toward Manhattan from the midpoint is the best frame in the city.' },
    { id:297, title:'Rockaway Beach and Riis Park in summer',           category:'explore',  season:'summer', notes:'An actual beach at the end of the A train. The boardwalk at Rockaway feels entirely different from the city. Riis Park next door is quieter and even more beautiful.', tip:'A to Rockaway Park-Beach 116th St, then the Q22 bus to Riis Park. Free. Rockaway Beach has food stalls and bathrooms. Riis Park is the old city bathhouse, now a National Park Service site.' },
    { id:298, title:'Staten Island Ferry and Fort Wadsworth walk',      category:'explore',  season:'any',    notes:'The free ferry to Staten Island, then a bus to Fort Wadsworth — a Civil War-era fortification sitting directly under the Verrazzano-Narrows Bridge with extraordinary harbor views.', tip:'Take the free SI Ferry from Whitehall Terminal, then the S51 bus to Fort Wadsworth (National Park, free). The battery of casements has harbor views unlike anything else. Walk back to St. George for the ferry.' },
    { id:299, title:'A walk through Sunset Park, Brooklyn',             category:'explore',  season:'summer', notes:'The park itself has an unobstructed panoramic view of lower Manhattan that most New Yorkers have never seen. Then eat your way through the surrounding Chinese-Guatemalan-Latinx neighborhood.', tip:'R to 59th St or N to Bay Ridge Ave. The park overlook is at 41st–44th St. Industry City (36th St and 2nd Ave) is nearby for food. New York Mart is the best grocery store in Brooklyn.' },
    { id:300, title:'The Ridgewood and Bushwick border on foot',        category:'explore',  season:'any',    notes:'The blocks where Ridgewood and Bushwick blur together have some of the best street art in the city alongside early 20th-century row houses. A genuine surprise every block.', tip:'M to Seneca Ave or Halsey St. Walk DeKalb Ave and Wyckoff Ave. No map needed, just wander. The Ridgewood Savings Bank building (at Seneca Ave) is one of the great overlooked buildings in the city.' },
    { id:301, title:'The Newtown Creek Nature Walk, Greenpoint',        category:'explore',  season:'any',    notes:'A wetland nature walk along one of the most Superfund-contaminated waterways in America. The juxtaposition of wildflowers, industrial pipes, and the Manhattan skyline is genuinely strange and beautiful.', tip:'Between Provost St and Kingsland Ave, Greenpoint. Free, always open. G to Greenpoint Ave. The wastewater treatment plant\'s stainless steel egg digesters are visible from the walk. Unique and uncanny.' },
    { id:302, title:'The Rockaways boardwalk in fall',                  category:'explore',  season:'fall',   notes:'The same boardwalk as summer but empty. The light is different in October. The ocean is still warm enough to wade. Completely different from the summer version.', tip:'A to Far Rockaway or Rockaway Park-Beach 116th St. The boardwalk runs from Beach 9th St to Beach 149th St. No crowds after Labor Day. The fish tacos at Rippers are still open through October.' },
    { id:303, title:'A walk from DUMBO through Brooklyn Heights',       category:'explore',  season:'any',    notes:'From the cobblestones under the Manhattan Bridge, through the Brooklyn Bridge Park waterfront, and up into the quiet brownstone streets of Brooklyn Heights. One of the best urban walks anywhere.', tip:'Start at Water St and Washington St in DUMBO. Walk south through the park to Squibb Park. Climb into Brooklyn Heights. The Promenade at the end gives you the full Manhattan skyline.' },
    { id:304, title:'Exploring Governors Island in the warm months',    category:'explore',  season:'summer', notes:'A car-free island in the harbor with gardens, hills, food vendors, and extraordinary Manhattan-facing views. Completely removed from the city while still being ten minutes away.', tip:'Ferry from the Whitehall/South Ferry Terminal or Brooklyn Bridge Park, ~$4 RT. Open May–October. Rent bikes on the island. The Hills section at the south end has the best views. Go on a weekday.' },
    { id:305, title:'An afternoon in Flushing Meadows-Corona Park',     category:'explore',  season:'summer', notes:'The second-largest park in New York, home to the Unisphere, the Queens Museum, Citi Field, and the USTA tennis center. An afternoon that keeps revealing new things.', tip:'7 to Mets-Willets Point. The Queens Museum has one of the best small art museums in the city (~$8). The Unisphere is free. The Terrace on the Park restaurant has a rooftop view worth the detour.' },
    { id:306, title:'Walk the full length of Atlantic Avenue',          category:'explore',  season:'any',    notes:'Atlantic Avenue from Cobble Hill through Boerum Hill to downtown Brooklyn. Middle Eastern grocery stores, antique shops, restaurants from a dozen cuisines, and one of the best-preserved commercial strips in Brooklyn.', tip:'B/Q to Atlantic Ave-Barclays or 2/3/4/5 to Borough Hall. Walk west on Atlantic toward the BQE. Sahadi\'s (187 Atlantic) for provisions. The antique district around Court St is the best stretch.' },
    { id:307, title:'Coney Island in October',                          category:'explore',  season:'fall',   notes:'Coney Island after the tourists leave. The Cyclone and Wonder Wheel still run through October. Nathan\'s is open. The boardwalk is quiet and the ocean is right there.', tip:'D/F/N/Q to Coney Island-Stillwell Ave. Rides from ~$6 each, or an all-day pass. Nathan\'s Famous is still the reference hot dog. Walk east toward Brighton Beach after for the Russian food stores.' },
    { id:308, title:'The Noguchi Museum in Long Island City',            category:'explore',  season:'any',    notes:'Isamu Noguchi\'s own museum, built in his studio. Stone, light, and garden spaces that feel entirely unlike a conventional museum. One of the most peaceful spaces in New York.', tip:'9-01 33rd Rd, Long Island City. ~$10. N/W to Broadway (Astoria), then walk or take the Q104 bus. Closed Tue/Wed. The sculpture garden is the heart of the experience. Plan 1.5–2 hrs.' },
    { id:309, title:'A walk through the Meatpacking District at dawn',  category:'explore',  season:'any',    notes:'The only time the Meatpacking District makes sense. Before 7am, the cobblestones are quiet, the old loading docks are visible, and the neighborhood still carries a ghost of what it was.', tip:'A/C/E/L to 14th St. Walk the cobblestone blocks between 9th Ave and Washington St. The remnants of the actual meatpacking industry are still there if you look for them. Have coffee at La Colombe after.' },
    { id:310, title:'Tottenville and Conference House Park, Staten Island', category:'explore', season:'fall', notes:'The southernmost point of New York City — and you can take public transit all the way there. Conference House Park has trails to the actual southern tip, and the old Conference House is a colonial museum.', tip:'SI Ferry, then SIR train to Tottenville (~40 min from St. George). The park and trails are free. The Conference House Museum is ~$3. Fall foliage makes October the best time. Bring a picnic.' },

    // ── WELLNESS 311–327 ────────────────────────────
    { id:311, title:'A long swim at the public outdoor pool',           category:'wellness', season:'summer', notes:'New York\'s public outdoor pools open in late June and are free. The McCarren Park Pool in Williamsburg was restored to its original 1930s grandeur. An afternoon of actual swimming.', tip:'McCarren Park: Bedford Ave & N 12th St, Williamsburg. Free, open late June through Labor Day. L to Bedford Ave. Bring a lock for the locker rooms. The crowd is a genuine cross-section of the city.' },
    { id:312, title:'A sound bath at a dedicated wellness studio',      category:'wellness', season:'any',    notes:'Singing bowls and gongs played around you as you lie still. Nothing like ambient music at home. The sound is physical and the 60 minutes passes differently than any other hour.', tip:'MNDFL, Woom Center (Multiple Manhattsan locations), and The Well all offer sound baths. ~$30–50. Book in advance. Wear layers and bring your own mat if the studio allows it.' },
    { id:313, title:'An early morning run in Prospect Park',             category:'wellness', season:'spring', notes:'The inner loop is 3.4 miles. Before 7am in spring, it\'s mostly regulars, dog-walkers, and birders. The long meadow in early light is one of the best things in Brooklyn.', tip:'Enter at Grand Army Plaza (2/3) or the 9th St entrance (F/G). Free, always open. The loop runs counterclockwise by convention. Prospect Park runs every Sunday morning, 9am at Grand Army Plaza.' },
    { id:314, title:'Infrared sauna session for two',                   category:'wellness', season:'winter', notes:'An infrared sauna is gentler on the lungs than a traditional Finnish sauna but deeply warming. A private cabin for two hours is a genuinely different kind of afternoon.', tip:'HigherDOSE has locations in Flatiron and Williamsburg. ~$45–65/person for 45–60 min. Book online. They also do red light therapy add-ons. A good pre-date or recovery activity.' },
    { id:315, title:'A slow morning yoga class in the neighborhood',    category:'wellness', season:'any',    notes:'A Sunday morning yoga class somewhere within walking distance. Not a destination class — just a neighborhood studio, a slow start, the rest of the day afterward.', tip:'Most neighborhood studios have a Sunday 9am or 10am class. ~$20–30 drop-in or use a ClassPass credit. Modo Yoga, Yoga Works, and Sacred Brooklyn are all accessible. Bring water.' },
    { id:316, title:'An afternoon at the Russian baths, 10th Street',   category:'wellness', season:'winter', notes:'The 10th Street Russian and Turkish Baths have been open since 1892. Schvitz, cold plunge, Russian oak leaf beating, a bottle of kombucha. An experience unchanged in 130 years.', tip:'268 E 10th St, East Village. ~$40–50 for a single admission. 6 to Astor Pl. Co-ed days are Monday, Tuesday, Thursday, Friday. Wednesday is women-only, Sunday is men-only. The cold plunge is mandatory.' },
    { id:317, title:'A Nordic spa afternoon at Spa 88',                  category:'wellness', season:'any',    notes:'A series of hot and cold plunges in a thermotherapy circuit, inspired by Nordic bathing traditions. No pressure, no agenda — just move between temperatures at your own pace.', tip:'88 Fulton St, Financial District. ~$50–75 for thermotherapy access. 4/5 to Fulton St. Bring a swimsuit. The circuit includes steam rooms, cold plunge, and warm pools. No talking required.' },
